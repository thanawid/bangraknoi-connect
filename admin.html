<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>หลังบ้าน — บางรักน้อย Connect</title><link rel="stylesheet" href="styles.css"><style>.admin{padding:36px clamp(16px,4vw,60px)}.adminbar{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}.table{overflow:auto;background:#fff;border-radius:22px;box-shadow:0 12px 34px rgba(60,30,120,.09)}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}th{background:#6b35c9;color:#fff;position:sticky;top:0}.pill{border-radius:999px;padding:5px 10px;font-weight:800}.wait{background:#fff3cd;color:#8a5a00}.ok{background:#dcfce7;color:#166534}.no{background:#fee2e2;color:#991b1b}.mini{border:0;border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer}.mini.okb{background:#22c55e;color:white}.mini.nob{background:#ef4444;color:white}</style></head><body><header class="topbar"><a class="brand" href="index.html"><img src="assets/logo_BC.png"><span><b>หลังบ้าน</b><small>ตรวจสอบข้อมูลก่อนเผยแพร่</small></span></a><nav><a href="index.html">หน้าเว็บ</a></nav></header><main class="admin"><p class="eyebrow">Admin Review</p><h1>รายการสมัครเข้าระบบ</h1><p>หน้านี้ใช้กับ Google Apps Script ได้ทันที เมื่อใส่ Web App URL ในไฟล์ <b>admin.js</b></p><div class="adminbar"><input id="adminKey" placeholder="รหัสผู้ดูแล"><button class="btn primary" onclick="loadAdmin()">โหลดข้อมูล</button><button class="btn ghost" onclick="location.reload()">รีเฟรช</button></div><div class="table"><table><thead><tr><th>สถานะ</th><th>ชื่อ</th><th>หมวด</th><th>รายละเอียด</th><th>ติดต่อ</th><th>พื้นที่</th><th>จัดการ</th></tr></thead><tbody id="adminRows"><tr><td colspan="7">กรอกรหัสแล้วกดโหลดข้อมูล</td></tr></tbody></table></div></main><script src="admin.js"></script></body></html>
