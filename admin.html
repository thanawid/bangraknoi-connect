<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>หลังบ้าน — บางรักน้อย Connect</title><link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"><style>:root{--p:#6b35c9;--pd:#351168;--pl:#efe8ff;--g:#f5a623;--ink:#211533;--mut:#6b6478;--ok:#12a86b;--bad:#e34b62}*{box-sizing:border-box}body{margin:0;font-family:Sarabun,sans-serif;background:#f8f3ff;color:var(--ink)}header{position:sticky;top:0;background:rgba(54,18,104,.92);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(14px)}h1,h2,h3{font-family:Kanit;margin:0}a{color:#ffd166;text-decoration:none}.wrap{width:min(1080px,100%);margin:auto;padding:24px 16px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat,.card{background:#fff;border-radius:24px;padding:18px;box-shadow:0 12px 35px rgba(54,18,104,.1);border:1px solid #eee4ff}.stat b{font-family:Kanit;color:var(--pd);font-size:32px;display:block}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.btn{border:0;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--pl);color:var(--pd)}.btn.ok{background:var(--ok);color:#fff}.btn.bad{background:var(--bad);color:#fff}.btn.gold{background:linear-gradient(135deg,#ffd166,#f5a623);color:#351168}.list{display:grid;gap:12px}.item{background:#fff;border-radius:24px;padding:16px;box-shadow:0 10px 30px rgba(54,18,104,.09);display:grid;grid-template-columns:1fr auto;gap:12px;border-left:8px solid var(--p)}.pending{border-left-color:var(--g)}.rejected{border-left-color:var(--bad);opacity:.72}.item h3{color:var(--pd)}.item p{color:var(--mut);margin:4px 0}.tag{display:inline-block;border-radius:999px;background:#fff6df;color:#8a5200;padding:5px 10px;font-weight:800;font-size:12px}.empty{text-align:center;padding:50px}.note{background:#fff8df;border:1px solid #ffe5a2;border-radius:22px;padding:16px;margin-bottom:18px}@media(max-width:760px){.stats{grid-template-columns:1fr 1fr}.item{grid-template-columns:1fr}.wrap{padding:16px 10px}}</style></head><body><header><h2>หลังบ้าน บางรักน้อย Connect</h2><a href="index.html">← กลับหน้าเว็บ</a></header><main class="wrap"><div class="note"><b>โหมดเดโมใช้งานจริงบนเครื่อง:</b> ข้อมูลจากฟอร์มหน้าเว็บจะถูกเก็บใน localStorage และเข้ามารออนุมัติที่หน้านี้ เมื่อต่อ Google Sheet/Apps Script ค่อยเปลี่ยนแหล่งข้อมูลเป็นฐานกลาง</div><section class="stats"><div class="stat"><span>ทั้งหมด</span><b id="sAll">0</b></div><div class="stat"><span>รอตรวจ</span><b id="sPending">0</b></div><div class="stat"><span>เผยแพร่</span><b id="sOk">0</b></div><div class="stat"><span>ไม่อนุมัติ</span><b id="sBad">0</b></div></section><section class="card"><h1>รายการข้อมูลชุมชน</h1><div class="toolbar"><button class="btn" onclick="filter='all';render()">ทั้งหมด</button><button class="btn" onclick="filter='pending';render()">รอตรวจ</button><button class="btn" onclick="filter='approved';render()">เผยแพร่</button><button class="btn gold" onclick="addSample()">เพิ่มตัวอย่าง</button><button class="btn bad" onclick="resetAll()">ล้างข้อมูลเดโม</button></div><div class="list" id="list"></div></section></main><script>const cats={food:'ร้านอาหาร',work:'หาช่าง',career:'ฝึกอาชีพ',news:'ข่าวสาร',service:'บริการชุมชน',product:'สินค้า/บริการท้องถิ่น'};let filter='all';const demo=[{name:'ร้านก๋วยเตี๋ยวเรือริมคลอง',cat:'food',phone:'08x-xxx-xxxx',area:'หมู่ 3',desc:'เมนูท้องถิ่น ราคาชุมชน เปิดช่วงกลางวัน',approved:true},{name:'ช่างไฟใกล้บ้าน บางรักน้อย',cat:'work',phone:'08x-xxx-xxxx',area:'ให้บริการในพื้นที่',desc:'งานไฟบ้าน ซ่อมเบื้องต้น นัดหมายล่วงหน้า',approved:false}];function get(){return JSON.parse(localStorage.getItem('brn_items')||'[]')}function set(x){localStorage.setItem('brn_items',JSON.stringify(x))}function render(){let items=get();document.getElementById('sAll').textContent=items.length;document.getElementById('sPending').textContent=items.filter(x=>x.approved===false).length;document.getElementById('sOk').textContent=items.filter(x=>x.approved===true).length;document.getElementById('sBad').textContent=items.filter(x=>x.approved==='rejected').length;let show=items.map((x,i)=>({...x,i}));if(filter==='pending')show=show.filter(x=>x.approved===false);if(filter==='approved')show=show.filter(x=>x.approved===true);let html=show.map(x=>`<article class="item ${x.approved===false?'pending':x.approved==='rejected'?'rejected':''}"><div><span class="tag">${cats[x.cat]||'อื่น ๆ'} • ${x.approved===true?'เผยแพร่แล้ว':x.approved==='rejected'?'ไม่อนุมัติ':'รอตรวจ'}</span><h3>${x.name}</h3><p>${x.desc||''}</p><p>📍 ${x.area||'-'} &nbsp; ☎️ ${x.phone||'-'}</p></div><div class="toolbar"><button class="btn ok" onclick="approve(${x.i})">อนุมัติ</button><button class="btn bad" onclick="reject(${x.i})">ไม่อนุมัติ</button><button class="btn" onclick="removeItem(${x.i})">ลบ</button></div></article>`).join('');document.getElementById('list').innerHTML=html||'<div class="empty">ยังไม่มีรายการในสถานะนี้</div>'}function approve(i){let a=get();a[i].approved=true;set(a);render()}function reject(i){let a=get();a[i].approved='rejected';set(a);render()}function removeItem(i){let a=get();a.splice(i,1);set(a);render()}function addSample(){let a=get();set([...demo,...a]);render()}function resetAll(){if(confirm('ล้างข้อมูลเดโมทั้งหมด?')){localStorage.removeItem('brn_items');render()}}render();</script></body></html>
