<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5b21b6">
<title>บางรักน้อย Connect — เมือง 3D (ตัวอย่าง)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans Thai',system-ui,sans-serif}
  body{
    --sky-top:#7ec3f2; --sky-mid:#b7dcf7; --sky-low:#e8f4fd;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 45%,var(--sky-low) 100%);
    transition:background 2.5s ease;
  }
  #scene{position:fixed;inset:0;display:block;touch-action:none}

  /* หมุดหมวดหมู่ — สไตล์เดียวกับเว็บหลัก */
  .pin3d{position:fixed;transform:translate(-50%,-100%);z-index:5;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-user-select:none;
    transition:opacity .2s}
  .pin3d .bub{background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border:2px solid #5b21b6;
    border-radius:22px;padding:6px 13px;font-size:12px;font-weight:800;color:#5b21b6;white-space:nowrap;
    box-shadow:0 4px 16px rgba(91,33,182,.3);display:flex;align-items:center;gap:5px;
    transition:background .2s,color .2s,transform .2s}
  .pin3d:hover .bub{background:#5b21b6;color:#fff;transform:scale(1.06)}
  .pin3d .tail{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
    border-top:9px solid #5b21b6;margin-top:-1px}
  .pin3d.hidden{opacity:0;pointer-events:none}

  #topBar{position:fixed;top:0;left:0;right:0;height:56px;z-index:20;display:flex;align-items:center;
    padding:0 14px;gap:10px;background:linear-gradient(180deg,rgba(30,0,70,.7),transparent)}
  #logoArea{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.92);
    border-radius:999px;padding:7px 14px;box-shadow:0 10px 28px rgba(15,23,42,.22)}
  #logoArea b{font-size:14px;color:#3b167e}
  #logoArea small{font-size:10px;color:#8b5cf6;font-weight:800;background:#ede9fe;border-radius:8px;padding:2px 7px}
  #timeCtl{margin-left:auto;display:flex;gap:6px}
  #timeCtl button{border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.14);backdrop-filter:blur(8px);
    color:#fff;border-radius:16px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;
    transition:background .2s}
  #timeCtl button.on{background:linear-gradient(135deg,#f59e0b,#7c3aed);border-color:rgba(255,255,255,.5)}

  #hint{position:fixed;left:50%;bottom:max(16px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:20;
    background:rgba(255,255,255,.93);color:#4c1d95;font-size:12px;font-weight:900;border-radius:999px;
    padding:8px 16px;box-shadow:0 8px 20px rgba(15,23,42,.2);white-space:nowrap;transition:opacity .4s}
  #hint.hide{opacity:0;pointer-events:none}

  /* การ์ดข้อมูลเมื่อกดหมุด */
  #card{position:fixed;left:50%;bottom:-40vh;transform:translateX(-50%);z-index:30;
    width:min(360px,92vw);background:#fff;border-radius:20px;padding:18px;
    box-shadow:0 -8px 40px rgba(0,0,0,.3);transition:bottom .35s cubic-bezier(.32,.72,0,1)}
  #card.open{bottom:max(14px,env(safe-area-inset-bottom))}
  #card h2{font-size:18px;font-weight:900;color:#1e1b4b;margin-bottom:4px}
  #card p{font-size:13px;color:#666;line-height:1.6;margin-bottom:12px}
  #card .go{display:inline-block;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;border:none;
    border-radius:12px;padding:10px 20px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer}
  #cardX{position:absolute;top:12px;right:12px;width:30px;height:30px;border:none;background:#f3f0fa;
    border-radius:50%;font-size:16px;color:#555;cursor:pointer}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="topBar">
  <div id="logoArea"><b>บางรักน้อย Connect</b><small>3D DEMO</small></div>
  <div id="timeCtl">
    <button data-t="auto" class="on">🕐 จริง</button>
    <button data-t="day">☀️</button>
    <button data-t="dusk">🌇</button>
    <button data-t="night">🌙</button>
  </div>
</div>

<div id="hint">🖐️ ลากเพื่อหมุนเมือง · สกรอลล์/ถ่างนิ้วเพื่อซูม · แตะหมุดเพื่อเปิดหมวด</div>

<div id="card">
  <button id="cardX">✕</button>
  <h2 id="cardT"></h2>
  <p id="cardD"></p>
  <button class="go" id="cardGo">เปิดหมวดนี้ →</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══ ฉากพื้นฐาน ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('scene');
const isMobile = window.innerWidth < 700;
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0); // โปร่งใส — ให้เห็นท้องฟ้าไล่สีจาก CSS ด้านหลัง
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 400);

// กล้องแบบเกม: หมุนรอบเมือง + ซูม
const cam = { radius: 46, theta: 0.85, phi: 1.12, target: new THREE.Vector3(0, 2, 0) };
function applyCam(){
  cam.phi = Math.max(0.55, Math.min(1.38, cam.phi));
  cam.radius = Math.max(18, Math.min(80, cam.radius));
  camera.position.set(
    cam.target.x + cam.radius * Math.sin(cam.phi) * Math.sin(cam.theta),
    cam.target.y + cam.radius * Math.cos(cam.phi),
    cam.target.z + cam.radius * Math.sin(cam.phi) * Math.cos(cam.theta)
  );
  camera.lookAt(cam.target);
}

// ═══ วัสดุและตัวช่วยสร้าง ═══════════════════════════════════════════════════
const M = (c, extra={}) => new THREE.MeshLambertMaterial({color:c, ...extra});
function shadowize(m){ m.castShadow = true; m.receiveShadow = true; return m; }
function box(w,h,d,c,x,y,z,parent=scene){
  const m=shadowize(new THREE.Mesh(new THREE.BoxGeometry(w,h,d),M(c))); m.position.set(x,y,z); parent.add(m); return m;
}
function cyl(rt,rb,h,c,x,y,z,seg=10,parent=scene){
  const m=shadowize(new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),M(c))); m.position.set(x,y,z); parent.add(m); return m;
}
function pyramid(r,h,c,x,y,z,parent=scene){ // หลังคาทรงจั่วสี่เหลี่ยม
  const m=shadowize(new THREE.Mesh(new THREE.ConeGeometry(r,h,4),M(c)));
  m.position.set(x,y,z); m.rotation.y=Math.PI/4; parent.add(m); return m;
}

// ═══ พื้นเมือง ═══════════════════════════════════════════════════════════════
cyl(46,46,1.6,0x7bb661,0,-0.8,0,40);           // เกาะหญ้า
cyl(11,11,0.24,0xe8d5a8,0,0.02,4,32);          // ลานทราย
cyl(48,48,6,0x2f6f8f,0,-4.9,0,40);             // ฐานน้ำล้อมเกาะ

// คลอง + สะพานไม้ + เรือ
const water = box(96,0.2,7.5,0x4aa8c9,0,0.06,20);
water.material.transparent = true; water.material.opacity = 0.9;
box(9,0.3,3.4,0x9a6b3f,0,1.05,20);             // พื้นสะพาน
box(9,0.16,0.3,0x7a5330,0,1.75,18.5);
box(9,0.16,0.3,0x7a5330,0,1.75,21.5);
for(const dz of [18.5,21.5]) for(const dx of [-4,-2,0,2,4]) box(0.22,1.5,0.22,0x7a5330,dx,0.9,dz);
const boat = new THREE.Group();
box(2.6,0.5,1.0,0x8a4b2a,0,0,0,boat);
box(2.0,0.34,0.7,0xc9903f,0,0.32,0,boat);
boat.position.set(-18,0.35,20); scene.add(boat);

// ═══ วัด — จุดเด่นของเมือง ═══════════════════════════════════════════════════
const temple = new THREE.Group(); temple.position.set(0,0,-8); scene.add(temple);
box(9,3,7,0xfdf6e3,0,1.5,0,temple);                       // อุโบสถ
pyramid(6.4,2.6,0xc0392b,0,4.2,0,temple);                 // หลังคาชั้นล่าง
pyramid(4.6,2.2,0xe74c3c,0,5.6,0,temple);                 // หลังคาชั้นบน
cyl(0.14,0.14,1.6,0xf1c40f,0,7.3,0,6,temple);             // ช่อฟ้า
box(2.2,2.4,0.2,0x8a5a2b,0,1.2,3.55,temple);              // ประตูไม้
// เจดีย์ทอง
const gold = 0xf5b81c;
cyl(2.4,2.9,1.2,0xfdf6e3,6.8,0.6,-1.5,12,temple);
cyl(1.5,2.1,1.6,gold,6.8,1.9,-1.5,12,temple);
const bell = new THREE.Mesh(new THREE.SphereGeometry(1.35,12,10),M(gold)); bell.position.set(6.8,3.4,-1.5); temple.add(bell);
cyl(0.55,1.1,1.6,gold,6.8,4.9,-1.5,10,temple);
cyl(0.06,0.28,2.4,gold,6.8,6.6,-1.5,8,temple);

// ═══ น้ำพุลานกลางเมือง (มาสคอตยืนตรงนี้ในเว็บจริง) ═══════════════════════════
const fountain = new THREE.Group(); fountain.position.set(0,0,4); scene.add(fountain);
cyl(2.6,2.9,0.5,0xcfd6e0,0,0.25,0,18,fountain);
const fwater = cyl(2.25,2.25,0.3,0x6cc4e8,0,0.55,0,18,fountain);
cyl(0.5,0.6,1.5,0xcfd6e0,0,1.1,0,10,fountain);
const spray = cyl(0.9,0.12,1.1,0x9adcf5,0,2.3,0,10,fountain);
spray.material.transparent=true; spray.material.opacity=0.75;

// ═══ บ้านใต้ถุน + ตลาด + ต้นไม้ ══════════════════════════════════════════════
const houseRoofs=[0xc0563a,0x9b59b6,0x3e7c59,0xc0563a,0x9b59b6];
const winMat = new THREE.MeshLambertMaterial({color:0x3a3f5c, emissive:0x000000});
function house(x,z,ry,i){
  const g=new THREE.Group(); g.position.set(x,0,z); g.rotation.y=ry; scene.add(g);
  for(const dx of [-1.5,1.5]) for(const dz of [-1.2,1.2]) box(0.35,1.6,0.35,0x8a5a2b,dx,0.8,dz,g); // เสา
  box(4.2,2.4,3.4,0xf0e0c0,0,2.8,0,g);
  pyramid(3.3,1.9,houseRoofs[i%houseRoofs.length],0,4.95,0,g);
  const w=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.9,0.12),winMat); w.position.set(0,3.0,1.76); g.add(w);
  return g;
}
const houses=[house(-16,-4,0.5,0),house(-13,6,0.9,1),house(16,-2,-0.6,2),house(13,9,-1.0,3),house(-8,-14,0.25,4)];

function stall(x,z,ry,awning){
  const g=new THREE.Group(); g.position.set(x,0,z); g.rotation.y=ry; scene.add(g);
  box(2.6,0.9,1.4,0xb98a52,0,0.45,0,g);
  for(const dx of [-1.1,1.1]) box(0.14,2.2,0.14,0x7a5330,dx,1.1,-0.55,g);
  const a=new THREE.Mesh(new THREE.BoxGeometry(2.9,0.16,1.9),M(awning)); a.position.set(0,2.2,0); a.rotation.x=-0.2; g.add(a);
  box(0.7,0.4,0.7,0xe74c3c,-0.6,1.1,0.1,g); box(0.7,0.34,0.7,0x27ae60,0.5,1.07,-0.1,g);
}
stall(8,10,-0.5,0xf59e0b); stall(10.5,7,-0.9,0x7c3aed); stall(6,13,-0.2,0xef476f);

function tree(x,z,s=1){
  const g=new THREE.Group(); g.position.set(x,0,z); scene.add(g);
  cyl(0.22*s,0.3*s,1.6*s,0x8a5a2b,0,0.8*s,0,7,g);
  const f=new THREE.Mesh(new THREE.IcosahedronGeometry(1.25*s,0),M(0x3e8e5a)); f.position.set(0,2.2*s,0); g.add(f);
}
[[-20,4],[-18,12],[20,6],[18,14],[-5,16,0.8],[5,-16],[-12,-10,1.2],[14,-9],[21,-8,0.8],[-21,-3,0.9]].forEach(t=>tree(t[0],t[1],t[2]||1));

// ป้ายเมือง
const signG=new THREE.Group(); signG.position.set(-6,0,12); signG.rotation.y=0.4; scene.add(signG);
box(0.18,2.4,0.18,0x7a5330,-1.1,1.2,0,signG); box(0.18,2.4,0.18,0x7a5330,1.1,1.2,0,signG);
box(2.8,1.1,0.14,0x5b21b6,0,2.2,0,signG);

// มาสคอต (ใช้รูปจากเว็บจริง ถ้าไม่มีไฟล์จะข้ามไปเฉย ๆ)
let mascot=null;
new THREE.TextureLoader().load('assets/mascot-stand.webp',(tx)=>{
  const mat=new THREE.SpriteMaterial({map:tx});
  mascot=new THREE.Sprite(mat);
  const ratio = tx.image.height/tx.image.width;
  mascot.scale.set(3.2, 3.2*ratio, 1);
  mascot.position.set(3.4, 1.9, 6.2);
  scene.add(mascot);
},undefined,()=>{});

// ═══ แสงและเวลา ══════════════════════════════════════════════════════════════
const hemi = new THREE.HemisphereLight(0xbfd9ff, 0x6a7b52, 0.9); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.9); sun.position.set(24,32,14); scene.add(sun);
// เงานุ่มแบบเกม — หัวใจของความ "สวย"
sun.castShadow = true;
sun.shadow.mapSize.set(isMobile?1024:2048, isMobile?1024:2048);
sun.shadow.camera.left = -42; sun.shadow.camera.right = 42;
sun.shadow.camera.top = 42;   sun.shadow.camera.bottom = -42;
sun.shadow.camera.far = 120;
sun.shadow.bias = -0.0006;
const lantern1 = new THREE.PointLight(0xffb35c, 0, 16); lantern1.position.set(0,3.5,4); scene.add(lantern1);
const lantern2 = new THREE.PointLight(0xffb35c, 0, 14); lantern2.position.set(0,4,-4); scene.add(lantern2);
scene.fog = new THREE.Fog(0x9fc4e8, 60, 160);

// ดาวยามค่ำคืน
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0;i<220;i++){
  const a=Math.random()*Math.PI*2, r=90+Math.random()*60, y=25+Math.random()*80;
  starPos.push(Math.cos(a)*r, y, Math.sin(a)*r);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.8, transparent:true, opacity:0});
scene.add(new THREE.Points(starGeo, starMat));

// เมฆนุ่ม ๆ ลอยช้า ๆ
const clouds=[];
function cloud(x,y,z,s){
  const g=new THREE.Group();
  const cm=new THREE.MeshLambertMaterial({color:0xffffff, transparent:true, opacity:0.88});
  [[0,0,0,2.4],[1.9,0.3,0.4,1.7],[-1.8,0.2,-0.3,1.5],[0.6,0.8,-0.5,1.3]].forEach(p=>{
    const b=new THREE.Mesh(new THREE.SphereGeometry(p[3],10,8),cm);
    b.scale.y=0.55; b.position.set(p[0],p[1],p[2]); g.add(b);
  });
  g.position.set(x,y,z); g.scale.setScalar(s); scene.add(g); clouds.push(g);
}
cloud(-26,26,-20,1.3); cloud(20,30,-30,1.6); cloud(4,24,28,1.1); cloud(-10,32,14,0.9);

// ดอกไม้รอบลาน
const flowerColors=[0xef476f,0xf59e0b,0xa78bfa,0xffffff];
for(let i=0;i<26;i++){
  const a=Math.random()*Math.PI*2, r=12.5+Math.random()*8;
  const x=Math.cos(a)*r, z=4+Math.sin(a)*r*0.8;
  if(Math.abs(z-20)<5) continue; // เว้นคลอง
  cyl(0.05,0.05,0.4,0x3e8e5a,x,0.2,z,5);
  const f=shadowize(new THREE.Mesh(new THREE.SphereGeometry(0.16,8,6),M(flowerColors[i%4])));
  f.position.set(x,0.46,z); scene.add(f);
}

const PRESETS = {
  dawn:  {top:'#f7a8c0', mid:'#fcd0a1', low:'#fef0dd', fog:0xf3c0a6, hemi:0.75, sun:0.62, sunC:0xffc9a0, lamp:0.5, win:0x000000, stars:0.15},
  day:   {top:'#7ec3f2', mid:'#b7dcf7', low:'#e8f4fd', fog:0xbcdcf5, hemi:0.98, sun:0.95, sunC:0xfffaf0, lamp:0,   win:0x000000, stars:0},
  noon:  {top:'#6ab8ef', mid:'#aed8f7', low:'#eaf6ff', fog:0xb2d8f4, hemi:1.05, sun:1.05, sunC:0xfff6dd, lamp:0,   win:0x000000, stars:0},
  dusk:  {top:'#6d4a9e', mid:'#e0788a', low:'#ffb36b', fog:0xd88f8a, hemi:0.58, sun:0.5,  sunC:0xff9a5c, lamp:0.9, win:0xffc46b, stars:0.35},
  night: {top:'#0c1035', mid:'#1c2455', low:'#2e2a63', fog:0x1e2450, hemi:0.3,  sun:0.14, sunC:0x8aa2ff, lamp:1.5, win:0xffc46b, stars:1}
};
function skyKey(h){ return h>=5&&h<7?'dawn':h>=7&&h<12?'day':h>=12&&h<17?'noon':h>=17&&h<20?'dusk':'night'; }
let timeMode='auto';
function applyTime(){
  const key = timeMode==='auto' ? skyKey(new Date().getHours()) : timeMode;
  const p = PRESETS[key];
  document.body.style.setProperty('--sky-top', p.top);
  document.body.style.setProperty('--sky-mid', p.mid);
  document.body.style.setProperty('--sky-low', p.low);
  scene.fog.color.setHex(p.fog);
  hemi.intensity=p.hemi; sun.intensity=p.sun; sun.color.setHex(p.sunC);
  lantern1.intensity=p.lamp; lantern2.intensity=p.lamp*0.8;
  winMat.emissive.setHex(p.win);
  starMat.opacity=p.stars;
}
applyTime(); setInterval(applyTime, 30000);
document.querySelectorAll('#timeCtl button').forEach(b=>b.addEventListener('click',()=>{
  timeMode=b.dataset.t; applyTime();
  document.querySelectorAll('#timeCtl button').forEach(x=>x.classList.toggle('on',x===b));
}));

// ═══ หมุดหมวดหมู่ 3D ═════════════════════════════════════════════════════════
const ZONES=[
  {id:'craft', icon:'🔧', label:'หาช่าง',          pos:[-14.5,7.2,-4],  desc:'ช่างไฟ ประปา แอร์ ก่อสร้าง ครบทุกประเภทใกล้บ้าน'},
  {id:'food',  icon:'🍜', label:'ร้านอาหาร',        pos:[8,4.6,10],      desc:'ร้านอร่อยและตลาดของชุมชนบางรักน้อย'},
  {id:'travel',icon:'📷', label:'ท่องเที่ยว',        pos:[0,4.2,20],      desc:'ล่องคลองอ้อมนนท์ เที่ยววัด และจุดถ่ายรูปในพื้นที่'},
  {id:'learn', icon:'🎓', label:'ฝึกอาชีพ',         pos:[13,7.5,9],      desc:'คอร์สและกลุ่มฝึกอาชีพสำหรับคนในชุมชน'},
  {id:'market',icon:'🛍', label:'สินค้า/บริการ',     pos:[16,6.8,-2],     desc:'สินค้าชุมชนและบริการต่าง ๆ จากเพื่อนบ้าน'},
  {id:'chat',  icon:'💬', label:'พูดคุย/แลกเปลี่ยน', pos:[-6,4.6,12],     desc:'พื้นที่พูดคุย ถามตอบ และแลกเปลี่ยนของคนบางรักน้อย'},
  {id:'temple',icon:'🛕', label:'วัดบางรักน้อย',     pos:[0,9.4,-8],      desc:'ศูนย์รวมจิตใจของชุมชน ริมคลองอ้อมนนท์'}
];
const pinEls = ZONES.map(z=>{
  const el=document.createElement('div');
  el.className='pin3d';
  el.innerHTML=`<div class="bub"><span>${z.icon}</span>${z.label}</div><div class="tail"></div>`;
  el.addEventListener('click',()=>openCard(z));
  document.body.appendChild(el);
  return {el, v:new THREE.Vector3(...z.pos), zone:z};
});
function openCard(z){
  document.getElementById('cardT').textContent=`${z.icon} ${z.label}`;
  document.getElementById('cardD').textContent=z.desc;
  document.getElementById('card').classList.add('open');
  document.getElementById('hint').classList.add('hide');
  document.getElementById('cardGo').onclick=()=>{ location.href=`index.html#${z.id}`; };
}
document.getElementById('cardX').addEventListener('click',()=>document.getElementById('card').classList.remove('open'));

// ═══ ควบคุมด้วยเมาส์/นิ้ว ════════════════════════════════════════════════════
let dragging=false, lastX=0, lastY=0, pinchDist=0, moved=false;
const touches=new Map();
canvas.addEventListener('pointerdown',e=>{
  touches.set(e.pointerId,{x:e.clientX,y:e.clientY});
  dragging=true; moved=false; lastX=e.clientX; lastY=e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',e=>{
  if(!touches.has(e.pointerId)) return;
  touches.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(touches.size===2){
    const [a,b]=[...touches.values()];
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(pinchDist>0) cam.radius *= pinchDist/d;
    pinchDist=d; moved=true; return;
  }
  if(!dragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
  cam.theta -= dx*0.005;
  cam.phi   -= dy*0.004;
  lastX=e.clientX; lastY=e.clientY;
});
function endPointer(e){ touches.delete(e.pointerId); if(touches.size<2) pinchDist=0; if(touches.size===0) dragging=false; }
canvas.addEventListener('pointerup',endPointer);
canvas.addEventListener('pointercancel',endPointer);
canvas.addEventListener('wheel',e=>{ e.preventDefault(); cam.radius *= (1 + Math.sign(e.deltaY)*0.08); },{passive:false});
canvas.addEventListener('pointerdown',()=>document.getElementById('hint').classList.add('hide'),{once:true});

// ═══ วนเรนเดอร์ ══════════════════════════════════════════════════════════════
function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

const clock=new THREE.Clock();
let idle=0;
const proj=new THREE.Vector3();
function loop(){
  requestAnimationFrame(loop);
  const t=clock.getElapsedTime();
  // หมุนช้า ๆ อัตโนมัติเมื่อไม่ได้แตะ
  if(!dragging){ idle+=clock.getDelta(); if(idle>2) cam.theta += 0.0011; } else idle=0;
  applyCam();
  // แอนิเมชันเล็ก ๆ ให้เมืองมีชีวิต
  boat.position.x = -18 + ((t*1.2) % 40);
  boat.position.y = 0.35 + Math.sin(t*2)*0.05;
  boat.rotation.z = Math.sin(t*1.6)*0.03;
  spray.scale.y = 1 + Math.sin(t*6)*0.12;
  fwater.position.y = 0.55 + Math.sin(t*3)*0.02;
  if(mascot) mascot.position.y = 1.9 + Math.sin(t*2.4)*0.08;
  for(let i=0;i<clouds.length;i++){
    const c=clouds[i];
    c.position.x += 0.008*(1+i*0.3);
    if(c.position.x > 60) c.position.x = -60;
  }
  // ฉายตำแหน่งหมุด 3D → หน้าจอ
  for(const p of pinEls){
    proj.copy(p.v).add(new THREE.Vector3(0, Math.sin(t*2 + p.v.x)*0.18, 0));
    proj.project(camera);
    const behind = proj.z > 1;
    p.el.classList.toggle('hidden', behind);
    if(!behind){
      p.el.style.left = ((proj.x*0.5+0.5)*window.innerWidth)+'px';
      p.el.style.top  = ((-proj.y*0.5+0.5)*window.innerHeight)+'px';
    }
  }
  renderer.render(scene,camera);
}
loop();
</script>
