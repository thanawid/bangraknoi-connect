<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>บางรักน้อย Connect — Living Community</title>
<meta name="description" content="เมืองการ์ตูนมีชีวิตของบางรักน้อย — เมืองคืออินเทอร์เฟซ">
<link rel="icon" href="assets/bc-logo.png">
<style>
:root{
  --purple:#5b21b6;--purple2:#7c3aed;--gold:#f59e0b;--ink:#2b174a;
  --unit:min(1vw,1.7vh);
  --daySky1:#65c8ff;--daySky2:#dff6ff;
}
*{box-sizing:border-box;margin:0;padding:0} html,body{height:100%;overflow:hidden;font-family:system-ui,'Sarabun',sans-serif;background:#73cdf6;color:var(--ink)}
button{font-family:inherit}
.world{position:relative;width:100vw;height:100dvh;overflow:hidden;background:linear-gradient(var(--daySky1),var(--daySky2) 46%,#a7e4ff 47%,#0e8fc1 100%);isolation:isolate;touch-action:none}
.world.night{background:linear-gradient(#10204a,#2a245f 47%,#17315f 48%,#091c36)}
/* Camera stage: this is the game world, not one single background */
.stage{position:absolute;left:50%;top:50%;width:177.78vh;height:100vh;min-width:100vw;min-height:56.25vw;transform:translate(-50%,-50%);transform-origin:center;overflow:hidden}
@media (max-aspect-ratio:16/9){.stage{width:100vw;height:56.25vw;min-height:100vh;min-width:177.78vh}.camera{transform:translateX(var(--pan,0px))}}
.camera{position:absolute;inset:0;transition:transform .7s cubic-bezier(.2,.9,.2,1)}
.layer{position:absolute;pointer-events:none;user-select:none}
.sky-glow{inset:0;background:radial-gradient(circle at 12% 12%,rgba(255,235,150,.8),rgba(255,255,255,0) 18%),linear-gradient(to bottom,rgba(255,255,255,.25),rgba(255,255,255,0) 35%);z-index:1}
.world.night .sky-glow{background:radial-gradient(circle at 82% 14%,rgba(255,255,220,.9),rgba(255,255,255,0) 5%),linear-gradient(to bottom,rgba(3,5,20,.55),rgba(3,5,20,.2) 48%,rgba(3,5,20,.6));}
/* SVG-like CSS layers */
.sun{width:10%;aspect-ratio:1;border-radius:50%;left:8%;top:8%;background:radial-gradient(#fff8bc,#ffd166 55%,rgba(255,209,102,0) 70%);filter:blur(.2px);z-index:2;animation:sunPulse 5s ease-in-out infinite}
@keyframes sunPulse{50%{transform:scale(1.04)}}
.cloud{z-index:5;border-radius:999px;background:rgba(255,255,255,.9);filter:drop-shadow(0 8px 18px rgba(85,120,160,.16));animation:drift linear infinite}.cloud:before,.cloud:after{content:"";position:absolute;background:inherit;border-radius:50%}.cloud:before{width:48%;aspect-ratio:1;left:12%;top:-55%}.cloud:after{width:62%;aspect-ratio:1;right:12%;top:-75%}.c1{width:12%;height:4%;left:-20%;top:9%;animation-duration:78s}.c2{width:8%;height:3%;left:-16%;top:20%;animation-delay:18s;animation-duration:92s;opacity:.75}.c3{width:14%;height:4.5%;left:-22%;top:5%;animation-delay:40s;animation-duration:105s;opacity:.8}@keyframes drift{to{transform:translateX(135vw)}}
.bird{z-index:10;font-size:calc(var(--unit)*1.6);opacity:.65;animation:birdfly linear infinite}.b1{left:-5%;top:16%;animation-duration:28s}.b2{left:-7%;top:12%;animation-duration:38s;animation-delay:12s}.b3{left:-10%;top:23%;animation-duration:45s;animation-delay:22s}@keyframes birdfly{to{transform:translate(115vw,-4vh)}}
.horizon{left:-5%;right:-5%;top:32%;height:20%;z-index:3;background:linear-gradient(to bottom,rgba(35,135,75,.65),rgba(81,162,82,.9));clip-path:polygon(0 45%,10% 40%,22% 52%,34% 34%,48% 50%,60% 42%,76% 56%,90% 39%,100% 45%,100% 100%,0 100%)}
.houses{left:0;right:0;top:35%;height:20%;z-index:6;background-image:linear-gradient(135deg,transparent 0 46%,#b45309 47% 54%,transparent 55%),linear-gradient(#fff7ed,#fff7ed);background-size:8% 42%,8% 34%;background-position:2% 0,2% 22%;opacity:.65;mask-image:linear-gradient(to right,transparent,#000 10%,#000 92%,transparent)}
.rail{left:50%;top:24%;width:118%;height:15%;transform:translateX(-50%);z-index:16}.train{left:-42%;top:26%;width:34%;z-index:23;animation:trainRun 58s linear infinite;filter:drop-shadow(0 10px 10px rgba(40,20,80,.25))}@keyframes trainRun{0%{transform:translateX(-20%)}100%{transform:translateX(420%)}}
/* Main land/river */
.river{left:-8%;right:-8%;bottom:0;height:45%;z-index:14;background:linear-gradient(180deg,#27a5d8,#086fa6 72%,#044f7d);clip-path:polygon(0 12%,100% 0,100% 100%,0 100%)}.world.night .river{filter:brightness(.55) saturate(.8)}
.wave{left:0;right:0;bottom:18%;height:8%;z-index:18;background:url('assets/wave.svg') repeat-x;background-size:22% 100%;opacity:.65;animation:waveMove 12s linear infinite}.wave.w2{bottom:7%;opacity:.4;animation-duration:18s}@keyframes waveMove{to{background-position-x:22%}}
.frontwalk{left:0;right:0;bottom:0;height:18%;z-index:28;background:linear-gradient(#d2b48c,#b98c5d);clip-path:polygon(0 58%,32% 48%,55% 65%,100% 45%,100% 100%,0 100%)}.frontwalk:before{content:"";position:absolute;inset:8% 0 auto 0;height:6px;background:rgba(255,255,255,.38)}
.plants{left:0;right:0;bottom:12%;height:8%;z-index:31;background:radial-gradient(circle,#ff71ad 0 9%,transparent 10%) 0 0/6% 80%,radial-gradient(circle,#facc15 0 8%,transparent 9%) 3% 12%/7% 80%,linear-gradient(to top,#166534,#22c55e);mask-image:linear-gradient(to bottom,transparent,#000 38%)}
/* Land strip across river */
.prom{left:0;right:0;top:48%;height:13%;z-index:35;background:linear-gradient(#e0c089,#b98c5d);box-shadow:0 10px 0 rgba(80,45,25,.25)}
.prom:after{content:"";position:absolute;left:0;right:0;bottom:-12px;height:15px;background:repeating-linear-gradient(90deg,#f1e4cf 0 28px,#d6b17d 28px 34px)}
/* World kit assets */
.temple{left:4%;top:24%;width:34%;z-index:42;filter:drop-shadow(0 12px 20px rgba(80,30,10,.24))}.hall{left:36%;top:28%;width:30%;z-index:43;filter:drop-shadow(0 12px 18px rgba(80,30,10,.24))}.market{right:5%;top:39%;width:31%;z-index:44;filter:drop-shadow(0 12px 18px rgba(80,30,10,.24))}.orchard{left:-2%;bottom:8%;width:19%;z-index:50;filter:drop-shadow(0 8px 12px rgba(0,0,0,.2))}.pier{right:4%;bottom:22%;width:23%;height:10%;z-index:48;border:10px solid #7c4a22;border-top:18px solid #8b5a2b;border-radius:8px;transform:skewX(-12deg);opacity:.92}.pier:before,.pier:after{content:"";position:absolute;background:#714115}.pier:before{left:12%;right:12%;top:34%;height:8px}.pier:after{left:28%;right:28%;bottom:-28px;height:42px}
.boat{width:22%;z-index:36;left:-22%;bottom:18%;animation:boatRun 44s linear infinite;filter:drop-shadow(0 14px 14px rgba(0,25,50,.24))}.boat.small{width:10%;bottom:29%;animation-duration:62s;animation-delay:18s;opacity:.9}@keyframes boatRun{0%{transform:translateX(-10%) translateY(0)}25%{transform:translateX(125vw) translateY(-4vh)}25.01%{transform:translateX(125vw) translateY(-4vh) scaleX(-1)}50%{transform:translateX(-30vw) translateY(4vh) scaleX(-1)}50.01%{transform:translateX(-30vw) translateY(4vh) scaleX(1)}100%{transform:translateX(125vw) translateY(-4vh)}}
.duck{width:5%;z-index:38;left:42%;bottom:22%;animation:duckSwim 18s ease-in-out infinite alternate}.duck.d2{left:48%;bottom:18%;width:3.8%;animation-duration:23s}@keyframes duckSwim{to{transform:translateX(12vw) translateY(-2vh)}}
.treeShade{left:0;top:0;width:24%;height:43%;z-index:60;background:radial-gradient(circle at 18% 18%,#17642a 0 32%,transparent 33%),radial-gradient(circle at 35% 5%,#1f8f3a 0 27%,transparent 28%);filter:drop-shadow(0 8px 12px rgba(0,0,0,.28));opacity:.95}.treeShade:before{content:"";position:absolute;left:5%;top:0;width:6%;height:100%;background:#5a351d;transform:rotate(18deg);border-radius:40px}
/* interactive places, subtle chips emerge from place (not big UI) */
.place{position:absolute;z-index:75;border:0;border-radius:999px;padding:.55em .85em;background:rgba(255,255,255,.78);backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(40,20,80,.18);font-weight:800;color:#3b1579;cursor:pointer;font-size:clamp(11px,1.1vw,15px);display:flex;gap:.35em;align-items:center;opacity:0;transform:translateY(14px) scale(.86);transition:.22s}.world.ready .place{opacity:1;transform:none}.place:hover{transform:translateY(-5px) scale(1.05);background:#fff}.p-food{right:14%;top:48%;transition-delay:.15s}.p-craft{right:3%;top:48%;transition-delay:.25s}.p-market{right:20%;top:39%;transition-delay:.35s}.p-service{left:47%;top:40%;transition-delay:.45s}.p-news{left:54%;top:18%;transition-delay:.55s}.p-event{left:45%;bottom:22%;transition-delay:.65s}.p-learn{left:17%;top:40%;transition-delay:.75s}.p-chat{right:26%;bottom:19%;transition-delay:.85s}
/* BC guide */
.bc{left:-14%;bottom:8%;width:11%;min-width:84px;z-index:78;filter:drop-shadow(0 14px 20px rgba(30,10,60,.3));animation:bcEnter 4s cubic-bezier(.2,.9,.2,1) 1s forwards,bcIdle 2.6s ease-in-out 5.1s infinite}@keyframes bcEnter{0%{left:-15%;transform:translateY(0)}25%{transform:translateY(-8px)}50%{transform:translateY(4px)}100%{left:11%;transform:translateY(0)}}@keyframes bcIdle{50%{transform:translateY(-8px)}}
.speech{position:absolute;left:20%;bottom:20%;z-index:80;max-width:320px;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-radius:22px 22px 22px 6px;padding:12px 16px;box-shadow:0 12px 34px rgba(40,20,80,.22);font-weight:800;color:#35136e;font-size:clamp(13px,1.3vw,17px);opacity:0;transform:translateY(8px);pointer-events:none}.speech.show{animation:say 3.2s ease both}@keyframes say{0%{opacity:0;transform:translateY(8px)}12%,78%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-6px)}}
/* small page icons */
.logo{position:absolute;left:18px;top:18px;width:54px;height:54px;z-index:100;border-radius:16px;background:rgba(255,255,255,.55);backdrop-filter:blur(14px);box-shadow:0 8px 24px rgba(30,10,60,.18);display:grid;place-items:center}.logo img{max-width:82%;max-height:82%;object-fit:contain}.tools{position:absolute;right:18px;top:18px;z-index:100;display:flex;gap:10px}.tools button{width:44px;height:44px;border:0;border-radius:50%;background:rgba(255,255,255,.58);backdrop-filter:blur(14px);color:#4c1d95;font-size:20px;font-weight:900;box-shadow:0 8px 24px rgba(30,10,60,.16);cursor:pointer;transition:.18s}.tools button:hover{transform:translateY(-3px);background:#fff}
/* Place info as a tiny in-world sheet, not dashboard */
.sheet{position:absolute;right:2.5%;bottom:5%;z-index:120;width:min(340px,88vw);background:rgba(255,255,255,.86);backdrop-filter:blur(16px);border-radius:24px;padding:18px;box-shadow:0 18px 50px rgba(30,10,60,.25);opacity:0;pointer-events:none;transform:translateY(18px);transition:.25s}.sheet.on{opacity:1;pointer-events:auto;transform:none}.sheet h2{font-size:21px;margin-bottom:4px;color:#3b1579}.sheet p{font-size:13px;color:#6b5b80;margin-bottom:12px}.items{display:grid;gap:8px}.item{display:flex;gap:10px;align-items:center;background:#f5f0ff;border-radius:16px;padding:10px}.item i{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,#5b21b6,#f59e0b);display:grid;place-items:center;font-style:normal}.item span{font-size:13px;font-weight:800}.close{position:absolute;right:12px;top:12px;border:0;border-radius:50%;background:#ede9fe;color:#4c1d95;width:28px;height:28px;font-size:18px;cursor:pointer}
/* weather/time modes */
.world.evening{filter:hue-rotate(-8deg) saturate(.98)}.world.evening .sky-glow{background:radial-gradient(circle at 12% 18%,rgba(255,150,80,.55),rgba(255,255,255,0) 24%)}.world.night .stage{filter:brightness(.63) saturate(.82)}.world.night .place,.world.night .speech,.world.night .sheet{background:rgba(255,255,255,.82)}
/* mobile */
@media(max-width:760px){.logo{width:46px;height:46px}.tools button{width:39px;height:39px}.place{font-size:11px;padding:.5em .7em}.bc{width:14%;bottom:7%}.speech{left:18%;bottom:22%;max-width:220px}.temple{width:38%;left:1%;top:25%}.hall{width:33%;left:35%;top:29%}.market{width:36%;right:0;top:41%}.p-food{right:12%;top:50%}.p-craft{right:1%;top:51%}.p-news{left:56%;top:20%}.p-event{left:43%;bottom:24%}.p-chat{right:26%;bottom:22%}}
</style>
</head>
<body>
<main class="world" id="world" aria-label="บางรักน้อย Connect เมืองการ์ตูนมีชีวิต">
  <section class="stage" id="stage">
    <div class="camera" id="camera">
      <div class="layer sky-glow"></div><div class="layer sun"></div>
      <div class="layer cloud c1"></div><div class="layer cloud c2"></div><div class="layer cloud c3"></div>
      <div class="layer bird b1">⌁</div><div class="layer bird b2">⌁</div><div class="layer bird b3">⌁</div>
      <div class="layer horizon"></div><div class="layer houses"></div>
      <img class="layer rail" src="assets/rail.svg" alt=""><img class="layer train" src="assets/train.svg" alt="รถไฟฟ้าวิ่งผ่าน">
      <div class="layer river"></div><div class="layer wave"></div><div class="layer wave w2"></div>
      <div class="layer prom"></div>
      <img class="layer temple" src="assets/temple-buddha.svg" alt="วัดบางรักน้อยและพระใหญ่">
      <img class="layer hall" src="assets/townhall.svg" alt="เทศบาลเมืองบางรักน้อย">
      <img class="layer market" src="assets/market.svg" alt="ตลาด ร้านอาหาร และร้านช่าง">
      <div class="layer pier"></div>
      <img class="layer orchard" src="assets/tree.svg" alt="สวนทุเรียนและสวนผลไม้">
      <img class="layer boat" src="assets/boat.svg" alt="เรือในคลองอ้อมนนท์"><img class="layer boat small" src="assets/boat-small.svg" alt="เรือเล็ก">
      <img class="layer duck" src="assets/duck.svg" alt="เป็ดว่ายน้ำ"><img class="layer duck d2" src="assets/duck.svg" alt="เป็ดว่ายน้ำ">
      <div class="layer frontwalk"></div><div class="layer plants"></div><div class="layer treeShade"></div>
      <button class="place p-learn" data-zone="learn">🎓 ฝึกอาชีพ</button>
      <button class="place p-service" data-zone="service">❤️ บริการ</button>
      <button class="place p-news" data-zone="news">📢 ข่าวสาร</button>
      <button class="place p-market" data-zone="market">🛍️ ตลาด</button>
      <button class="place p-food" data-zone="food">🍜 ร้านอาหาร</button>
      <button class="place p-craft" data-zone="craft">🔧 หาช่าง</button>
      <button class="place p-event" data-zone="event">🎉 กิจกรรม</button>
      <button class="place p-chat" data-zone="chat">💬 พูดคุย</button>
      <img class="layer bc" id="bc" src="assets/bc-guide.svg" alt="มาสคอต BC">
      <div class="speech" id="speech"></div>
    </div>
  </section>
  <a class="logo" href="#" aria-label="บางรักน้อย Connect"><img src="assets/bc-logo.png" alt="BC"></a>
  <div class="tools"><button id="home" title="กลับหน้าเมือง">⌂</button><button id="sound" title="เสียง">♪</button><button id="menu" title="เมนู">☰</button></div>
  <aside class="sheet" id="sheet"><button class="close" id="close">×</button><h2 id="title"></h2><p id="sub"></p><div class="items" id="items"></div></aside>
</main>
<script>
const zones={
 food:['ร้านอาหาร','ของอร่อยริมคลอง ร้านแนะนำ และร้านใกล้บ้าน',[['🍜','ก๋วยเตี๋ยวเรือ / อาหารตามสั่ง'],['☕','คาเฟ่ริมคลอง'],['⭐','ร้านแนะนำของชุมชน']]],
 craft:['หาช่าง','ช่างในพื้นที่ หาง่าย ติดต่อไว',[['🔧','ช่างทั่วไป'],['⚡','ช่างไฟ'],['💧','ช่างประปา']]],
 market:['ตลาด / สินค้า','สินค้าและบริการท้องถิ่น',[['🛍️','ตลาดบางรักน้อย'],['🌳','ผลไม้ตามฤดูกาล'],['🎁','สินค้าและบริการชุมชน']]],
 service:['บริการชุมชน','บริการและช่องทางช่วยเหลือประชาชน',[['🏛️','ติดต่อหน่วยงาน'],['📍','แจ้งปัญหาในพื้นที่'],['📋','ข้อมูลบริการ']]],
 news:['ข่าวสาร','ประกาศ ข่าว และแจ้งเตือนสำคัญ',[['📢','ข่าวประชาสัมพันธ์'],['⚠️','แจ้งเตือน'],['🚇','การเดินทาง / รถไฟฟ้า']]],
 event:['กิจกรรม','กิจกรรมในชุมชนและพื้นที่ใกล้บ้าน',[['🎉','กิจกรรมประจำเดือน'],['🏃','สุขภาพ / กีฬา'],['🛕','งานวัด / งานประเพณี']]],
 learn:['ฝึกอาชีพ','เรียนรู้ทักษะใหม่ สร้างรายได้',[['🎓','หลักสูตรฝึกอาชีพ'],['💻','ทักษะดิจิทัล'],['🌿','เกษตร / สวนผลไม้']]],
 chat:['พูดคุย','พื้นที่แลกเปลี่ยนของคนในชุมชน',[['💬','ถาม-ตอบ'],['🤝','ช่วยเหลือกัน'],['❤️','เรื่องดี ๆ ในบางรักน้อย']]]
};
const world=document.getElementById('world'), cam=document.getElementById('camera'), speech=document.getElementById('speech'), sheet=document.getElementById('sheet');
function timeMode(){const h=new Date().getHours();world.classList.toggle('night',h>=18||h<6);world.classList.toggle('evening',h>=16&&h<18)}timeMode();setInterval(timeMode,60000);
function say(t,delay=0){setTimeout(()=>{speech.innerHTML=t;speech.classList.remove('show');void speech.offsetWidth;speech.classList.add('show')},delay)}
window.addEventListener('load',()=>{setTimeout(()=>say('สวัสดีครับ 😊'),1800);setTimeout(()=>say('ยินดีต้อนรับสู่บางรักน้อย Connect'),5200);setTimeout(()=>say('วันนี้...จะพาไปไหนดีครับ?'),8800);setTimeout(()=>world.classList.add('ready'),9800)});
function openZone(key){const z=zones[key];if(!z)return;document.getElementById('title').textContent=z[0];document.getElementById('sub').textContent=z[1];document.getElementById('items').innerHTML=z[2].map(x=>`<div class="item"><i>${x[0]}</i><span>${x[1]}</span></div>`).join('');sheet.classList.add('on');const moves={learn:'translateX(10%) scale(1.06)',service:'scale(1.06)',news:'translateY(4%) scale(1.04)',market:'translateX(-10%) scale(1.06)',food:'translateX(-12%) scale(1.08)',craft:'translateX(-18%) scale(1.08)',event:'translateY(-6%) scale(1.05)',chat:'translateX(-8%) translateY(-3%) scale(1.05)'};cam.style.transform=moves[key]||''}
document.querySelectorAll('.place').forEach(b=>b.addEventListener('click',e=>openZone(e.currentTarget.dataset.zone)));
document.getElementById('close').onclick=()=>{sheet.classList.remove('on');cam.style.transform=''};
document.getElementById('home').onclick=()=>{sheet.classList.remove('on');cam.style.transform='';say('ลองเดินดูในเมืองได้เลยครับ 😊')};
document.getElementById('sound').onclick=()=>say('เสียงเมืองจะปลูกในรอบถัดไปครับ ♪');
document.getElementById('menu').onclick=()=>world.classList.toggle('ready');
// mobile pan
let startX=0,pan=0;const stage=document.getElementById('stage');stage.addEventListener('touchstart',e=>{startX=e.touches[0].clientX},{passive:true});stage.addEventListener('touchmove',e=>{if(innerWidth>760)return;const dx=e.touches[0].clientX-startX;pan=Math.max(-260,Math.min(260,pan+dx*.08));stage.style.setProperty('--pan',pan+'px')},{passive:true});
</script>
</body>
</html>
