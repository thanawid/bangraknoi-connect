<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>บางรักน้อย Connect — Play Map</title>
  <meta name="description" content="บางรักน้อย Connect — เมืองการ์ตูนมีชีวิต รวมข้อมูลชุมชนบางรักน้อย" />
  <style>
    :root{
      --purple:#5d2f91;--purple2:#7b45c5;--gold:#f6aa24;--glass:rgba(255,255,255,.82);
      --shadow:0 18px 50px rgba(40,22,80,.22);--text:#2f2050;
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;background:#8fd9ff;overflow:hidden;color:var(--text)}
    body.night{background:#08152e}.world{position:relative;width:100vw;height:100dvh;overflow:hidden;background:#7dd6ff}.world::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,rgba(255,255,255,.04),rgba(255,220,140,.16));mix-blend-mode:soft-light}.night .world::after{background:linear-gradient(to bottom,rgba(5,8,35,.45),rgba(30,18,70,.55));mix-blend-mode:multiply}.scene{position:absolute;inset:0;background-image:url('assets/playmap-master.png');background-size:cover;background-position:center center;transform:scale(1.02);filter:saturate(1.04) contrast(1.02);transition:filter .8s ease}.night .scene{filter:brightness(.58) saturate(.9) hue-rotate(6deg)}
    .brand{position:absolute;left:24px;top:22px;z-index:20;display:flex;align-items:center;gap:10px;padding:8px 13px 8px 9px;border-radius:18px;background:rgba(255,255,255,.74);box-shadow:var(--shadow);backdrop-filter:blur(14px)}.brand img{width:42px;height:42px;object-fit:contain}.brand b{font-size:15px;color:#fff;text-shadow:0 2px 4px #4b2b88;background:linear-gradient(90deg,#6a35bb,#f0a324);-webkit-background-clip:text;color:transparent}.brand span{display:block;font-size:10.5px;font-weight:800;color:#594172;margin-top:1px}.hamb{position:absolute;right:24px;top:25px;z-index:22;width:48px;height:48px;border:0;border-radius:50%;background:rgba(88,49,147,.9);color:#fff;font-size:25px;box-shadow:var(--shadow);cursor:pointer}.hamb:hover{transform:translateY(-2px)}
    .sun{position:absolute;right:14%;top:13%;width:78px;height:78px;border-radius:50%;background:radial-gradient(circle,#fff39a 0,#ffc33d 48%,rgba(255,185,52,.2) 70%);box-shadow:0 0 45px rgba(255,199,61,.8);animation:floatSun 8s ease-in-out infinite;z-index:3}.night .sun{right:11%;top:10%;background:radial-gradient(circle,#fff 0,#dfe8ff 52%,rgba(230,237,255,.1) 75%);box-shadow:0 0 35px rgba(210,226,255,.7)}@keyframes floatSun{50%{transform:translateY(10px)}}
    .cloud{position:absolute;z-index:8;width:110px;height:45px;border-radius:50px;background:rgba(255,255,255,.7);filter:blur(.2px);animation:cloudMove linear infinite}.cloud:before,.cloud:after{content:"";position:absolute;background:rgba(255,255,255,.74);border-radius:50%}.cloud:before{width:50px;height:50px;left:19px;top:-22px}.cloud:after{width:68px;height:68px;right:12px;top:-34px}.c1{left:10%;top:17%;animation-duration:52s}.c2{left:44%;top:29%;animation-duration:65s;transform:scale(.72)}.c3{left:76%;top:19%;animation-duration:58s;transform:scale(.9)}@keyframes cloudMove{from{margin-left:-160px}to{margin-left:120vw}}
    .bird{position:absolute;z-index:10;font-size:24px;animation:birdFly linear infinite;opacity:.85}.b1{left:-5%;top:18%;animation-duration:18s}.b2{left:-9%;top:23%;animation-duration:24s;animation-delay:5s}.b3{left:-7%;top:14%;animation-duration:30s;animation-delay:10s}@keyframes birdFly{to{transform:translateX(112vw) translateY(-20px)}}
    .river-shine{position:absolute;left:21%;top:27%;width:31%;height:61%;z-index:9;pointer-events:none;overflow:hidden;border-radius:48%;transform:rotate(7deg);opacity:.4}.river-shine::before{content:"";position:absolute;inset:-30%;background:repeating-linear-gradient(115deg,transparent 0 28px,rgba(255,255,255,.34) 30px,transparent 34px);animation:water 8s linear infinite}@keyframes water{to{transform:translate(80px,50px)}}
    .train{position:absolute;right:-28%;top:13.6%;z-index:7;width:22%;height:22px;border-radius:999px;background:linear-gradient(90deg,#fff,#d9d2ff 65%,#6f35c9);box-shadow:0 8px 18px rgba(50,20,90,.25);animation:train 95s linear infinite;opacity:.9}.train:after{content:"";position:absolute;inset:7px 18px;background:repeating-linear-gradient(90deg,#7d55bd 0 18px,transparent 18px 29px)}@keyframes train{0%,25%{transform:translateX(0);opacity:0}28%{opacity:.9}55%{transform:translateX(-142vw);opacity:.9}57%,100%{opacity:0;transform:translateX(-142vw)}}
    .smoke{position:absolute;right:10%;bottom:25%;z-index:12;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.55);animation:smoke 4.5s ease-in-out infinite}.smoke:before,.smoke:after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.45)}.smoke:before{width:22px;height:22px;left:16px;top:-14px}.smoke:after{width:14px;height:14px;left:-12px;top:-22px}@keyframes smoke{0%{transform:translateY(0) scale(.8);opacity:0}25%{opacity:.75}100%{transform:translateY(-80px) scale(1.8);opacity:0}}
    .leaf{position:absolute;z-index:11;top:-20px;font-size:18px;animation:leafFall linear infinite;opacity:.8}.l1{left:14%;animation-duration:13s}.l2{left:5%;animation-duration:16s;animation-delay:4s}.l3{right:7%;animation-duration:15s;animation-delay:7s}@keyframes leafFall{to{transform:translate(80px,105vh) rotate(360deg)}}
    .guide{position:absolute;right:5%;bottom:4%;z-index:25;display:flex;align-items:flex-end;gap:10px;animation:guideIn 1.2s ease both}.guide-body{width:98px;height:138px;background:url('assets/logo-bc.png') center 76%/52px auto no-repeat,linear-gradient(#7b36c8,#5d2499);border-radius:48% 48% 42% 42%;box-shadow:0 12px 24px rgba(30,10,60,.25);position:relative}.guide-body:before{content:"";position:absolute;left:25px;top:-42px;width:54px;height:54px;border-radius:50%;background:#ffd7b0;box-shadow:inset 0 -5px 0 rgba(0,0,0,.08)}.guide-body:after{content:"👋";position:absolute;right:-24px;top:-2px;font-size:30px;animation:wave 1.6s ease-in-out infinite;transform-origin:bottom left}.guide-talk{max-width:250px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-radius:18px;padding:12px 16px;font-weight:900;box-shadow:var(--shadow);font-size:16px}.guide-talk span{display:block;font-size:12px;font-weight:700;color:#705b86;margin-top:3px}@keyframes guideIn{from{opacity:0;transform:translateX(70px)}to{opacity:1;transform:translateX(0)}}@keyframes wave{50%{transform:rotate(14deg)}}
    .compass{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:30;display:flex;gap:8px;padding:9px;border-radius:24px;background:rgba(255,255,255,.72);backdrop-filter:blur(18px);box-shadow:var(--shadow)}.chip{border:0;background:#fff;color:#4d287a;border-radius:17px;padding:10px 13px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(50,20,80,.12);transition:.2s}.chip:hover{transform:translateY(-4px);background:#fff6df}.chip.primary{background:linear-gradient(135deg,#7138c9,#f4a621);color:#fff}
    .hotspot{position:absolute;z-index:18;border-radius:50%;cursor:pointer;outline:2px solid transparent;transition:.2s}.hotspot::after{content:attr(data-label);position:absolute;left:50%;bottom:100%;transform:translate(-50%,-8px) scale(.94);white-space:nowrap;background:rgba(255,255,255,.9);color:#43276f;padding:8px 12px;border-radius:14px;font-weight:900;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s}.hotspot:hover{background:rgba(255,222,89,.18);box-shadow:0 0 0 9999px rgba(255,255,255,.03),0 0 0 3px rgba(255,211,74,.75),0 0 32px rgba(255,210,74,.55)}.hotspot:hover::after{opacity:1;transform:translate(-50%,-12px) scale(1)}.h-food{right:4%;bottom:21%;width:20%;height:26%;border-radius:30px}.h-service{right:39%;top:26%;width:18%;height:25%;border-radius:40px}.h-temple{left:4%;top:15%;width:30%;height:34%;border-radius:40px}.h-market{right:4%;top:25%;width:18%;height:22%;border-radius:34px}.h-river{left:25%;top:27%;width:32%;height:46%;border-radius:45%}.h-orchard{left:0;bottom:16%;width:25%;height:32%;border-radius:40px}.h-news{left:10%;bottom:5%;width:20%;height:14%;border-radius:28px}.h-talk{right:20%;bottom:2%;width:17%;height:16%;border-radius:28px}
    .drawer{position:absolute;right:22px;top:86px;z-index:60;width:min(380px,calc(100vw - 36px));background:rgba(255,255,255,.92);border-radius:28px;padding:18px;box-shadow:var(--shadow);backdrop-filter:blur(16px);transform:translateX(calc(100% + 40px));transition:.28s ease}.drawer.open{transform:translateX(0)}.drawer h2{margin:0 0 6px;font-size:24px;color:#43206c}.drawer p{margin:0 0 14px;color:#6d6178}.drawer .item{display:flex;gap:10px;align-items:center;padding:11px;border-radius:18px;background:#f7f2ff;margin:8px 0;font-weight:800}.drawer .icon{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#7639c9,#f2a31d);display:grid;place-items:center;color:#fff}.drawer .close{position:absolute;right:14px;top:12px;border:0;background:#eee2ff;border-radius:50%;width:34px;height:34px;font-size:20px;cursor:pointer}
    .menu-panel{position:absolute;right:20px;top:82px;z-index:65;display:none;flex-direction:column;gap:8px;background:rgba(255,255,255,.86);padding:12px;border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}.menu-panel.show{display:flex}.menu-panel button{border:0;background:#fff;border-radius:15px;padding:11px 14px;font-weight:900;color:#512b82;text-align:left}
    @media(max-width:820px){.brand{left:12px;top:12px}.brand b,.brand span{display:none}.brand img{width:38px;height:38px}.hamb{right:14px;top:14px}.scene{background-position:center center;transform:scale(1.25)}.compass{width:calc(100% - 20px);overflow:auto;justify-content:flex-start;bottom:12px}.chip{white-space:nowrap}.guide{right:5px;bottom:78px;transform:scale(.82);transform-origin:right bottom}.guide-talk{display:none}.hotspot::after{display:none}.drawer{right:10px;top:74px}.h-temple{left:0;top:13%;width:40%;height:31%}.h-food{right:0;bottom:18%;width:34%;height:24%}.h-service{right:24%;top:29%;width:28%;height:23%}.h-river{left:26%;top:28%;width:42%;height:46%}.h-market{right:0;top:26%;width:26%;height:23%}.h-orchard{left:0;bottom:17%;width:35%;height:32%}}
  </style>
</head>
<body>
  <main class="world" id="world">
    <div class="scene"></div><div class="sun"></div>
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="bird b1">⌁</div><div class="bird b2">⌁</div><div class="bird b3">⌁</div>
    <div class="river-shine"></div><div class="train"></div><div class="smoke"></div>
    <div class="leaf l1">🍃</div><div class="leaf l2">🍂</div><div class="leaf l3">🍃</div>
    <div class="brand"><img src="assets/logo-bc.png" alt="BC"><div><b>บางรักน้อย Connect</b><span>ชุมชนใกล้ตัว เชื่อมถึงกัน</span></div></div>
    <button class="hamb" id="hamb" aria-label="เมนู">≡</button>
    <nav class="menu-panel" id="menuPanel"><button data-zone="food">ร้านอาหาร</button><button data-zone="craft">หาช่าง</button><button data-zone="market">สินค้า/บริการ</button><button data-zone="event">กิจกรรม</button><button data-zone="news">ข่าวสาร</button><button data-zone="learn">ฝึกอาชีพ</button><button data-zone="service">บริการชุมชน</button><button data-zone="talk">พูดคุย</button></nav>
    <button class="hotspot h-food" data-zone="food" data-label="ร้านอาหาร"></button><button class="hotspot h-service" data-zone="service" data-label="บริการชุมชน"></button><button class="hotspot h-temple" data-zone="place" data-label="สถานที่สำคัญ"></button><button class="hotspot h-market" data-zone="market" data-label="สินค้า/บริการ"></button><button class="hotspot h-river" data-zone="tour" data-label="เที่ยวริมคลอง"></button><button class="hotspot h-orchard" data-zone="local" data-label="ของดีบางรักน้อย"></button><button class="hotspot h-news" data-zone="news" data-label="ข่าวสาร"></button><button class="hotspot h-talk" data-zone="talk" data-label="พูดคุย"></button>
    <section class="guide"><div class="guide-body"></div><div class="guide-talk">วันนี้อยากไปไหนครับ?<span>แตะเมือง หรือเลือกจากเข็มทิศด้านล่าง</span></div></section>
    <div class="compass"><button class="chip primary" data-zone="all">สำรวจเมือง</button><button class="chip" data-zone="food">ร้านอาหาร</button><button class="chip" data-zone="craft">หาช่าง</button><button class="chip" data-zone="market">สินค้า</button><button class="chip" data-zone="event">กิจกรรม</button><button class="chip" data-zone="news">ข่าว</button><button class="chip" data-zone="service">บริการ</button><button class="chip" data-zone="talk">พูดคุย</button></div>
    <aside class="drawer" id="drawer"><button class="close" id="close">×</button><h2 id="drawerTitle">บางรักน้อย</h2><p id="drawerDesc">เมืองเล่าเรื่อง ส่วนข้อมูลจะโผล่เมื่อผู้ใช้ต้องการ</p><div id="drawerItems"></div></aside>
  </main>
  <script>
    const data={
      all:['ลองแตะอาคาร ร้าน คลอง วัด หรือสวน','เมืองคือเมนู ไม่ใช่ปุ่มบนเว็บ','ข้อมูลจริงจะต่อเข้ามาในรอบถัดไป'],
      food:['ก๋วยเตี๋ยวเรือริมคลอง','คาเฟ่บางรัก','ร้านอาหารชุมชน'],
      craft:['ช่างไฟใกล้บ้าน','ช่างประปา','ช่างแอร์/ซ่อมบ้าน'],
      market:['ตลาดบางรักน้อย','ผลไม้ตามฤดูกาล','สินค้า/บริการท้องถิ่น'],
      event:['กิจกรรมชุมชน','งานผู้สูงอายุ','กิจกรรมเทศกาล'],
      news:['ประกาศข่าวสาร','แจ้งเตือนชุมชน','ประชาสัมพันธ์'],
      service:['บริการชุมชน','แจ้งปัญหา','ข้อมูลติดต่อหน่วยงาน'],
      talk:['พูดคุยแลกเปลี่ยน','ถาม-ตอบในชุมชน','ข้อเสนอแนะ'],
      place:['วัดบางรักน้อย','พระใหญ่','แลนด์มาร์กในพื้นที่'],
      tour:['คลองอ้อมนนท์','เรือชมคลอง','สะพานและทางเดินริมน้ำ'],
      local:['สวนทุเรียน','สวนมะม่วง','ของดีบางรักน้อย'],
      learn:['ฝึกอาชีพ','สมัครกิจกรรม','พัฒนาทักษะ']
    };
    const title={all:'สำรวจเมือง',food:'ร้านอาหาร',craft:'หาช่าง',market:'สินค้า/บริการ',event:'กิจกรรมชุมชน',news:'ข่าวสาร',service:'บริการชุมชน',talk:'พูดคุยแลกเปลี่ยน',place:'สถานที่สำคัญ',tour:'เที่ยวริมคลอง',local:'ของดีบางรักน้อย',learn:'ฝึกอาชีพ'};
    const drawer=document.getElementById('drawer'), items=document.getElementById('drawerItems');
    function openZone(z){document.getElementById('drawerTitle').textContent=title[z]||'บางรักน้อย';document.getElementById('drawerDesc').textContent='ข้อมูลจะโผล่เท่าที่ต้องใช้ ไม่บังเมือง';items.innerHTML=(data[z]||data.all).map((x,i)=>`<div class="item"><span class="icon">${i+1}</span><span>${x}</span></div>`).join('');drawer.classList.add('open');document.getElementById('menuPanel').classList.remove('show')}
    document.querySelectorAll('[data-zone]').forEach(el=>el.addEventListener('click',e=>openZone(e.currentTarget.dataset.zone)));
    document.getElementById('close').onclick=()=>drawer.classList.remove('open');document.getElementById('hamb').onclick=()=>document.getElementById('menuPanel').classList.toggle('show');
    const hr=new Date().getHours(); if(hr>=18||hr<6) document.body.classList.add('night');
  </script>
</body>
</html>
