<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f1d91" />
  <title>Bangraknoi Connect — Genesis V1</title>
  <meta name="description" content="Interactive City Web App ของ Bangraknoi Connect — เมืองการ์ตูนที่เป็นอินเทอร์เฟซ คลิกสถานที่เพื่อดูข้อมูลจาก data.js" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <noscript>
    <div class="noscript">เว็บไซต์นี้ต้องใช้ JavaScript เพื่อเปิดข้อมูลสถานที่จาก data.js</div>
  </noscript>

  <main class="app-shell" id="app" aria-label="Bangraknoi Connect Interactive City">
    <section class="world" aria-label="เมืองบางรักน้อยแบบโต้ตอบ">
      <div class="ambient" aria-hidden="true"></div>
      <div class="weather-layer" aria-hidden="true">
        <i class="bird bird-a"></i>
        <i class="bird bird-b"></i>
        <i class="bird bird-c"></i>
        <i class="glint glint-a"></i>
        <i class="glint glint-b"></i>
      </div>

      <div class="scene-stage" id="sceneStage">
        <div class="scene-transform" id="sceneTransform">
          <img class="master-scene" src="assets/master-scene.png" width="1672" height="941" alt="เมืองบางรักน้อยริมคลอง มีวัด เทศบาล ตลาด ร้านอาหาร ร้านช่าง รถไฟฟ้าสายสีม่วง และเรือในคลอง" />
          <svg class="hotspot-map" id="hotspotMap" viewBox="0 0 1672 941" preserveAspectRatio="none" aria-label="พื้นที่คลิกบนเมือง"></svg>
          <div class="marker-layer" id="markerLayer" aria-hidden="false"></div>
        </div>
      </div>

      <header class="topbar" aria-label="สถานะเมือง">
        <div class="brand-lockup" aria-label="Bangraknoi Connect">
          <span class="brand-mark">BC</span>
          <span class="brand-text">
            <strong>Bangraknoi Connect</strong>
            <small>Genesis V1 · Living City</small>
          </span>
        </div>
        <div class="city-state" aria-live="polite">
          <span id="timeBadge">กำลังอ่านเวลาเมือง</span>
          <span id="seasonBadge">ฤดูกาลชุมชน</span>
        </div>
      </header>

      <aside class="place-dock" aria-label="เส้นทางลัดไปยังสถานที่">
        <button class="dock-toggle" id="dockToggle" type="button" aria-expanded="false">สถานที่</button>
        <nav class="dock-list" id="dockList"></nav>
      </aside>

      <section class="guide" id="guide" aria-label="ผู้ช่วย BC">
        <img src="assets/bc-guide.png" width="1086" height="1448" alt="มาสคอต BC บางรักน้อย Connect" />
        <div class="guide-bubble" id="guideBubble">
          <strong>สวัสดีครับ</strong>
          <span>วันนี้...จะพาไปไหนดีครับ</span>
        </div>
      </section>

      <section class="info-tray" id="infoTray" aria-live="polite" aria-label="ข้อมูลสถานที่" hidden>
        <button class="tray-close" id="trayClose" type="button" aria-label="ปิดข้อมูล">×</button>
        <div class="tray-media">
          <img id="trayIcon" alt="" />
        </div>
        <div class="tray-content">
          <p class="eyebrow" id="trayCategory"></p>
          <h1 id="trayTitle"></h1>
          <p class="tray-summary" id="traySummary"></p>
          <ul class="fact-list" id="factList"></ul>
          <div class="tray-actions">
            <button type="button" class="action primary" id="focusAgain">พาไปจุดนี้</button>
            <button type="button" class="action" id="copyPlaceLink">คัดลอกลิงก์</button>
            <button type="button" class="action ghost" id="resetCity">กลับไปดูทั้งเมือง</button>
          </div>
        </div>
      </section>

      <div class="hint" id="hint">แตะอาคาร ป้าย หรือจุดเรืองแสง — เมืองจะเล่าเรื่องเอง</div>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
