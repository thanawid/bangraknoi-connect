<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="บางรักน้อย Connect — เมืองที่มีชีวิต">
  <title>บางรักน้อย Connect</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/icon-180x180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #5b21b6;
      --purple-mid: #7c3aed;
      --purple-light: #ede9fe;
      --orange: #f59e0b;
      --panel-w: min(420px, 90vw);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans Thai', sans-serif;
      overflow: hidden;
      background: #0f172a;
      color: #1e1b4b;
      user-select: none;
    }

    /* ── Sky ── */
    #sky {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg, #1e90ff 0%, #87ceeb 50%, #bfdbfe 100%);
      transition: background 3s ease;
    }

    /* ── Clouds ── */
    #clouds { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .cloud {
      position: absolute; border-radius: 50px;
      background: rgba(255,255,255,0.82); filter: blur(3px);
      animation: cloudFloat linear infinite;
    }
    @keyframes cloudFloat {
      from { transform: translateX(-220px); }
      to   { transform: translateX(calc(100vw + 220px)); }
    }

    /* ── Stars ── */
    #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 2s; }
    #stars.show { opacity: 1; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle ease-in-out infinite; }
    @keyframes twinkle {
      0%,100% { opacity: 0.3; } 50% { opacity: 1; }
    }

    /* ── City Scene ── */
    #cityScene {
      position: fixed; inset: 0; z-index: 2;
      overflow: hidden;
    }

    /* ภาพเมือง — cover เต็มจอ */
    #cityImg {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ── SVG Hotspot layer ── */
    #hotspotSvg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: all;
    }

    .hotspot {
      cursor: pointer;
      fill: transparent;
      stroke: transparent;
      stroke-width: 2;
      transition: fill 0.2s, stroke 0.2s;
    }
    .hotspot:hover, .hotspot.active {
      fill: rgba(245,158,11,0.18);
      stroke: rgba(245,158,11,0.9);
      filter: drop-shadow(0 0 6px #f59e0b);
    }

    /* Label tooltip เมื่อ hover */
    .hs-label {
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 3px;
      font-weight: 700;
      fill: white;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      paint-order: stroke fill;
      stroke: rgba(0,0,0,0.8);
      stroke-width: 0.5px;
    }
    .hotspot:hover ~ .hs-label,
    .hotspot.active ~ .hs-label { opacity: 1; }

    /* ── Train ── */
    #trainAnim {
      position: absolute;
      top: 11%;
      font-size: 28px;
      line-height: 1;
      pointer-events: none;
      animation: trainRide 15s linear infinite;
      z-index: 5;
    }
    @keyframes trainRide {
      from { left: -80px; }
      to   { left: calc(100% + 80px); }
    }

    /* ── Boats ── */
    .boat-anim {
      position: absolute; pointer-events: none; z-index: 5;
      animation: boatSail linear infinite;
    }
    .boat-anim img { height: 44px; opacity: 0.85; }
    @keyframes boatSail {
      from { left: -140px; }
      to   { left: calc(100% + 140px); }
    }
    .boat-rev {
      position: absolute; pointer-events: none; z-index: 5;
      animation: boatRev linear infinite;
    }
    .boat-rev img { height: 34px; opacity: 0.75; transform: scaleX(-1); }
    @keyframes boatRev {
      from { right: -100px; }
      to   { right: calc(100% + 100px); }
    }

    /* ── Birds ── */
    .bird {
      position: absolute; pointer-events: none; z-index: 5;
      animation: birdFly linear infinite;
    }
    @keyframes birdFly {
      from { left: -40px; }
      to   { left: calc(100% + 40px); }
    }

    /* ── BC Mascot ── */
    #bcMascot {
      position: absolute;
      bottom: 14%; left: 50%;
      transform: translateX(-50%);
      height: 100px;
      z-index: 10;
      pointer-events: none;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
      animation: mascotIdle 3s ease-in-out infinite;
    }
    @keyframes mascotIdle {
      0%,100% { transform: translateX(-50%) translateY(0) rotate(-1deg); }
      50%      { transform: translateX(-50%) translateY(-6px) rotate(1deg); }
    }

    /* ── Speech Bubble ── */
    #speechBubble {
      position: absolute;
      bottom: calc(14% + 108px); left: 50%;
      transform: translateX(-40%);
      background: white;
      border-radius: 16px 16px 16px 4px;
      padding: 10px 16px;
      box-shadow: 0 4px 20px rgba(91,33,182,0.25);
      font-size: 13px; font-weight: 700; color: #4c1d95;
      white-space: nowrap; z-index: 11; pointer-events: none;
      opacity: 0; transition: opacity 0.4s, transform 0.4s;
      border: 2px solid #ede9fe;
    }
    #speechBubble.show { opacity: 1; }
    #speechBubble::after {
      content: ''; position: absolute;
      left: 18px; bottom: -10px;
      border: 5px solid transparent;
      border-top-color: white;
    }

    /* ── Top Bar ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; height: 54px;
      z-index: 20;
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
      background: linear-gradient(180deg, rgba(91,33,182,0.92) 0%, transparent 100%);
    }
    #logoArea { display: flex; align-items: center; gap: 8px; flex: 1; }
    #logoArea img { height: 34px; }
    #logoArea span { font-size: 15px; font-weight: 900; color: white; text-shadow: 0 2px 6px rgba(0,0,0,0.4); }
    #timeBadge {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
      padding: 4px 12px; color: white; font-size: 13px; font-weight: 600;
    }

    /* ── Bottom Nav ── */
    #bottomNav {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 20; padding: 8px 12px 14px;
      background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, transparent 100%);
    }
    #navScroll {
      display: flex; gap: 7px; overflow-x: auto;
      scrollbar-width: none; padding: 2px 0;
    }
    #navScroll::-webkit-scrollbar { display: none; }
    .nav-btn {
      flex: 0 0 auto;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,0.2); border-radius: 12px;
      padding: 7px 10px; cursor: pointer; color: white; min-width: 64px;
      transition: all 0.2s;
    }
    .nav-btn:hover, .nav-btn.active {
      background: rgba(245,158,11,0.28); border-color: var(--orange);
      transform: translateY(-2px);
    }
    .nav-btn .nb-icon { font-size: 18px; }
    .nav-btn .nb-label { font-size: 10px; font-weight: 600; white-space: nowrap; }

    /* ── Side Panel ── */
    #sidePanel {
      position: fixed; top: 0; right: -100%;
      width: var(--panel-w); height: 100%; z-index: 30;
      background: white; box-shadow: -8px 0 40px rgba(0,0,0,0.3);
      display: flex; flex-direction: column;
      transition: right 0.35s cubic-bezier(0.32,0.72,0,1);
      overflow: hidden;
    }
    #sidePanel.open { right: 0; }

    #panelHeader {
      flex: 0 0 auto; padding: 20px 20px 16px;
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-mid) 100%);
      position: relative;
    }
    #panelClose {
      position: absolute; top: 14px; right: 14px;
      width: 30px; height: 30px; border: none;
      background: rgba(255,255,255,0.2); border-radius: 50%;
      cursor: pointer; font-size: 16px; color: white;
      display: flex; align-items: center; justify-content: center;
    }
    #panelClose:hover { background: rgba(255,255,255,0.35); }
    #panelMascot { height: 72px; margin-bottom: 6px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3)); }
    #panelIcon { font-size: 26px; margin-bottom: 3px; }
    #panelTitle { font-size: 21px; font-weight: 900; color: white; line-height: 1.2; }
    #panelDesc { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 5px; line-height: 1.5; }

    #panelBody { flex: 1; overflow-y: auto; padding: 14px; }

    .panel-item {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; margin-bottom: 8px;
      background: #f8f7ff; border: 1.5px solid #ede9fe;
      border-radius: 12px; cursor: pointer; text-decoration: none; color: inherit;
      transition: all 0.2s;
    }
    .panel-item:hover { background: #ede9fe; border-color: var(--purple-mid); transform: translateX(3px); }
    .panel-item .pi-icon { font-size: 22px; flex: 0 0 auto; }
    .panel-item .pi-text { flex: 1; }
    .panel-item .pi-title { font-size: 14px; font-weight: 700; color: #2d1d6e; }
    .panel-item .pi-detail { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .panel-item .pi-action {
      font-size: 11px; font-weight: 600; color: var(--purple-mid);
      background: var(--purple-light); padding: 4px 9px; border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Backdrop ── */
    #backdrop {
      position: fixed; inset: 0; z-index: 25;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #backdrop.show { opacity: 1; pointer-events: all; }

    /* ── Welcome ── */
    #welcome {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: rgba(15,23,42,0.65); backdrop-filter: blur(5px);
    }
    #welcomeCard {
      background: white; border-radius: 22px; padding: 28px 24px;
      max-width: 320px; width: 90%; text-align: center;
      box-shadow: 0 20px 60px rgba(91,33,182,0.4);
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.75) translateY(30px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    #welcomeCard img { height: 90px; margin-bottom: 6px; }
    #welcomeCard h1 { font-size: 19px; font-weight: 900; color: var(--purple); margin-bottom: 6px; }
    #welcomeCard p { font-size: 13px; color: #6b7280; line-height: 1.6; margin-bottom: 18px; }
    #welcomeBtn {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-mid) 100%);
      color: white; border: none; border-radius: 12px;
      padding: 13px 28px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; width: 100%;
      box-shadow: 0 4px 18px rgba(91,33,182,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #welcomeBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(91,33,182,0.5); }

    /* ── Hint ── */
    #zoomHint {
      position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%);
      z-index: 15; pointer-events: none;
      background: rgba(0,0,0,0.5); color: white;
      font-size: 12px; font-weight: 600;
      padding: 5px 14px; border-radius: 20px;
      opacity: 0; transition: opacity 0.4s; white-space: nowrap;
    }
    #zoomHint.show { opacity: 1; }

    @media (max-width: 480px) {
      #bcMascot { height: 72px; }
      .nav-btn { min-width: 54px; padding: 6px 7px; }
    }
  </style>
</head>
<body>

<div id="sky"></div>
<div id="stars"></div>
<div id="clouds"></div>

<div id="cityScene">
  <!-- ภาพเมือง — ลอง city-genesis ก่อน ถ้าไม่ได้ใช้ hero_bg -->
  <picture>
    <source srcset="assets/city-genesis.webp" type="image/webp">
    <img id="cityImg" src="assets/hero_bg.webp" alt="เมืองบางรักน้อย">
  </picture>

  <!-- SVG Hotspots — viewBox 0 0 100 100 = percentage coordinates -->
  <svg id="hotspotSvg" viewBox="0 0 100 100" preserveAspectRatio="none"
       xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:all;">

    <!-- วัดบางรักน้อย -->
    <rect class="hotspot" id="hs-temple" x="4" y="25" width="20" height="60" rx="2" data-id="temple"/>
    <text class="hs-label" x="14" y="23" text-anchor="middle">🛕 วัดบางรักน้อย</text>

    <!-- เทศบาล -->
    <rect class="hotspot" id="hs-municipality" x="30" y="23" width="20" height="58" rx="2" data-id="municipality"/>
    <text class="hs-label" x="40" y="21" text-anchor="middle">🏛 เทศบาล</text>

    <!-- ตลาด — ปรับขนาดให้เล็กลง -->
    <rect class="hotspot" id="hs-market" x="54" y="30" width="15" height="42" rx="2" data-id="market"/>
    <text class="hs-label" x="61" y="28" text-anchor="middle">🛒 ตลาด</text>

    <!-- ร้านอาหาร -->
    <rect class="hotspot" id="hs-restaurant" x="70" y="32" width="11" height="40" rx="2" data-id="restaurant"/>
    <text class="hs-label" x="75" y="30" text-anchor="middle">🍛 ร้านอาหาร</text>

    <!-- บ้านช่าง -->
    <rect class="hotspot" id="hs-craft" x="82" y="32" width="12" height="40" rx="2" data-id="craft"/>
    <text class="hs-label" x="88" y="30" text-anchor="middle">🔧 ช่าง</text>

    <!-- คลอง — แถบล่างสุด ไม่ใหญ่เกินไป -->
    <rect class="hotspot" id="hs-canal" x="0" y="80" width="100" height="20" rx="0" data-id="canal"/>
    <text class="hs-label" x="50" y="78" text-anchor="middle">🚤 คลองอ้อมนนท์</text>

    <!-- รถไฟฟ้า — แถบบนสุด -->
    <rect class="hotspot" id="hs-bts" x="40" y="0" width="58" height="18" rx="2" data-id="bts"/>
    <text class="hs-label" x="69" y="22" text-anchor="middle">🚇 รถไฟฟ้าสายสีม่วง</text>
  </svg>

  <!-- Train — ขนาดเล็กลง -->
  <div id="trainAnim">🚇</div>

  <!-- Boats -->
  <div class="boat-anim" style="animation-duration:20s;bottom:7%;animation-delay:-6s;">
    <img src="assets/boat.svg" alt="" onerror="this.style.display='none'">
  </div>
  <div class="boat-rev" style="animation-duration:28s;bottom:10%;animation-delay:-14s;">
    <img src="assets/boat-small.svg" alt="" onerror="this.style.display='none'">
  </div>

  <!-- Birds -->
  <div class="bird" style="top:20%;font-size:16px;animation-duration:24s;animation-delay:-8s;">🕊</div>
  <div class="bird" style="top:14%;font-size:12px;animation-duration:32s;animation-delay:-18s;">🐦</div>

  <!-- Mascot -->
  <div id="speechBubble">สวัสดีครับ! วันนี้จะไปไหนดีครับ?</div>
  <img id="bcMascot" src="assets/mascot-main.webp" alt="BC"
       onerror="this.src='assets/bc-mascot.webp'">
</div>

<!-- Top Bar -->
<div id="topBar">
  <div id="logoArea">
    <img src="assets/bc-logo.webp" alt="BC" onerror="this.style.display='none'">
    <span>บางรักน้อย Connect</span>
  </div>
  <div id="timeBadge">🌤 08:30</div>
</div>

<!-- Bottom Nav -->
<div id="bottomNav">
  <div id="navScroll">
    <button class="nav-btn" data-id="temple"><span class="nb-icon">🛕</span><span class="nb-label">วัด</span></button>
    <button class="nav-btn" data-id="municipality"><span class="nb-icon">🏛</span><span class="nb-label">เทศบาล</span></button>
    <button class="nav-btn" data-id="market"><span class="nb-icon">🛒</span><span class="nb-label">ตลาด</span></button>
    <button class="nav-btn" data-id="restaurant"><span class="nb-icon">🍛</span><span class="nb-label">ร้านอาหาร</span></button>
    <button class="nav-btn" data-id="craft"><span class="nb-icon">🔧</span><span class="nb-label">หาช่าง</span></button>
    <button class="nav-btn" data-id="canal"><span class="nb-icon">🚤</span><span class="nb-label">คลอง</span></button>
    <button class="nav-btn" data-id="bts"><span class="nb-icon">🚇</span><span class="nb-label">รถไฟฟ้า</span></button>
  </div>
</div>

<div id="backdrop"></div>

<!-- Side Panel -->
<div id="sidePanel" aria-hidden="true">
  <div id="panelHeader">
    <button id="panelClose" aria-label="ปิด">✕</button>
    <img id="panelMascot" src="" alt="">
    <div id="panelIcon"></div>
    <div id="panelTitle"></div>
    <div id="panelDesc"></div>
  </div>
  <div id="panelBody"></div>
</div>

<div id="zoomHint">👆 แตะที่อาคารเพื่อดูข้อมูล</div>

<!-- Welcome -->
<div id="welcome">
  <div id="welcomeCard">
    <img src="assets/mascot-main.webp" alt="BC" onerror="this.src='assets/bc-mascot.webp'">
    <h1>สวัสดีครับ!</h1>
    <p>ยินดีต้อนรับสู่<br><strong>บางรักน้อย Connect</strong><br>เมืองที่มีชีวิต — แตะอาคารเพื่อสำรวจ</p>
    <button id="welcomeBtn">🚶 เดินเข้าเมือง</button>
  </div>
</div>

<script type="module">
import { BUILDINGS } from './data.js';

// ── Time & Sky ────────────────────────────────────────────────────────────────
const SKIES = {
  dawn:  'linear-gradient(180deg,#fba5a5 0%,#fde68a 40%,#fed7aa 100%)',
  day:   'linear-gradient(180deg,#1e90ff 0%,#87ceeb 50%,#bfdbfe 100%)',
  noon:  'linear-gradient(180deg,#0369a1 0%,#38bdf8 50%,#bae6fd 100%)',
  dusk:  'linear-gradient(180deg,#c026d3 0%,#f97316 40%,#fde68a 100%)',
  night: 'linear-gradient(180deg,#0f172a 0%,#1e3a5f 50%,#312e81 100%)',
};
const ICONS = { dawn:'🌅', day:'☀️', noon:'🌤', dusk:'🌇', night:'🌙' };

function skyKey(h) {
  if (h>=5&&h<7)  return 'dawn';
  if (h>=7&&h<12) return 'day';
  if (h>=12&&h<17)return 'noon';
  if (h>=17&&h<20)return 'dusk';
  return 'night';
}
function updateTime() {
  const now=new Date(), h=now.getHours(), m=String(now.getMinutes()).padStart(2,'0');
  const k=skyKey(h);
  document.getElementById('sky').style.background = SKIES[k];
  document.getElementById('timeBadge').textContent = `${ICONS[k]} ${h}:${m}`;
  document.getElementById('stars').classList.toggle('show', k==='night');
}
updateTime();
setInterval(updateTime,30000);

// ── Stars ─────────────────────────────────────────────────────────────────────
const starsEl=document.getElementById('stars');
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+0.8;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*60}%;animation-duration:${2+Math.random()*3}s;animation-delay:-${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

// ── Clouds ────────────────────────────────────────────────────────────────────
const cloudsEl=document.getElementById('clouds');
[[120,38,'7%','38s','-10s',0.8],[80,26,'16%','52s','-30s',0.6],[150,44,'4%','44s','-6s',0.72],[60,18,'21%','62s','-42s',0.5],[100,30,'12%','42s','-22s',0.68]].forEach(([w,h,top,dur,del,op])=>{
  const el=document.createElement('div'); el.className='cloud';
  el.style.cssText=`width:${w}px;height:${h}px;top:${top};opacity:${op};animation-duration:${dur};animation-delay:${del};`;
  cloudsEl.appendChild(el);
});

// ── Building map ──────────────────────────────────────────────────────────────
const bldMap={};
BUILDINGS.forEach(b=>{ bldMap[b.id]=b; });

// ── Panel ─────────────────────────────────────────────────────────────────────
const panel=document.getElementById('sidePanel');
const backdrop=document.getElementById('backdrop');
let activeHs=null;

function openPanel(id){
  const b=bldMap[id]; if(!b) return;
  const mascot=document.getElementById('panelMascot');
  mascot.src=b.mascot||''; mascot.style.display=b.mascot?'block':'none';
  document.getElementById('panelIcon').textContent=b.icon;
  document.getElementById('panelTitle').textContent=b.label;
  document.getElementById('panelDesc').textContent=b.description;
  const body=document.getElementById('panelBody'); body.innerHTML='';
  b.items.forEach(item=>{
    const a=document.createElement('a');
    a.className='panel-item'; a.href=item.href||'#';
    if(item.href&&item.href.startsWith('http')){ a.target='_blank'; a.rel='noopener noreferrer'; }
    a.innerHTML=`<span class="pi-icon">${item.icon}</span><div class="pi-text"><div class="pi-title">${item.title}</div><div class="pi-detail">${item.detail}</div></div><span class="pi-action">${item.action} →</span>`;
    body.appendChild(a);
  });
  panel.classList.add('open'); panel.setAttribute('aria-hidden','false');
  backdrop.classList.add('show');
  if(activeHs) activeHs.classList.remove('active');
  const hs=document.getElementById('hs-'+id);
  if(hs){ hs.classList.add('active'); activeHs=hs; }
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  sayBubble(`มาดู${b.label}กันเลยครับ! 🏡`);
}

function closePanel(){
  panel.classList.remove('open'); panel.setAttribute('aria-hidden','true');
  backdrop.classList.remove('show');
  if(activeHs){ activeHs.classList.remove('active'); activeHs=null; }
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
}

document.querySelectorAll('.hotspot').forEach(hs=>hs.addEventListener('click',()=>openPanel(hs.dataset.id)));
document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>openPanel(btn.dataset.id)));
document.getElementById('panelClose').addEventListener('click',closePanel);
backdrop.addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePanel(); });

// ── Speech ─────────────────────────────────────────────────────────────────────
const bubble=document.getElementById('speechBubble');
let st=null;
function sayBubble(text){
  bubble.textContent=text; bubble.classList.add('show');
  clearTimeout(st); st=setTimeout(()=>bubble.classList.remove('show'),3500);
}

// ── Welcome ───────────────────────────────────────────────────────────────────
const PHRASES=['อยากหาช่าง? กดที่หาช่างได้เลยครับ 🔧','ร้านอาหารอร่อยๆ มีหลายร้านนะครับ 🍛','เทศบาลเปิด จันทร์–ศุกร์ 08.30–16.30 ครับ','วันนี้อากาศดีมากเลยครับ! ☀️','ตลาดสดเปิดทุกเช้า 06.00 น. ครับ 🛒'];
let pi=0;

document.getElementById('welcomeBtn').addEventListener('click',()=>{
  const w=document.getElementById('welcome');
  w.style.transition='opacity 0.45s'; w.style.opacity='0';
  setTimeout(()=>{ w.style.display='none'; },450);

  setTimeout(()=>sayBubble('สวัสดีครับ! ยินดีต้อนรับสู่บางรักน้อย 🙏'),300);
  setTimeout(()=>sayBubble('แตะที่อาคารหรือกดปุ่มด้านล่างได้เลยครับ'),4200);

  setInterval(()=>{
    if(!panel.classList.contains('open')) sayBubble(PHRASES[pi++%PHRASES.length]);
  },12000);

  const hint=document.getElementById('zoomHint');
  hint.classList.add('show'); setTimeout(()=>hint.classList.remove('show'),4000);
});
</script>
