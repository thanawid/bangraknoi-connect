<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>บางรักน้อย Connect — Genesis Planting</title>
  <link rel="icon" href="assets/logo_BC.png" />
  <style>
    :root{
      --purple:#4b1685; --gold:#ffb728; --ink:#2d0d52;
      --glass:rgba(255,255,255,.72); --shadow:0 18px 50px rgba(39,13,72,.22);
      --vh:100vh;
    }
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;font-family:"Noto Sans Thai",system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink);background:#aee7ff}
    .world{position:relative;width:100vw;height:var(--vh);overflow:hidden;isolation:isolate;background:linear-gradient(#88dcff,#f6efd4)}
    .scene{position:absolute;inset:-1.5%;z-index:0;background:url('assets/play-map-master.png') center/cover no-repeat;transform:scale(1.015);transition:filter 1.2s ease;}
    .tint{position:absolute;inset:0;z-index:1;pointer-events:none;transition:background 1.2s ease;}
    body.night .scene{filter:brightness(.54) saturate(.85) hue-rotate(10deg)}
    body.evening .scene{filter:brightness(.9) saturate(1.1) sepia(.13)}
    body.dawn .scene{filter:brightness(1.04) saturate(.96) sepia(.06)}
    body.night .tint{background:linear-gradient(180deg,rgba(13,16,67,.56),rgba(49,18,83,.32) 55%,rgba(0,0,0,.2));}
    body.evening .tint{background:linear-gradient(180deg,rgba(255,154,72,.18),rgba(255,212,121,.10) 60%,rgba(75,22,133,.08));}
    body.dawn .tint{background:linear-gradient(180deg,rgba(255,219,177,.20),rgba(255,255,255,.03));}

    /* minimal city UI */
    .brand{position:absolute;z-index:8;left:22px;top:18px;display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:22px;background:rgba(255,255,255,.36);backdrop-filter:blur(16px);box-shadow:0 12px 28px rgba(36,14,70,.12)}
    .brand img{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 5px 10px rgba(0,0,0,.16))}.brand strong{display:block;color:white;text-shadow:0 2px 8px rgba(45,13,82,.6);font-size:17px;line-height:1}.brand span{display:block;color:white;text-shadow:0 2px 8px rgba(45,13,82,.6);font-size:11px;margin-top:3px;opacity:.92}
    .menu{position:absolute;z-index:8;right:24px;top:22px;width:52px;height:52px;border:0;border-radius:50%;background:rgba(75,22,133,.70);color:white;font-size:28px;box-shadow:var(--shadow);cursor:pointer;backdrop-filter:blur(12px)}
    .guide{position:absolute;z-index:7;right:13%;bottom:7%;width:min(12vw,150px);min-width:82px;filter:drop-shadow(0 18px 18px rgba(32,12,58,.22));animation:enter 1.35s cubic-bezier(.2,.9,.25,1) .25s both, bob 3.8s ease-in-out 1.7s infinite;cursor:pointer;transform-origin:50% 100%}.guide img{width:100%;display:block}@keyframes enter{from{opacity:0;translate:120px 24px;scale:.92}to{opacity:1;translate:0 0;scale:1}}@keyframes bob{0%,100%{translate:0 0}50%{translate:0 -5px}}
    .say{position:absolute;z-index:9;right:21%;bottom:23%;max-width:250px;padding:12px 15px;border-radius:20px 20px 5px 20px;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);box-shadow:0 18px 42px rgba(38,13,70,.17);font-weight:900;color:#4b1685;opacity:0;transform:translateY(8px);transition:.35s}.say.show{opacity:1;transform:translateY(0)}

    /* living effects */
    .cloud{position:absolute;z-index:3;width:150px;height:54px;background:rgba(255,255,255,.72);border-radius:999px;animation:cloud linear infinite;pointer-events:none}.cloud:before,.cloud:after{content:"";position:absolute;border-radius:50%;background:inherit}.cloud:before{width:68px;height:68px;left:26px;top:-34px}.cloud:after{width:84px;height:84px;right:18px;top:-43px}.c1{left:-180px;top:9%;animation-duration:48s}.c2{left:-230px;top:19%;scale:.68;animation-duration:64s;animation-delay:-23s}.c3{left:-190px;top:31%;scale:.48;animation-duration:54s;animation-delay:-10s}@keyframes cloud{to{translate:calc(100vw + 310px) 0}}
    .bird{position:absolute;z-index:4;font-size:24px;animation:bird linear infinite;pointer-events:none}.b1{left:-60px;top:13%;animation-duration:18s}.b2{left:-100px;top:22%;animation-duration:23s;animation-delay:-9s;scale:.78}@keyframes bird{0%{translate:-10vw 0}50%{translate:55vw -28px}100%{translate:113vw 2px}}
    .leaf{position:absolute;z-index:4;font-size:22px;animation:leaf 7s ease-in-out infinite;pointer-events:none}.l1{left:5%;top:10%;animation-delay:-2s}.l2{right:6%;top:18%;animation-delay:-4s}.l3{left:8%;bottom:22%;animation-delay:-1s}@keyframes leaf{0%,100%{rotate:-8deg;translate:0 0}50%{rotate:10deg;translate:7px 9px}}
    .river-glow{position:absolute;z-index:2;left:25%;top:31%;width:28%;height:43%;border-radius:45%;background:linear-gradient(110deg,transparent,rgba(255,255,255,.22),transparent);filter:blur(12px);mix-blend-mode:screen;animation:water 5.5s ease-in-out infinite;pointer-events:none}@keyframes water{0%,100%{opacity:.18;translate:-10px 4px}50%{opacity:.44;translate:12px -6px}}
    .train-glint{position:absolute;z-index:4;right:4%;top:13%;width:35%;height:5%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);filter:blur(8px);opacity:.0;animation:train 9s ease-in-out infinite;pointer-events:none}@keyframes train{0%,55%,100%{opacity:0;translate:60px 0}68%{opacity:.65;translate:-80px 0}}
    .steam{position:absolute;z-index:5;right:14%;bottom:31%;width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.72);filter:blur(2px);animation:steam 3.4s ease-in-out infinite;pointer-events:none}.steam.s2{right:16%;bottom:34%;animation-delay:1.1s}.steam.s3{right:12%;bottom:35%;animation-delay:2s}@keyframes steam{0%{opacity:0;scale:.5;translate:0 18px}40%{opacity:.8}100%{opacity:0;scale:1.8;translate:-18px -38px}}
    .firefly{position:absolute;z-index:4;width:6px;height:6px;border-radius:50%;background:#fff6a8;box-shadow:0 0 16px #fff6a8;opacity:0;animation:firefly 5s ease-in-out infinite;display:none}.f1{left:18%;bottom:18%;animation-delay:.3s}.f2{right:24%;bottom:24%;animation-delay:1.6s}.f3{right:8%;bottom:17%;animation-delay:2.7s}body.night .firefly{display:block}@keyframes firefly{0%,100%{opacity:0;translate:0 8px}45%{opacity:1;translate:8px -12px}}

    /* hotspots: invisible, city is interface */
    .hotspot{position:absolute;z-index:6;border:0;background:transparent;border-radius:28px;cursor:pointer}.hotspot:focus-visible,.hotspot:hover{outline:3px solid rgba(255,183,40,.58);background:rgba(255,255,255,.07)}
    .hotspot:after{content:attr(data-label);position:absolute;left:50%;bottom:100%;transform:translate(-50%,6px);opacity:0;white-space:nowrap;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);box-shadow:0 12px 30px rgba(45,13,82,.16);border-radius:999px;padding:9px 13px;font-size:14px;color:#4b1685;font-weight:900;transition:.22s}.hotspot:hover:after,.hotspot:focus-visible:after{opacity:1;transform:translate(-50%,-8px)}
    .hs-temple{left:7%;top:20%;width:31%;height:30%}.hs-river{left:24%;top:31%;width:33%;height:36%}.hs-gov{left:52%;top:22%;width:24%;height:27%}.hs-market{right:5%;top:30%;width:20%;height:21%}.hs-food{right:8%;bottom:20%;width:22%;height:24%}.hs-orchard{left:2%;bottom:16%;width:21%;height:33%}.hs-career{left:36%;bottom:8%;width:17%;height:18%}.hs-talk{right:27%;bottom:5%;width:14%;height:18%}

    .panel{position:absolute;z-index:20;left:50%;bottom:22px;width:min(720px,calc(100vw - 28px));transform:translate(-50%,130%);opacity:0;transition:.38s;background:rgba(255,255,255,.86);backdrop-filter:blur(20px);box-shadow:var(--shadow);border-radius:30px;padding:16px}.panel.open{transform:translate(-50%,0);opacity:1}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.panel h2{margin:0;font-size:22px}.close{border:0;border-radius:50%;width:42px;height:42px;background:#4b1685;color:white;font-size:24px;cursor:pointer}.chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}.chip{border:0;border-radius:999px;background:#f2e8ff;color:#37105f;padding:10px 13px;font-weight:900}.list{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:13px}.card{background:#fff7e6;border-radius:18px;padding:13px}.card strong{display:block}.card small{opacity:.7}.drawer{position:absolute;z-index:30;right:20px;top:88px;width:min(340px,calc(100vw - 40px));padding:16px;border-radius:26px;background:rgba(255,255,255,.86);backdrop-filter:blur(20px);box-shadow:var(--shadow);transform:translateX(115%);opacity:0;transition:.35s}.drawer.open{transform:translateX(0);opacity:1}.drawer h3{margin:0 0 10px}.drawer button{width:100%;display:flex;justify-content:space-between;align-items:center;margin:7px 0;border:0;border-radius:17px;background:rgba(75,22,133,.08);padding:13px 14px;font-weight:900;color:#37105f;cursor:pointer}.drawer button:hover{background:rgba(255,183,40,.3)}

    @media(max-width:900px){.scene{background-position:center}.brand{left:12px;top:12px;padding:7px 9px}.brand img{width:38px;height:38px}.brand strong{font-size:14px}.brand span{display:none}.menu{right:14px;top:13px;width:46px;height:46px;font-size:24px}.guide{right:7%;bottom:11%;width:22vw}.say{right:24%;bottom:27%;font-size:13px}.list{grid-template-columns:repeat(2,1fr)}.hotspot:after{display:none}.panel{bottom:12px}.cloud{opacity:.75}}
    @media(max-width:560px){.scene{background-position:center}.guide{width:28vw}.panel h2{font-size:18px}.panel{padding:13px}.chip{padding:9px 11px}.hs-temple,.hs-river,.hs-gov,.hs-market,.hs-food,.hs-orchard,.hs-career,.hs-talk{width:28%;height:24%}}
  </style>
</head>
<body>
  <main class="world" aria-label="บางรักน้อย Connect เมืองมีชีวิต">
    <div class="scene"></div><div class="tint"></div>
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="bird b1">🕊️</div><div class="bird b2">🕊️</div>
    <div class="leaf l1">🍃</div><div class="leaf l2">🍃</div><div class="leaf l3">🍃</div>
    <div class="river-glow"></div><div class="train-glint"></div>
    <div class="steam s1"></div><div class="steam s2"></div><div class="steam s3"></div>
    <div class="firefly f1"></div><div class="firefly f2"></div><div class="firefly f3"></div>

    <div class="brand"><img src="assets/logo_BC.png" alt="BC"><div><strong>บางรักน้อย Connect</strong><span>ชุมชนใกล้ตัว เชื่อมถึงกัน</span></div></div>
    <button class="menu" id="menuBtn" aria-label="เปิดทางลัด">≡</button>

    <button class="hotspot hs-temple" data-kind="สถานที่สำคัญ" data-label="วัด / พระใหญ่"></button>
    <button class="hotspot hs-river" data-kind="ริมน้ำและท่องเที่ยว" data-label="คลองอ้อมนนท์"></button>
    <button class="hotspot hs-gov" data-kind="บริการชุมชน" data-label="บริการชุมชน"></button>
    <button class="hotspot hs-market" data-kind="ตลาดและของดี" data-label="ตลาด / ของดี"></button>
    <button class="hotspot hs-food" data-kind="ร้านอาหาร" data-label="ร้านอาหาร"></button>
    <button class="hotspot hs-orchard" data-kind="ของดีท้องถิ่น" data-label="สวนผลไม้"></button>
    <button class="hotspot hs-career" data-kind="ฝึกอาชีพ" data-label="ฝึกอาชีพ"></button>
    <button class="hotspot hs-talk" data-kind="พูดคุยแลกเปลี่ยน" data-label="พูดคุย"></button>

    <div class="guide" id="guide"><img src="assets/mascot.png" alt="มาสคอต BC"></div>
    <div class="say" id="say">ลองเดินดูครับ</div>

    <aside class="drawer" id="drawer">
      <h3>ไปไหนดี?</h3>
      <button data-kind="ร้านอาหาร">ร้านอาหาร <span>🍜</span></button>
      <button data-kind="หาช่าง">หาช่าง <span>🔧</span></button>
      <button data-kind="ฝึกอาชีพ">ฝึกอาชีพ <span>🎓</span></button>
      <button data-kind="ข่าวสาร">ข่าวสาร <span>📣</span></button>
      <button data-kind="บริการชุมชน">บริการชุมชน <span>💜</span></button>
      <button data-kind="ตลาดและของดี">สินค้า / ของดี <span>🛍️</span></button>
      <button data-kind="กิจกรรมชุมชน">กิจกรรม <span>🎉</span></button>
      <button data-kind="พูดคุยแลกเปลี่ยน">พูดคุย <span>💬</span></button>
    </aside>

    <section class="panel" id="panel" aria-live="polite">
      <div class="panel-head"><h2 id="title">ร้านอาหาร</h2><button class="close" id="close">×</button></div>
      <div class="chips" id="chips"></div>
      <div class="list" id="list"></div>
    </section>
  </main>

  <script>
    const body=document.body;
    function theme(){const h=new Date().getHours();body.classList.remove('dawn','evening','night'); if(h>=5&&h<9)body.classList.add('dawn'); else if(h>=17&&h<19)body.classList.add('evening'); else if(h>=19||h<5)body.classList.add('night');}
    theme(); setInterval(theme,60000);

    const drawer=document.getElementById('drawer'), panel=document.getElementById('panel'), title=document.getElementById('title'), list=document.getElementById('list'), chips=document.getElementById('chips'), say=document.getElementById('say');
    const data={
      'ร้านอาหาร':['ก๋วยเตี๋ยวเรือ','คาเฟ่ริมคลอง','ข้าวแกงชุมชน','ขนมไทย'],
      'หาช่าง':['ช่างไฟ','ช่างประปา','ช่างแอร์','ซ่อมบ้าน'],
      'ฝึกอาชีพ':['อบรมทำอาหาร','งานช่างพื้นฐาน','การตลาดออนไลน์','ทำสินค้าชุมชน'],
      'ข่าวสาร':['ประกาศวันนี้','แจ้งเตือน','ข่าวกิจกรรม','ประชาสัมพันธ์'],
      'บริการชุมชน':['ศูนย์สุขภาพ','แจ้งข้อมูลผิด','ช่วยเหลือใกล้บ้าน','บริการประชาชน'],
      'ตลาดและของดี':['ตลาดชุมชน','ผลไม้ตามฤดูกาล','ของฝาก','สินค้า OTOP'],
      'กิจกรรมชุมชน':['ลานกิจกรรม','ผู้สูงวัย','เด็กและเยาวชน','งานประเพณี'],
      'พูดคุยแลกเปลี่ยน':['ถาม-ตอบชุมชน','แนะนำร้าน','แบ่งปันข่าว','แจ้งปัญหา'],
      'สถานที่สำคัญ':['วัดบางรักน้อย','พระใหญ่','ริมคลอง','สะพาน'],
      'ริมน้ำและท่องเที่ยว':['คลองอ้อมนนท์','เรือชมคลอง','มุมถ่ายรูป','ทางเดินริมน้ำ'],
      'ของดีท้องถิ่น':['สวนทุเรียน','สวนมะม่วง','ผลไม้ชุมชน','ดอกไม้']
    };
    const sub={
      'ร้านอาหาร':['เปิดอยู่','ใกล้ฉัน','ริมคลอง','แนะนำ'],
      'หาช่าง':['ไฟฟ้า','ประปา','แอร์','บ้าน'],
      'ฝึกอาชีพ':['สมัครได้','ฟรี','ใกล้บ้าน','รอบใหม่'],
      'ข่าวสาร':['ล่าสุด','เทศกาล','บริการ','แจ้งเตือน'],
      'บริการชุมชน':['ติดต่อ','แจ้งแก้ไข','ขอความช่วยเหลือ','แผนที่'],
      'ตลาดและของดี':['ผลไม้','อาหาร','ของฝาก','งานทำมือ'],
      'กิจกรรมชุมชน':['วันนี้','สัปดาห์นี้','ครอบครัว','ผู้สูงวัย'],
      'พูดคุยแลกเปลี่ยน':['ถามชุมชน','แนะนำ','แจ้งข่าว','ช่วยกัน'],
      'สถานที่สำคัญ':['วัด','ประวัติ','แผนที่','กิจกรรม'],
      'ริมน้ำและท่องเที่ยว':['เรือ','สะพาน','ถ่ายรูป','พักผ่อน'],
      'ของดีท้องถิ่น':['ทุเรียน','มะม่วง','ฤดูกาล','สวน']
    };
    function openKind(kind){drawer.classList.remove('open');title.textContent=kind;chips.innerHTML=(sub[kind]||[]).map(x=>`<button class="chip">${x}</button>`).join('');list.innerHTML=(data[kind]||data['ร้านอาหาร']).map(x=>`<div class="card"><strong>${x}</strong><small>ตัวอย่างข้อมูลที่จะปลูกต่อ</small></div>`).join('');panel.classList.add('open'); say.textContent=kind+' อยู่ทางนี้ครับ'; say.classList.add('show'); setTimeout(()=>say.classList.remove('show'),2100);}
    document.querySelectorAll('[data-kind]').forEach(el=>el.addEventListener('click',()=>openKind(el.dataset.kind)));
    document.getElementById('menuBtn').addEventListener('click',()=>drawer.classList.toggle('open'));
    document.getElementById('close').addEventListener('click',()=>panel.classList.remove('open'));
    document.getElementById('guide').addEventListener('click',()=>{say.textContent='เมืองนี้กดเดินได้ครับ';say.classList.add('show');setTimeout(()=>say.classList.remove('show'),2100)});
    setTimeout(()=>{say.classList.add('show');setTimeout(()=>say.classList.remove('show'),2300)},900);
  </script>
</body>
</html>
