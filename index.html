<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>บางรักน้อย Connect — Living Community</title>
<meta name="description" content="บางรักน้อย Connect — เมืองการ์ตูนที่รวบรวมข้อมูลชุมชนไว้ในที่เดียว" />
<link rel="icon" href="assets/favicon.png" />
<style>
:root{
  --purple:#5526b6;
  --purple2:#7c3aed;
  --gold:#f7b733;
  --ink:#251046;
  --glass:rgba(255,255,255,.78);
  --shadow:0 18px 50px rgba(24,12,60,.24);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,"Sarabun","Noto Sans Thai",sans-serif;background:#8dd7ff;color:#fff}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}

/* ===== WORLD VIEWPORT ===== */
.app{position:relative;width:100vw;height:100dvh;overflow:hidden;background:#8dd7ff}
.world-scroll{position:absolute;inset:0;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;overscroll-behavior:none;touch-action:pan-x}
.world-scroll::-webkit-scrollbar{display:none}
.stage{position:relative;height:100dvh;width:max(100vw,177.777dvh);min-width:100vw;overflow:hidden;isolation:isolate;background:#86d8ff}
.scene{position:absolute;inset:0;background:url('assets/master-scene.png') center center/cover no-repeat;transform:translateZ(0);z-index:1}
.scene::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.05),rgba(23,12,80,.08));pointer-events:none}

/* day/night from JS */
.app.night .scene{filter:brightness(.48) saturate(.75) hue-rotate(12deg)}
.app.evening .scene{filter:brightness(.86) saturate(1.05) sepia(.12)}
.app.morning .scene{filter:brightness(1.05) saturate(1.04)}
.app.night{background:#090927}

/* ===== LIVING FX ===== */
.sky-fx,.water-fx,.life-fx,.ui,.world-ui,.mascot-layer{position:absolute;inset:0;pointer-events:none}
.sky-fx{z-index:4}.water-fx{z-index:8}.life-fx{z-index:9}.mascot-layer{z-index:30}.world-ui{z-index:45}.ui{z-index:70}
.cloud{position:absolute;width:11vw;height:3.2vw;min-width:90px;min-height:26px;background:rgba(255,255,255,.75);border-radius:999px;filter:blur(.2px);animation:cloudMove linear infinite}
.cloud:before,.cloud:after{content:"";position:absolute;background:inherit;border-radius:50%}
.cloud:before{width:52%;height:145%;left:13%;top:-80%}.cloud:after{width:62%;height:175%;right:10%;top:-105%}
.c1{top:9%;left:-14%;animation-duration:68s}.c2{top:16%;left:-18%;animation-duration:92s;animation-delay:16s;opacity:.55}.c3{top:7%;left:-20%;animation-duration:76s;animation-delay:38s;opacity:.45}.c4{top:24%;left:-15%;animation-duration:110s;animation-delay:54s;opacity:.35}
@keyframes cloudMove{to{transform:translateX(125vw)}}
.bird{position:absolute;font-size:clamp(14px,1.8vw,26px);opacity:.72;animation:birdFly linear infinite;text-shadow:0 2px 3px rgba(0,0,0,.08)}
.b1{top:12%;left:-5%;animation-duration:22s}.b2{top:22%;left:-8%;animation-duration:31s;animation-delay:9s;font-size:clamp(11px,1.2vw,18px)}.b3{top:8%;left:-8%;animation-duration:42s;animation-delay:19s;font-size:clamp(12px,1.3vw,20px)}
@keyframes birdFly{to{transform:translate(122vw,-4vw)}}
.water-shimmer{position:absolute;left:0;right:0;bottom:0;height:42%;background:repeating-linear-gradient(108deg,rgba(255,255,255,0) 0 26px,rgba(255,255,255,.18) 27px 29px,rgba(255,255,255,0) 30px 70px);mix-blend-mode:screen;opacity:.38;animation:shimmer 8s linear infinite}
.wave-lines{position:absolute;left:0;right:0;bottom:0;height:34%;background:radial-gradient(ellipse at 32% 40%,rgba(255,255,255,.24),transparent 17%),radial-gradient(ellipse at 64% 52%,rgba(255,255,255,.18),transparent 14%);opacity:.38;animation:waterDrift 7s ease-in-out infinite alternate}
@keyframes shimmer{to{background-position:220px 0}}@keyframes waterDrift{to{transform:translateX(2.4vw)}}

.train{position:absolute;top:26.6%;left:-34%;width:26%;height:4.8%;z-index:11;animation:trainRun 40s linear infinite 3s;filter:drop-shadow(0 7px 8px rgba(20,10,50,.2))}
.train-body{position:absolute;inset:16% 0 12%;border-radius:1.2vw;background:linear-gradient(180deg,#ffffff,#d9d2ff 42%,#8d45dc 43%,#5c259e);border:2px solid rgba(62,36,116,.35);overflow:hidden}
.train-body:before{content:"";position:absolute;left:7%;right:13%;top:17%;height:30%;background:repeating-linear-gradient(90deg,#182239 0 6%,#bdeaff 6.5% 12%,#182239 12.5% 14%);border-radius:3px}.train-body:after{content:"";position:absolute;right:3%;top:12%;width:10%;height:55%;background:#12192d;border-radius:18px 26px 20px 9px}
@keyframes trainRun{0%{transform:translateX(0)}100%{transform:translateX(160vw)}}

.boat{position:absolute;bottom:22%;left:-16%;width:16%;height:7%;z-index:12;animation:boatSail 42s linear infinite 8s;filter:drop-shadow(0 9px 7px rgba(5,50,70,.25))}
.boat .roof{position:absolute;left:26%;right:26%;top:-10%;height:45%;background:#7b3fe4;border-radius:10px 10px 0 0;border-bottom:4px solid #5c2cb2}.boat .hull{position:absolute;left:0;right:0;bottom:8%;height:42%;background:linear-gradient(#9a5a2b,#6a3316);clip-path:polygon(4% 0,96% 0,82% 100%,18% 100%)}.boat:after{content:"";position:absolute;left:13%;right:13%;bottom:-8%;height:12%;border-radius:999px;background:rgba(255,255,255,.55);filter:blur(2px)}
.boat.small{width:12%;bottom:16%;animation-duration:55s;animation-delay:25s;opacity:.88}.boat.small .roof{display:none}
@keyframes boatSail{0%{transform:translateX(0)}100%{transform:translateX(128vw)}}
.duck{position:absolute;z-index:13;bottom:22%;left:48%;font-size:clamp(18px,2vw,34px);animation:duck 10s ease-in-out infinite;filter:drop-shadow(0 2px 2px rgba(0,0,0,.1))}.duck.d2{left:52%;bottom:19%;font-size:clamp(14px,1.5vw,25px);animation-delay:2s}
@keyframes duck{50%{transform:translate(2.4vw,-.25vw)}}

.leaf{position:absolute;top:-30px;z-index:12;font-size:18px;opacity:.75;animation:leafFall linear infinite}.l1{left:6%;animation-duration:16s}.l2{left:18%;animation-duration:21s;animation-delay:5s}.l3{right:8%;animation-duration:18s;animation-delay:9s}
@keyframes leafFall{to{transform:translate(50px,110vh) rotate(540deg);opacity:0}}

/* ===== UI ===== */
.logo{position:fixed;left:max(14px,env(safe-area-inset-left));top:max(14px,env(safe-area-inset-top));width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.78);backdrop-filter:blur(16px);display:grid;place-items:center;box-shadow:var(--shadow);z-index:90}.logo img{width:42px;height:42px;object-fit:contain}.tools{position:fixed;right:max(14px,env(safe-area-inset-right));top:max(14px,env(safe-area-inset-top));display:flex;gap:10px;z-index:90}.tool{width:44px;height:44px;border-radius:999px;background:rgba(255,255,255,.78);backdrop-filter:blur(16px);display:grid;place-items:center;color:var(--purple);box-shadow:0 10px 30px rgba(20,10,70,.16);font-size:20px}.tool:active{transform:scale(.95)}

/* ===== MASCOT ===== */
.mascot{position:absolute;left:6%;bottom:3.5%;width:clamp(98px,9.5vw,165px);z-index:35;transform:translateX(-150%) scale(.98);animation:bcEnter 2.2s cubic-bezier(.18,.8,.18,1) 1.4s forwards}.mascot img{width:100%;filter:drop-shadow(0 16px 22px rgba(35,15,80,.35));animation:bcBob 2.4s ease-in-out infinite 4s}.mascot.hide{animation:bcExit 1.2s ease forwards}.bubble{position:absolute;left:calc(6% + clamp(92px,9vw,155px));bottom:13%;max-width:min(360px,48vw);background:rgba(255,255,255,.92);color:#35176b;border-radius:24px 24px 24px 7px;padding:12px 16px;font-weight:800;line-height:1.45;box-shadow:var(--shadow);z-index:36;opacity:0;transform:translateY(8px) scale(.97);backdrop-filter:blur(14px)}.bubble.show{animation:bubbleIn .3s ease forwards}.bubble.out{animation:bubbleOut .28s ease forwards}
@keyframes bcEnter{to{transform:translateX(0) scale(1)}}@keyframes bcExit{to{transform:translateX(-150%) scale(.92);opacity:0}}@keyframes bcBob{50%{transform:translateY(-7px)}}@keyframes bubbleIn{to{opacity:1;transform:translateY(0) scale(1)}}@keyframes bubbleOut{to{opacity:0;transform:translateY(-8px) scale(.96)}}

/* ===== 8 PLACES: small, staged, not a dashboard ===== */
.places{position:absolute;inset:0;z-index:42;pointer-events:none}.place{position:absolute;display:flex;align-items:center;gap:7px;min-height:34px;padding:6px 10px 6px 7px;border-radius:999px;background:rgba(255,255,255,.86);color:#38136e;box-shadow:0 8px 22px rgba(20,10,70,.18);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.7);font-weight:900;font-size:clamp(11px,1vw,14px);opacity:0;transform:translateY(16px) scale(.85);transition:transform .18s ease,box-shadow .18s ease;background .18s ease;pointer-events:auto}.place .ico{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#6d28d9,#f59e0b);color:#fff;font-size:13px}.place:hover,.place.active{transform:translateY(-5px) scale(1.05)!important;background:#fff;box-shadow:0 16px 36px rgba(60,20,100,.25)}.places.awake .place{animation:placePop .52s cubic-bezier(.14,1.55,.42,1) forwards}.p-service{left:45%;top:46%;animation-delay:.1s}.p-food{left:73%;top:55%;animation-delay:.24s}.p-market{left:66%;top:45%;animation-delay:.38s}.p-craft{left:84%;top:53%;animation-delay:.52s}.p-news{left:55%;top:25%;animation-delay:.66s}.p-event{left:48%;top:68%;animation-delay:.8s}.p-learn{left:16%;top:49%;animation-delay:.94s}.p-chat{left:67%;top:76%;animation-delay:1.08s}
@keyframes placePop{to{opacity:1;transform:translateY(0) scale(1)}}

.info{position:fixed;right:18px;bottom:18px;width:min(410px,calc(100vw - 36px));border-radius:28px;background:rgba(255,255,255,.9);backdrop-filter:blur(22px);box-shadow:var(--shadow);z-index:95;color:#271151;transform:translateY(calc(100% + 30px));transition:transform .38s cubic-bezier(.2,.8,.2,1);overflow:hidden}.info.open{transform:translateY(0)}.info-head{display:flex;align-items:center;gap:12px;padding:15px 16px;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff}.info-head .big{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.2);font-size:23px}.info h2{font-size:18px;line-height:1.2}.info p{font-size:12px;opacity:.78}.x{margin-left:auto;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.17);font-size:22px}.info-body{padding:14px}.search{width:100%;height:42px;border:0;border-radius:18px;background:#f3ecff;padding:0 14px;font:inherit;color:#2d1559;outline:none;margin-bottom:10px}.sample{display:grid;gap:8px}.row{display:flex;gap:10px;padding:10px;border-radius:16px;background:#fbf9ff}.row b{font-size:13px}.row span{display:block;font-size:11px;color:#7c6a91;margin-top:2px}.thumb{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#6d28d9,#f59e0b);display:grid;place-items:center;color:#fff;font-size:21px;flex:0 0 auto}

@media (max-width: 760px){
 .stage{width:177.777dvh}.logo{width:46px;height:46px;border-radius:14px}.logo img{width:35px;height:35px}.tool{width:39px;height:39px}.bubble{left:25%;bottom:13%;max-width:62vw;font-size:12px}.place{font-size:10px;padding:5px 8px}.place .ico{width:22px;height:22px}.info{left:10px;right:10px;bottom:10px;width:auto}.mascot{width:92px;bottom:4%}
}
@media (prefers-reduced-motion: reduce){*,*:before,*:after{animation:none!important;transition:none!important}.mascot{transform:translateX(0)}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="world-scroll" id="scroll">
    <main class="stage" id="stage" aria-label="บางรักน้อย Connect Living Community">
      <div class="scene"></div>
      <div class="sky-fx"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div><div class="bird b1">⌁</div><div class="bird b2">⌁</div><div class="bird b3">⌁</div></div>
      <div class="water-fx"><div class="water-shimmer"></div><div class="wave-lines"></div><div class="boat"><div class="roof"></div><div class="hull"></div></div><div class="boat small"><div class="roof"></div><div class="hull"></div></div><div class="duck">🦆</div><div class="duck d2">🦆</div></div>
      <div class="life-fx"><div class="train"><div class="train-body"></div></div><div class="leaf l1">🍃</div><div class="leaf l2">🍃</div><div class="leaf l3">🍂</div></div>
      <section class="places" id="places" aria-label="สถานที่ในเมือง">
        <button class="place p-service" data-zone="service"><span class="ico">♥</span>บริการ</button>
        <button class="place p-food" data-zone="food"><span class="ico">🍜</span>ร้านอาหาร</button>
        <button class="place p-market" data-zone="market"><span class="ico">🛍</span>ตลาด</button>
        <button class="place p-craft" data-zone="craft"><span class="ico">🔧</span>หาช่าง</button>
        <button class="place p-news" data-zone="news"><span class="ico">📢</span>ข่าวสาร</button>
        <button class="place p-event" data-zone="event"><span class="ico">🎉</span>กิจกรรม</button>
        <button class="place p-learn" data-zone="learn"><span class="ico">🎓</span>ฝึกอาชีพ</button>
        <button class="place p-chat" data-zone="chat"><span class="ico">💬</span>พูดคุย</button>
      </section>
      <div class="mascot-layer"><div class="mascot" id="mascot"><img src="assets/bc-mascot.png" alt="BC Mascot"></div><div class="bubble" id="bubble"></div></div>
    </main>
  </div>
  <a class="logo" href="#" aria-label="Bangraknoi Connect"><img src="assets/bc-logo.png" alt="BC"></a>
  <div class="tools"><button class="tool" id="home" aria-label="กลับหน้าแรก">⌂</button><button class="tool" id="sound" aria-label="เสียง">♪</button><button class="tool" id="menu" aria-label="เมนู">☰</button></div>
  <aside class="info" id="info" aria-live="polite"><div class="info-head"><div class="big" id="infoIcon">🍜</div><div><h2 id="infoTitle">ร้านอาหาร</h2><p id="infoSub">ของอร่อยใกล้บ้าน</p></div><button class="x" id="close">×</button></div><div class="info-body"><input class="search" id="search" placeholder="ค้นหาในหมวดนี้..."><div class="sample" id="sample"></div></div></aside>
</div>
<script>
const app=document.getElementById('app'), scroll=document.getElementById('scroll'), places=document.getElementById('places'), bubble=document.getElementById('bubble'), info=document.getElementById('info');
const data={
 service:['♥','บริการชุมชน','แจ้งปัญหา ติดต่อหน่วยงาน บริการใกล้ตัว',['แจ้งเหตุ/แจ้งปัญหา','บริการเทศบาล','ช่องทางติดต่อ']],
 food:['🍜','ร้านอาหาร','ร้านอร่อย คาเฟ่ ของกินในบางรักน้อย',['ก๋วยเตี๋ยวริมคลอง','ร้านอาหารตามสั่ง','คาเฟ่ริมน้ำ']],
 market:['🛍','ตลาด / สินค้า','ของดี ของฝาก สินค้าท้องถิ่น',['ตลาดบางรักน้อย','สินค้า/บริการท้องถิ่น','ผลไม้ตามฤดูกาล']],
 craft:['🔧','หาช่าง','ช่างใกล้บ้าน งานซ่อม งานบริการ',['ช่างไฟฟ้า','ช่างประปา','ช่างทั่วไป']],
 news:['📢','ข่าวสาร','ประกาศและเรื่องสำคัญของชุมชน',['ประกาศชุมชน','แจ้งเตือน','ข่าวประชาสัมพันธ์']],
 event:['🎉','กิจกรรมชุมชน','งานประเพณี กิจกรรม และนัดหมาย',['กิจกรรมประจำเดือน','งานชุมชน','รับสมัครอาสา']],
 learn:['🎓','ฝึกอาชีพ','เรียนรู้ทักษะใหม่ สร้างรายได้',['อบรมอาชีพ','ทักษะดิจิทัล','เวิร์กช็อปชุมชน']],
 chat:['💬','พูดคุย แลกเปลี่ยน','พื้นที่ถามตอบ เสนอแนะ และช่วยกัน',['ถาม-ตอบชุมชน','แลกเปลี่ยนของดี','ข้อเสนอแนะ']]
};
function timeMode(){const h=new Date().getHours(); if(h<6||h>=19)app.classList.add('night'); else if(h>=17)app.classList.add('evening'); else if(h<10)app.classList.add('morning')} timeMode();
function say(text,ms=2100){return new Promise(res=>{bubble.innerHTML=text;bubble.className='bubble show';setTimeout(()=>{bubble.className='bubble out';setTimeout(res,280)},ms)})}
async function intro(){await new Promise(r=>setTimeout(r,1200)); await say('สวัสดีครับ 😊',1700); await say('ยินดีต้อนรับสู่<br><b>บางรักน้อย Connect</b>',2200); await say('เมืองที่รวมทุกเรื่องของชุมชน<br>ไว้ในที่เดียว',2300); await say('วันนี้...จะพาไปไหนดีครับ?',2300); places.classList.add('awake')}
window.addEventListener('load',()=>{setTimeout(()=>{const max=scroll.scrollWidth-scroll.clientWidth;scroll.scrollLeft=Math.max(0,max*.22)},250);intro()});
function openZone(zone){const d=data[zone]; if(!d)return; document.querySelectorAll('.place').forEach(p=>p.classList.toggle('active',p.dataset.zone===zone)); document.getElementById('infoIcon').textContent=d[0]; document.getElementById('infoTitle').textContent=d[1]; document.getElementById('infoSub').textContent=d[2]; document.getElementById('sample').innerHTML=d[3].map((x,i)=>`<div class="row"><div class="thumb">${d[0]}</div><div><b>${x}</b><span>ข้อมูลตัวอย่าง — พร้อมเชื่อมฐานข้อมูลจริง</span></div></div>`).join(''); info.classList.add('open'); const target=document.querySelector(`[data-zone="${zone}"]`); if(target){const r=target.getBoundingClientRect(), s=scroll.getBoundingClientRect(); scroll.scrollTo({left:scroll.scrollLeft+r.left-s.left-scroll.clientWidth*.45,behavior:'smooth'});} }
document.querySelectorAll('.place').forEach(b=>b.addEventListener('click',()=>openZone(b.dataset.zone)));
document.getElementById('close').onclick=()=>info.classList.remove('open');
document.getElementById('home').onclick=()=>{info.classList.remove('open');scroll.scrollTo({left:(scroll.scrollWidth-scroll.clientWidth)*.22,behavior:'smooth'});};
document.getElementById('menu').onclick=()=>{places.classList.add('awake');say('เลือกสถานที่ในเมืองได้เลยครับ',1600)};
let soundOn=false,audioCtx,osc,gain;document.getElementById('sound').onclick=()=>{soundOn=!soundOn;if(soundOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();osc=audioCtx.createOscillator();gain=audioCtx.createGain();osc.type='sine';osc.frequency.value=220;gain.gain.value=.015;osc.connect(gain);gain.connect(audioCtx.destination);osc.start();document.getElementById('sound').textContent='♫'}else{try{osc.stop();audioCtx.close()}catch(e){}document.getElementById('sound').textContent='♪'}};
</script>
</body>
</html>
