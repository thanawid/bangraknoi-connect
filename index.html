<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>บางรักน้อย Connect — Living Community</title>
<meta name="description" content="บางรักน้อยฉบับดิจิทัลที่มีชีวิต เมืองคืออินเทอร์เฟซ" />
<style>
:root{
  --sky:#8fd3ff;
  --ink:#2d195b;
  --paper:#fff8df;
  --wood:#9a5b22;
  --wood-dark:#633511;
  --glow:#ffd85a;
  --night:#07182e;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:"Sarabun",system-ui,-apple-system,Segoe UI,sans-serif;background:var(--sky);touch-action:none;color:var(--ink)}
button{font:inherit}
.world{position:relative;width:100vw;height:100dvh;overflow:hidden;background:linear-gradient(#98dfff,#f9f3d2);isolation:isolate}
.scene{position:absolute;inset:0;background:url('assets/city.png') center center/cover no-repeat;z-index:1;transform:scale(1.01);transition:filter 1s ease, transform 1.4s cubic-bezier(.2,.8,.2,1)}
.world.focus-food .scene{transform:scale(1.08) translateX(-4%) translateY(1%)}
.world.focus-craft .scene{transform:scale(1.09) translateX(-10%) translateY(1%)}
.world.focus-service .scene{transform:scale(1.08) translateX(0) translateY(2%)}
.world.focus-event .scene{transform:scale(1.08) translateY(-2%)}
.world.focus-market .scene{transform:scale(1.08) translateX(-7%) translateY(1%)}
.veil{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(255,255,255,.05),rgba(40,13,75,.08) 78%,rgba(27,10,55,.22));transition:background 1s ease}
.brand{position:absolute;left:18px;top:14px;z-index:50;display:flex;align-items:center;gap:9px;padding:7px 12px 7px 7px;border-radius:999px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.45);backdrop-filter:blur(12px);box-shadow:0 10px 30px rgba(32,16,70,.16)}
.brand img{width:34px;height:34px;border-radius:10px;object-fit:contain}.brand strong{display:block;font-size:13px;color:#fff;text-shadow:0 2px 10px rgba(25,10,60,.6);letter-spacing:.1px}.brand span{display:block;font-size:10px;color:rgba(255,255,255,.8);margin-top:-1px}
/* sky life */
.cloud{position:absolute;z-index:5;pointer-events:none;background:rgba(255,255,255,.9);border-radius:999px;filter:drop-shadow(0 6px 14px rgba(50,100,150,.12));animation:cloudMove linear infinite}.cloud:before,.cloud:after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.95)}
.c1{width:130px;height:42px;top:8%;left:-18%;animation-duration:62s}.c1:before{width:66px;height:66px;left:18px;top:-34px}.c1:after{width:82px;height:82px;right:13px;top:-45px}
.c2{width:92px;height:31px;top:16%;left:-20%;opacity:.72;animation-duration:83s;animation-delay:17s}.c2:before{width:46px;height:46px;left:13px;top:-23px}.c2:after{width:58px;height:58px;right:9px;top:-32px}
.c3{width:114px;height:36px;top:5%;left:-25%;opacity:.82;animation-duration:74s;animation-delay:37s}.c3:before{width:58px;height:58px;left:17px;top:-29px}.c3:after{width:70px;height:70px;right:12px;top:-38px}
@keyframes cloudMove{to{transform:translateX(138vw)}}
.bird{position:absolute;z-index:6;pointer-events:none;color:#fff;text-shadow:0 2px 6px rgba(30,30,80,.25);opacity:.75;animation:birdFly linear infinite}.b1{top:13%;left:-5%;font-size:17px;animation-duration:23s}.b2{top:8%;left:-6%;font-size:12px;animation-duration:31s;animation-delay:9s}.b3{top:19%;left:-8%;font-size:14px;animation-duration:42s;animation-delay:19s}@keyframes birdFly{to{transform:translate(120vw,-18px)}}
/* river hints */
.waterline{position:absolute;left:-20%;right:-20%;bottom:6%;height:18%;z-index:7;pointer-events:none;opacity:.23;background:repeating-linear-gradient(165deg,transparent 0 24px,rgba(255,255,255,.65) 25px 28px,transparent 29px 52px);animation:waterSlide 12s linear infinite;mix-blend-mode:screen}@keyframes waterSlide{to{transform:translateX(90px)}}
.boat{position:absolute;z-index:12;bottom:18%;left:-12%;font-size:32px;filter:drop-shadow(0 8px 10px rgba(20,30,70,.25));animation:boatGo 46s linear infinite}.boat.b2{bottom:11%;animation-duration:58s;animation-delay:18s;font-size:26px;opacity:.88}@keyframes boatGo{0%{transform:translateX(-10vw) translateY(0)}50%{transform:translateX(60vw) translateY(-6px)}100%{transform:translateX(118vw) translateY(1px)}}
.train{position:absolute;z-index:9;right:-30%;top:21%;font-size:38px;opacity:.92;filter:drop-shadow(0 8px 14px rgba(20,20,80,.22));animation:trainRun 58s linear infinite 8s}@keyframes trainRun{0%{transform:translateX(0)}100%{transform:translateX(-145vw)}}
.leaf{position:absolute;z-index:8;top:-30px;pointer-events:none;font-size:16px;opacity:.7;animation:leafFall linear infinite}.l1{left:7%;animation-duration:14s}.l2{left:27%;animation-duration:19s;animation-delay:5s}.l3{right:12%;animation-duration:16s;animation-delay:10s}@keyframes leafFall{to{transform:translate(58px,112vh) rotate(520deg);opacity:0}}
.smoke{position:absolute;z-index:13;right:20%;top:51%;width:40px;height:70px;pointer-events:none}.puff{position:absolute;border-radius:50%;background:rgba(255,255,255,.55);animation:puff 4.5s ease-out infinite}.puff:nth-child(1){width:12px;height:12px;left:9px;top:42px}.puff:nth-child(2){width:16px;height:16px;left:18px;top:46px;animation-delay:1.3s}.puff:nth-child(3){width:10px;height:10px;left:0;top:48px;animation-delay:2.6s}@keyframes puff{0%{opacity:.5;transform:translateY(0) scale(.5)}100%{opacity:0;transform:translateY(-86px) scale(2.4)}}
.fruit{position:absolute;z-index:12;pointer-events:none;font-size:18px;filter:drop-shadow(0 3px 5px rgba(80,40,20,.18));animation:fruitBob 2.8s ease-in-out infinite}.durian1{left:14%;top:38%}.durian2{left:17%;top:45%;animation-delay:1s}.mango1{left:23%;top:40%;animation-delay:.5s}.mango2{left:25%;top:48%;animation-delay:1.5s}@keyframes fruitBob{50%{transform:translateY(-6px) rotate(-4deg)}}
/* BC */
.bc{position:absolute;z-index:40;left:-150px;bottom:7%;width:clamp(86px,10vw,132px);filter:drop-shadow(0 14px 22px rgba(35,20,80,.38));animation:bcEnter 3.8s cubic-bezier(.2,.72,.2,1) 1.5s forwards}.bc img{width:100%;display:block;animation:bcBreathe 2.4s ease-in-out infinite 5s}.bc .hand{position:absolute;right:-14px;top:10px;font-size:22px;opacity:0;animation:wave 1.4s ease-in-out 5.2s 3}@keyframes bcEnter{0%{left:-150px;transform:translateY(0) scale(.9)}60%{left:43%;transform:translateY(-8px) scale(1.02)}100%{left:43%;transform:translateY(0) scale(1)}}@keyframes bcBreathe{50%{transform:translateY(-7px)}}@keyframes wave{0%,100%{opacity:1;transform:rotate(0)}50%{opacity:1;transform:rotate(24deg)}}
.speech{position:absolute;z-index:44;left:calc(43% + 72px);bottom:calc(7% + 86px);max-width:min(280px,64vw);padding:10px 14px;border-radius:20px 20px 20px 6px;background:rgba(255,255,255,.94);box-shadow:0 12px 36px rgba(43,20,80,.18);font-size:clamp(13px,1.7vw,15px);font-weight:800;line-height:1.45;opacity:0;transform:translateY(8px) scale(.96);transition:opacity .45s,transform .45s}.speech.on{opacity:1;transform:translateY(0) scale(1)}
/* places are born from the city, not pinned from start */
.places{position:absolute;inset:0;z-index:32;pointer-events:none}.place{position:absolute;pointer-events:auto;border:none;background:transparent;cursor:pointer;opacity:0;transform:translateY(34px) scale(.86);transition:filter .18s,transform .18s}.places.awake .place{animation:risePlace .72s cubic-bezier(.16,1.35,.34,1) forwards}.place .sign{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:13px;background:linear-gradient(#b9702b,#844715);border:2px solid #683711;color:#fff7dc;text-shadow:0 1px 1px rgba(0,0,0,.22);box-shadow:0 8px 18px rgba(55,25,10,.22);font-weight:900;font-size:clamp(11px,1.4vw,13px);white-space:nowrap}.place .peg{width:4px;height:18px;margin:auto;background:#6b3710;border-radius:0 0 4px 4px;box-shadow:0 4px 6px rgba(0,0,0,.15)}.place:hover{filter:drop-shadow(0 0 12px rgba(255,216,90,.9));transform:translateY(-6px) scale(1.05)}
.food{right:18%;top:47%;animation-delay:.05s}.craft{right:7%;top:47%;animation-delay:.15s}.service{left:43%;top:43%;animation-delay:.25s}.event{left:48%;bottom:25%;animation-delay:.35s}.market{right:31%;top:47%;animation-delay:.45s}@keyframes risePlace{to{opacity:1;transform:translateY(0) scale(1)}}
/* tiny in-world response, not dashboard */
.note{position:absolute;z-index:55;left:22px;bottom:22px;width:min(330px,calc(100vw - 44px));background:rgba(255,248,223,.95);border:2px solid rgba(129,77,25,.55);box-shadow:0 18px 50px rgba(43,20,80,.22);border-radius:18px;padding:14px 16px;opacity:0;transform:translateY(18px);pointer-events:none;transition:.35s}.note.on{opacity:1;transform:translateY(0);pointer-events:auto}.note h2{font-size:18px;margin-bottom:4px}.note p{font-size:13px;line-height:1.55;color:#5b4770}.note .close{position:absolute;right:8px;top:8px;width:26px;height:26px;border:none;border-radius:50%;background:rgba(80,40,120,.1);cursor:pointer;color:#4b2582;font-weight:900}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.chip{font-size:11px;border:1px solid rgba(88,45,140,.18);background:#fff;border-radius:999px;padding:5px 8px;color:#4b2582;font-weight:800}
/* night/time system */
.world.night{background:#08162f}.world.night .scene{filter:brightness(.45) saturate(.72) hue-rotate(10deg)}.world.night .veil{background:linear-gradient(to bottom,rgba(4,10,34,.55),rgba(7,10,35,.15) 45%,rgba(7,10,30,.55))}.world.night .brand{background:rgba(20,16,55,.32);border-color:rgba(180,160,255,.25)}.world.night .cloud{background:rgba(170,180,220,.28)}.world.night .cloud:before,.world.night .cloud:after{background:rgba(170,180,220,.3)}.world.night .place .sign{background:linear-gradient(#8c5a32,#5f3519)}.firefly{position:absolute;z-index:10;width:5px;height:5px;border-radius:50%;background:#ffef98;box-shadow:0 0 12px 4px rgba(255,238,130,.65);opacity:0;animation:firefly 5s ease-in-out infinite}.f1{left:22%;bottom:26%;animation-delay:0s}.f2{left:35%;bottom:20%;animation-delay:1.6s}.f3{right:30%;bottom:24%;animation-delay:3s}@keyframes firefly{0%,100%{opacity:0;transform:translate(0,0)}30%,70%{opacity:.9}50%{transform:translate(30px,-16px)}}
@media (max-width:720px){.scene{background-size:cover;background-position:center center}.brand span{display:none}.brand strong{font-size:12px}.bc{width:78px;bottom:7%}@keyframes bcEnter{0%{left:-130px;transform:translateY(0) scale(.9)}60%{left:38%;transform:translateY(-8px) scale(1.02)}100%{left:38%;transform:translateY(0) scale(1)}}.speech{left:calc(38% + 50px);bottom:calc(7% + 70px);font-size:12px}.place .sign{font-size:10px;padding:6px 9px}.food{right:12%;top:48%}.craft{right:2%;top:48%}.service{left:37%;top:43%}.event{left:40%;bottom:26%}.market{right:25%;top:48%}.note{font-size:12px}}
</style>
</head>
<body>
<div class="world" id="world">
  <div class="scene" aria-hidden="true"></div>
  <div class="veil"></div>
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
  <div class="bird b1">⌁</div><div class="bird b2">⌁</div><div class="bird b3">⌁</div>
  <div class="waterline"></div><div class="boat">🚤</div><div class="boat b2">🛶</div><div class="train">🚇</div>
  <div class="leaf l1">🍃</div><div class="leaf l2">🍂</div><div class="leaf l3">🍃</div>
  <div class="smoke"><div class="puff"></div><div class="puff"></div><div class="puff"></div></div>
  <div class="fruit durian1" data-season="durian">🌳</div><div class="fruit durian2" data-season="durian">🌳</div><div class="fruit mango1" data-season="mango">🥭</div><div class="fruit mango2" data-season="mango">🥭</div>
  <div class="firefly f1"></div><div class="firefly f2"></div><div class="firefly f3"></div>
  <div class="brand"><img src="assets/logo.png" alt="BC"><div><strong>บางรักน้อย Connect</strong><span>A Living Community</span></div></div>
  <div class="bc" id="bc"><img src="assets/mascot.png" alt="BC"><div class="hand">👋</div></div>
  <div class="speech" id="speech"></div>
  <div class="places" id="places">
    <button class="place food" data-place="food"><div class="sign">🍜 ร้านอาหาร</div><div class="peg"></div></button>
    <button class="place craft" data-place="craft"><div class="sign">🔧 หาช่าง</div><div class="peg"></div></button>
    <button class="place service" data-place="service"><div class="sign">❤️ บริการ</div><div class="peg"></div></button>
    <button class="place event" data-place="event"><div class="sign">🎉 กิจกรรม</div><div class="peg"></div></button>
    <button class="place market" data-place="market"><div class="sign">🛍 ตลาด</div><div class="peg"></div></button>
  </div>
  <section class="note" id="note" aria-live="polite"><button class="close" id="closeNote">×</button><h2 id="noteTitle"></h2><p id="noteText"></p><div class="chips" id="chips"></div></section>
</div>
<script>
const world=document.getElementById('world');
const speech=document.getElementById('speech');
const places=document.getElementById('places');
const note=document.getElementById('note');
const noteTitle=document.getElementById('noteTitle');
const noteText=document.getElementById('noteText');
const chips=document.getElementById('chips');
const data={
  food:{title:'ร้านอาหาร',text:'เมืองจะพาไปย่านของกินริมคลอง ร้านอาหารจะไม่ใช่ปุ่ม แต่เป็นสถานที่ที่กดเข้าไปดูร้านทั้งหมดได้',chips:['ก๋วยเตี๋ยว','คาเฟ่','อาหารตามสั่ง'],focus:'focus-food'},
  craft:{title:'หาช่าง',text:'บ้านช่างคือประตูสู่ข้อมูลช่างในบางรักน้อย ทั้งไฟฟ้า ประปา แอร์ และซ่อมบ้าน',chips:['ช่างไฟ','ช่างประปา','ช่างแอร์'],focus:'focus-craft'},
  service:{title:'บริการชุมชน',text:'เทศบาลเป็นส่วนหนึ่งของเมือง ใช้เป็นประตูไปยังบริการชุมชน ข่าวบริการ และช่องทางติดต่อ',chips:['แจ้งเหตุ','บริการ','ติดต่อ'],focus:'focus-service'},
  event:{title:'กิจกรรม',text:'ลานกิจกรรมคือพื้นที่รวมงานชุมชน อบรม สุขภาพ งานวัด และกิจกรรมตามฤดูกาล',chips:['งานชุมชน','อบรม','งานประเพณี'],focus:'focus-event'},
  market:{title:'ตลาด',text:'ตลาดและสวนผลไม้คือทางเข้าสู่สินค้า ของดีท้องถิ่น ทุเรียน มะม่วง และบริการในชุมชน',chips:['ของดี','สินค้า','ผลไม้'],focus:'focus-market'}
};
function setTimeWorld(){
  const h=new Date().getHours();
  world.classList.toggle('night', h>=18 || h<6);
  // seasonal hint: show durian May-Jul, mango Mar-May, otherwise both subtle
  const m=new Date().getMonth()+1;
  document.querySelectorAll('[data-season]').forEach(el=>el.style.opacity='.75');
  if(m>=5&&m<=7){document.querySelectorAll('[data-season="mango"]').forEach(el=>el.style.opacity='.18')}
  if(m>=3&&m<=5){document.querySelectorAll('[data-season="durian"]').forEach(el=>el.style.opacity='.18')}
}
setTimeWorld();
setInterval(setTimeWorld,60000);
function say(text,duration=2600){
  speech.innerHTML=text;
  speech.classList.add('on');
  clearTimeout(speech._t);
  speech._t=setTimeout(()=>speech.classList.remove('on'),duration);
}
window.addEventListener('load',()=>{
  setTimeout(()=>say('สวัสดีครับ 😊'),5200);
  setTimeout(()=>say('ยินดีต้อนรับสู่บางรักน้อย',3000),8400);
  setTimeout(()=>{say('วันนี้...จะพาไปไหนดีครับ?',4200); places.classList.add('awake')},11600);
});
document.querySelectorAll('.place').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const d=data[btn.dataset.place];
    world.className='world '+(world.classList.contains('night')?'night ':'')+d.focus;
    noteTitle.textContent=d.title; noteText.textContent=d.text;
    chips.innerHTML=d.chips.map(c=>'<span class="chip">'+c+'</span>').join('');
    note.classList.add('on');
    say('ไปทางนี้ครับ 👇',1800);
  });
});
document.getElementById('closeNote').addEventListener('click',()=>{note.classList.remove('on'); world.className='world '+(world.classList.contains('night')?'night':'')});
</script>
</body>
</html>
