<meta charset="UTF-8">

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#6B21A8;--purple-dark:#4C1D95;--purple-light:#EDE9FE;--purple-mid:#7C3AED;
  --gold:#D97706;--gold-light:#FEF3C7;--gold-bright:#F59E0B;
  --green:#15803D;--green-light:#DCFCE7;--yellow:#CA8A04;
  --white:#FFFFFF;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
}

body{word-break:keep-all;overflow-wrap:break-word;-webkit-locale:"th";font-variant-ligatures:none}
body{font-family:'Sarabun',sans-serif;background:#F5F3FF;color:var(--gray-900);min-height:100vh}
.header{background:linear-gradient(135deg,#4C1D95 0%,#6B21A8 60%,#8B21C8 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(107,33,168,0.4)}
.header-inner{max-width:640px;margin:0 auto;padding:0.75rem 1.25rem;display:flex;align-items:center;gap:12px}
.logo-wrap{width:48px;height:48px;border-radius:12px;overflow:hidden;flex-shrink:0;background:transparent}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.header-text h1{font-size:17px;font-weight:600;color:#fff;letter-spacing:0.2px}
.header-text p{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px}
.header-right{margin-left:auto}
.header-badge{background:rgba(255,255,255,0.15);border:0.5px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 10px;font-size:11px;color:#fff;display:flex;align-items:center;gap:4px}
.hero{background:linear-gradient(180deg,#4C1D95 0%,#6B21A8 100%);padding:1.5rem 1.25rem 2rem;max-width:640px;margin:0 auto}
.hero-title{font-size:22px;font-weight:600;color:#fff;margin-bottom:6px;line-height:1.3}
.hero-title span{color:#F59E0B}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:1.25rem;line-height:1.6}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:#fff;border:none;border-radius:var(--radius-lg);padding:13px 48px 13px 48px;font-size:14px;font-family:'Sarabun',sans-serif;color:var(--gray-900);outline:none;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.search-wrap input::placeholder{color:var(--gray-500)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--purple);font-size:20px}
.search-ai-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);padding:6px 14px;font-size:12px;font-family:'Sarabun',sans-serif;cursor:pointer;display:flex;align-items:center;gap:4px}
.stats-bar{max-width:640px;margin:0 auto;background:#fff;border-bottom:0.5px solid var(--gray-200);padding:0.75rem 1.25rem;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-item{text-align:center}
.stat-num{font-size:20px;font-weight:600;color:var(--purple)}
.stat-lbl{font-size:10px;color:var(--gray-500)}
.main{max-width:640px;margin:0 auto;padding:0 0 80px}
.ai-panel{background:linear-gradient(135deg,#EDE9FE,#F0FDF4);border:1px solid rgba(107,33,168,0.15);border-radius:var(--radius-lg);margin:1rem 1.25rem;padding:1rem 1.25rem}
.ai-panel-head{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem}
.ai-panel-head i{font-size:20px;color:var(--purple-mid)}
.ai-panel-head span{font-size:14px;font-weight:500;color:var(--purple-dark)}
.close-ai{margin-left:auto;background:none;border:none;color:var(--gray-500);cursor:pointer;font-size:18px;padding:0}
.ai-input-row{display:flex;gap:8px;margin-bottom:0.75rem}
.ai-input-row input{flex:1;border:1px solid rgba(107,33,168,0.25);border-radius:var(--radius-md);padding:9px 12px;font-size:13px;font-family:'Sarabun',sans-serif;color:var(--gray-900);background:#fff;outline:none}
.ai-send{background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);padding:9px 16px;font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer;font-weight:500}
.ai-tags{display:flex;gap:6px;flex-wrap:wrap}
.ai-tag{font-size:11px;padding:4px 10px;border-radius:20px;background:#fff;border:1px solid rgba(107,33,168,0.2);color:var(--purple);cursor:pointer;font-family:'Sarabun',sans-serif}
.ai-result{margin-top:0.875rem;background:#fff;border-radius:var(--radius-md);padding:0.875rem 1rem;font-size:13px;line-height:1.7;color:var(--gray-700);border-left:3px solid var(--purple-mid);display:none}
.ai-result.show{display:block}
.section-label{font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:1px;text-transform:uppercase;padding:1.25rem 1.25rem 0.5rem;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--gray-200)}
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 1.25rem}
.cat{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:14px 8px 12px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.cat:hover{border-color:var(--purple-mid);background:var(--purple-light)}
.cat.active{border-color:var(--purple);background:var(--purple-light)}
.cat.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--gold-bright))}
.cat-icon{font-size:26px;display:block;margin-bottom:6px}
.c1 .cat-icon{color:#7C3AED}.c2 .cat-icon{color:#D97706}.c3 .cat-icon{color:#15803D}
.c4 .cat-icon{color:#D97706}.c5 .cat-icon{color:#0369A1}.c6 .cat-icon{color:#BE185D}
.cat-name{font-size:11px;color:var(--gray-700);line-height:1.3;font-weight:500}
.cat-count{font-size:10px;color:var(--gray-500);margin-top:2px}
.list-head{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.25rem 0.625rem}
.list-head h2{font-size:16px;font-weight:600;color:var(--gray-900);display:flex;align-items:center;gap:6px}
.list-head h2 i{font-size:18px;color:var(--purple)}
.list-head a{font-size:12px;color:var(--purple);text-decoration:none;cursor:pointer}
.card-list{padding:0 1.25rem}
.card{background:#fff;border:0.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:1rem 1.125rem;margin-bottom:10px;display:flex;gap:12px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.card:hover{border-color:rgba(107,33,168,0.3);box-shadow:0 4px 16px rgba(107,33,168,0.08)}
.card-thumb{width:48px;height:48px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.t-purple{background:#EDE9FE;color:#7C3AED}.t-gold{background:#FEF3C7;color:#D97706}
.t-green{background:#DCFCE7;color:#15803D}.t-blue{background:#E0F2FE;color:#0369A1}
.t-pink{background:#FCE7F3;color:#BE185D}
.card-body{flex:1;min-width:0}
.card-body h3{font-size:14px;font-weight:600;color:var(--gray-900);margin-bottom:3px}
.card-body p{font-size:12px;color:var(--gray-500);line-height:1.5;margin-bottom:6px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.b-purple{background:#EDE9FE;color:#4C1D95}.b-gold{background:#FEF3C7;color:#92400E}
.b-green{background:#DCFCE7;color:#166534}.b-blue{background:#E0F2FE;color:#1E40AF}
.b-gray{background:#F3F4F6;color:#6B7280}
.verified{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#15803D;background:#DCFCE7;padding:2px 6px;border-radius:20px}
.phone-link{font-size:11px;color:var(--purple);display:flex;align-items:center;gap:3px;text-decoration:none}
.gold-divider{height:2px;background:linear-gradient(90deg,transparent,#F59E0B,transparent);margin:1.25rem 1.25rem 0;opacity:0.4}
.map-block{margin:1.25rem 1.25rem 0;background:linear-gradient(135deg,#EDE9FE,#FEF3C7);border:1px solid rgba(107,33,168,0.15);border-radius:var(--radius-lg);padding:1.25rem;display:flex;align-items:center;gap:14px;cursor:pointer}
.map-icon{width:52px;height:52px;background:var(--purple);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.map-icon i{font-size:26px;color:#fff}
.map-text h3{font-size:14px;font-weight:600;color:var(--purple-dark)}
.map-text p{font-size:12px;color:var(--gray-500);margin-top:2px}
.map-arr{margin-left:auto;color:var(--purple);font-size:20px}
.reg-block{margin:1rem 1.25rem;background:linear-gradient(135deg,#4C1D95,#6B21A8);border-radius:var(--radius-lg);padding:1.25rem;color:#fff;position:relative;overflow:hidden}
.reg-block::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,0.05);border-radius:50%}
.reg-block h3{font-size:15px;font-weight:600;margin-bottom:4px;position:relative}
.reg-block p{font-size:12px;color:rgba(255,255,255,0.75);margin-bottom:1rem;line-height:1.5;position:relative}
.reg-btns{display:flex;gap:8px;flex-wrap:wrap;position:relative}
.reg-btn{padding:8px 16px;border-radius:var(--radius-md);font-size:12px;font-family:'Sarabun',sans-serif;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:6px}
.btn-gold{background:#F59E0B;color:#fff}
.btn-outline{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)}
.footer-note{text-align:center;padding:1.5rem 1.25rem 0.5rem;font-size:11px;color:var(--gray-500);line-height:1.8}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid var(--gray-200);padding:0.5rem 0 0.75rem;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.06)}
.bottom-nav-inner{max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;background:none;border:none;cursor:pointer;font-family:'Sarabun',sans-serif}
.nav-btn i{font-size:22px;color:#6B7280}
.nav-btn span{font-size:10px;color:#6B7280}
.nav-btn.active i{color:var(--purple)}
.nav-btn.active span{color:var(--purple)}


@media(min-width:1024px){
  body{background:#1E1148}
  .desktop-wrap{max-width:100%;display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr;min-height:100vh;background:transparent}

  /* Header เต็มแถว */
  .header{grid-column:1/-1;grid-row:1;background:linear-gradient(135deg,#3B0764,#6B21A8);padding:0}
  .header-inner{max-width:100%;padding:0.625rem 1.5rem;gap:12px}
  .header-text h1{font-size:16px}

  /* Sidebar ซ้าย */
  .sidebar{display:flex!important;flex-direction:column;grid-column:1;grid-row:2;background:#2D1B69;padding:1.25rem 0;min-height:calc(100vh - 56px);position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
  .sidebar-logo{padding:0 1.25rem 1.25rem;border-bottom:0.5px solid rgba(255,255,255,0.1);margin-bottom:1rem}
  .sidebar-logo img{width:64px;height:64px;object-fit:contain;display:block;margin:0 auto 8px}
  .sidebar-logo p{text-align:center;font-size:11px;color:rgba(255,255,255,0.5);line-height:1.5}
  .sidebar-menu{padding:0 0.75rem}
  .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:4px;transition:all 0.15s}
  .sidebar-item:hover{background:rgba(255,255,255,0.08);color:#fff}
  .sidebar-item.active{background:rgba(255,255,255,0.15);color:#fff}
  .sidebar-item i{font-size:18px;width:20px;text-align:center}
  .sidebar-item.c1 i{color:#A78BFA}
  .sidebar-item.c2 i{color:#F59E0B}
  .sidebar-item.c3 i{color:#34D399}
  .sidebar-item.c4 i{color:#FB923C}
  .sidebar-item.c5 i{color:#60A5FA}
  .sidebar-item.c6 i{color:#F472B6}
  .sidebar-divider{height:0.5px;background:rgba(255,255,255,0.1);margin:0.75rem 1.25rem}
  .sidebar-footer{margin-top:auto;padding:1rem 1.25rem}
  .sidebar-footer p{font-size:10px;color:rgba(255,255,255,0.3);line-height:1.6;text-align:center}

  /* Content ขวา */
  .content-area{grid-column:2;grid-row:2;background:#F5F3FF;overflow-y:auto}
  .hero{border-radius:0}
  .stats-bar{border-radius:0}
  .cats{grid-template-columns:repeat(3,1fr)}
  .card-list{grid-template-columns:1fr 1fr}
  .bottom-nav{display:none!important}
  .main{padding-bottom:2rem}

  /* Hero บน desktop */
  .hero-title{font-size:28px}
  .hero{padding:1.5rem 2rem 2rem}
  .section-label{padding:1.25rem 2rem 0.5rem}
  .cats{padding:0 2rem;gap:10px}
  .list-head{padding:1.25rem 2rem 0.625rem}
  .card-list{padding:0 2rem}
  .ai-panel{margin:1rem 2rem}
  .map-block{margin:1.25rem 2rem 0}
  .reg-block{margin:1rem 2rem}
  .footer-note{padding:1.5rem 2rem}
  .gold-divider{margin:1.25rem 2rem 0}
}

@media(max-width:1023px){
  .sidebar{display:none}
  .content-area{display:contents}
}

  .cats{padding:0 2rem;gap:10px}
  .list-head{padding:1.25rem 2rem 0.625rem}
  .card-list{padding:0 2rem}
  .ai-panel{margin:1rem 2rem}
  .map-block{margin:1.25rem 2rem 0}
  .reg-block{margin:1rem 2rem}
  .footer-note{padding:1.5rem 2rem}
  .gold-divider{margin:1.25rem 2rem 0}
}

@media(max-width:1023px){
  .sidebar{display:none}
  .content-area{display:contents}
}

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บางรักน้อย Connect — ศูนย์รวมข้อมูลชุมชน</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="logo_BC.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#6B21A8;--purple-dark:#4C1D95;--purple-light:#EDE9FE;--purple-mid:#7C3AED;
  --gold:#D97706;--gold-light:#FEF3C7;--gold-bright:#F59E0B;
  --green:#15803D;--green-light:#DCFCE7;--yellow:#CA8A04;
  --white:#FFFFFF;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
}

body{word-break:keep-all;overflow-wrap:break-word;-webkit-locale:"th";font-variant-ligatures:none}
body{font-family:'Sarabun',sans-serif;background:#F5F3FF;color:var(--gray-900);min-height:100vh}
.header{background:linear-gradient(135deg,#4C1D95 0%,#6B21A8 60%,#8B21C8 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(107,33,168,0.4)}
.header-inner{max-width:640px;margin:0 auto;padding:0.75rem 1.25rem;display:flex;align-items:center;gap:12px}
.logo-wrap{width:48px;height:48px;border-radius:12px;overflow:hidden;flex-shrink:0;background:transparent}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.header-text h1{font-size:17px;font-weight:600;color:#fff;letter-spacing:0.2px}
.header-text p{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px}
.header-right{margin-left:auto}
.header-badge{background:rgba(255,255,255,0.15);border:0.5px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 10px;font-size:11px;color:#fff;display:flex;align-items:center;gap:4px}
.hero{background:linear-gradient(180deg,#4C1D95 0%,#6B21A8 100%);padding:1.5rem 1.25rem 2rem;max-width:640px;margin:0 auto}
.hero-title{font-size:22px;font-weight:600;color:#fff;margin-bottom:6px;line-height:1.3}
.hero-title span{color:#F59E0B}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:1.25rem;line-height:1.6}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:#fff;border:none;border-radius:var(--radius-lg);padding:13px 48px 13px 48px;font-size:14px;font-family:'Sarabun',sans-serif;color:var(--gray-900);outline:none;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.search-wrap input::placeholder{color:var(--gray-500)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--purple);font-size:20px}
.search-ai-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);padding:6px 14px;font-size:12px;font-family:'Sarabun',sans-serif;cursor:pointer;display:flex;align-items:center;gap:4px}
.stats-bar{max-width:640px;margin:0 auto;background:#fff;border-bottom:0.5px solid var(--gray-200);padding:0.75rem 1.25rem;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-item{text-align:center}
.stat-num{font-size:20px;font-weight:600;color:var(--purple)}
.stat-lbl{font-size:10px;color:var(--gray-500)}
.main{max-width:640px;margin:0 auto;padding:0 0 80px}
.ai-panel{background:linear-gradient(135deg,#EDE9FE,#F0FDF4);border:1px solid rgba(107,33,168,0.15);border-radius:var(--radius-lg);margin:1rem 1.25rem;padding:1rem 1.25rem}
.ai-panel-head{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem}
.ai-panel-head i{font-size:20px;color:var(--purple-mid)}
.ai-panel-head span{font-size:14px;font-weight:500;color:var(--purple-dark)}
.close-ai{margin-left:auto;background:none;border:none;color:var(--gray-500);cursor:pointer;font-size:18px;padding:0}
.ai-input-row{display:flex;gap:8px;margin-bottom:0.75rem}
.ai-input-row input{flex:1;border:1px solid rgba(107,33,168,0.25);border-radius:var(--radius-md);padding:9px 12px;font-size:13px;font-family:'Sarabun',sans-serif;color:var(--gray-900);background:#fff;outline:none}
.ai-send{background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);padding:9px 16px;font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer;font-weight:500}
.ai-tags{display:flex;gap:6px;flex-wrap:wrap}
.ai-tag{font-size:11px;padding:4px 10px;border-radius:20px;background:#fff;border:1px solid rgba(107,33,168,0.2);color:var(--purple);cursor:pointer;font-family:'Sarabun',sans-serif}
.ai-result{margin-top:0.875rem;background:#fff;border-radius:var(--radius-md);padding:0.875rem 1rem;font-size:13px;line-height:1.7;color:var(--gray-700);border-left:3px solid var(--purple-mid);display:none}
.ai-result.show{display:block}
.section-label{font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:1px;text-transform:uppercase;padding:1.25rem 1.25rem 0.5rem;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--gray-200)}
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 1.25rem}
.cat{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:14px 8px 12px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.cat:hover{border-color:var(--purple-mid);background:var(--purple-light)}
.cat.active{border-color:var(--purple);background:var(--purple-light)}
.cat.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--gold-bright))}
.cat-icon{font-size:26px;display:block;margin-bottom:6px}
.c1 .cat-icon{color:#7C3AED}.c2 .cat-icon{color:#D97706}.c3 .cat-icon{color:#15803D}
.c4 .cat-icon{color:#D97706}.c5 .cat-icon{color:#0369A1}.c6 .cat-icon{color:#BE185D}
.cat-name{font-size:11px;color:var(--gray-700);line-height:1.3;font-weight:500}
.cat-count{font-size:10px;color:var(--gray-500);margin-top:2px}
.list-head{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.25rem 0.625rem}
.list-head h2{font-size:16px;font-weight:600;color:var(--gray-900);display:flex;align-items:center;gap:6px}
.list-head h2 i{font-size:18px;color:var(--purple)}
.list-head a{font-size:12px;color:var(--purple);text-decoration:none;cursor:pointer}
.card-list{padding:0 1.25rem}
.card{background:#fff;border:0.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:1rem 1.125rem;margin-bottom:10px;display:flex;gap:12px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.card:hover{border-color:rgba(107,33,168,0.3);box-shadow:0 4px 16px rgba(107,33,168,0.08)}
.card-thumb{width:48px;height:48px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.t-purple{background:#EDE9FE;color:#7C3AED}.t-gold{background:#FEF3C7;color:#D97706}
.t-green{background:#DCFCE7;color:#15803D}.t-blue{background:#E0F2FE;color:#0369A1}
.t-pink{background:#FCE7F3;color:#BE185D}
.card-body{flex:1;min-width:0}
.card-body h3{font-size:14px;font-weight:600;color:var(--gray-900);margin-bottom:3px}
.card-body p{font-size:12px;color:var(--gray-500);line-height:1.5;margin-bottom:6px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.b-purple{background:#EDE9FE;color:#4C1D95}.b-gold{background:#FEF3C7;color:#92400E}
.b-green{background:#DCFCE7;color:#166534}.b-blue{background:#E0F2FE;color:#1E40AF}
.b-gray{background:#F3F4F6;color:#6B7280}
.verified{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#15803D;background:#DCFCE7;padding:2px 6px;border-radius:20px}
.phone-link{font-size:11px;color:var(--purple);display:flex;align-items:center;gap:3px;text-decoration:none}
.gold-divider{height:2px;background:linear-gradient(90deg,transparent,#F59E0B,transparent);margin:1.25rem 1.25rem 0;opacity:0.4}
.map-block{margin:1.25rem 1.25rem 0;background:linear-gradient(135deg,#EDE9FE,#FEF3C7);border:1px solid rgba(107,33,168,0.15);border-radius:var(--radius-lg);padding:1.25rem;display:flex;align-items:center;gap:14px;cursor:pointer}
.map-icon{width:52px;height:52px;background:var(--purple);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.map-icon i{font-size:26px;color:#fff}
.map-text h3{font-size:14px;font-weight:600;color:var(--purple-dark)}
.map-text p{font-size:12px;color:var(--gray-500);margin-top:2px}
.map-arr{margin-left:auto;color:var(--purple);font-size:20px}
.reg-block{margin:1rem 1.25rem;background:linear-gradient(135deg,#4C1D95,#6B21A8);border-radius:var(--radius-lg);padding:1.25rem;color:#fff;position:relative;overflow:hidden}
.reg-block::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,0.05);border-radius:50%}
.reg-block h3{font-size:15px;font-weight:600;margin-bottom:4px;position:relative}
.reg-block p{font-size:12px;color:rgba(255,255,255,0.75);margin-bottom:1rem;line-height:1.5;position:relative}
.reg-btns{display:flex;gap:8px;flex-wrap:wrap;position:relative}
.reg-btn{padding:8px 16px;border-radius:var(--radius-md);font-size:12px;font-family:'Sarabun',sans-serif;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:6px}
.btn-gold{background:#F59E0B;color:#fff}
.btn-outline{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)}
.footer-note{text-align:center;padding:1.5rem 1.25rem 0.5rem;font-size:11px;color:var(--gray-500);line-height:1.8}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid var(--gray-200);padding:0.5rem 0 0.75rem;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.06)}
.bottom-nav-inner{max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;background:none;border:none;cursor:pointer;font-family:'Sarabun',sans-serif}
.nav-btn i{font-size:22px;color:#6B7280}
.nav-btn span{font-size:10px;color:#6B7280}
.nav-btn.active i{color:var(--purple)}
.nav-btn.active span{color:var(--purple)}
