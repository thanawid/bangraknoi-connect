<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>บางรักน้อย Connect — Living Community</title>
<meta name="description" content="บางรักน้อย Connect — เมืองการ์ตูนที่มีชีวิต" />
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/icon-32.png">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<style>
:root{
  --purple:#4b178f;
  --gold:#f6aa1c;
  --glass:rgba(255,255,255,.72);
  --shadow:0 14px 40px rgba(40,20,80,.22);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:"Sarabun",system-ui,-apple-system,"Segoe UI",sans-serif;background:#8ed7ff;color:#24163e}
button{font:inherit}
.world{position:fixed;inset:0;overflow:hidden;background:#8ed7ff;isolation:isolate}
.scene-wrap{position:absolute;inset:0;overflow:hidden;transform:translateZ(0)}
.scene{
  position:absolute;inset:0;
  background-image:url("assets/master-scene-v1.png");
  background-repeat:no-repeat;
  background-size:cover;
  background-position:center center;
  transform:scale(1.01);
  transition:filter .9s ease, transform 1.2s ease;
}
/* responsive composition: keep landmarks visible */
@media (max-aspect-ratio: 4/5){
  .scene{background-size:auto 100%;background-position:center center;transform:scale(1.02)}
}
@media (min-aspect-ratio: 18/9){
  .scene{background-size:100% auto;background-position:center center}
}
@media (max-width:760px){
  .scene{background-position:48% center}
}
@media (max-width:480px){
  .scene{background-position:47% center}
}

/* time-of-day filters, driven by JS */
.world.morning .scene{filter:brightness(1.05) saturate(1.06) hue-rotate(-4deg)}
.world.noon .scene{filter:brightness(1.08) saturate(1.04)}
.world.evening .scene{filter:brightness(.96) saturate(1.12) sepia(.13) hue-rotate(-10deg)}
.world.night .scene{filter:brightness(.48) saturate(.72) hue-rotate(16deg)}
.world.night::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,20,70,.42),rgba(20,8,60,.22) 45%,rgba(2,5,25,.5));pointer-events:none;z-index:8}

/* subtle water shimmer over canal foreground */
.water-shimmer{position:absolute;left:-10%;right:-10%;bottom:0;height:42%;z-index:6;pointer-events:none;mix-blend-mode:screen;opacity:.22;background:repeating-linear-gradient(104deg,transparent 0 28px,rgba(255,255,255,.45) 29px 31px,transparent 32px 72px);animation:water 9s linear infinite;mask-image:linear-gradient(to top,#000 0%,#000 62%,transparent 100%)}
@keyframes water{to{transform:translateX(90px)}}

/* living overlays */
.cloud{position:absolute;z-index:10;pointer-events:none;opacity:.78;background:rgba(255,255,255,.86);border-radius:50px;filter:drop-shadow(0 8px 12px rgba(100,160,210,.18));animation:cloud linear infinite}
.cloud::before,.cloud::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.9)}
.c1{width:140px;height:42px;top:7%;left:-18%;animation-duration:72s}.c1::before{width:62px;height:62px;left:18px;top:-30px}.c1::after{width:84px;height:84px;right:14px;top:-46px}
.c2{width:92px;height:30px;top:17%;left:-20%;animation-duration:96s;animation-delay:22s;opacity:.58}.c2::before{width:46px;height:46px;left:13px;top:-22px}.c2::after{width:58px;height:58px;right:8px;top:-31px}
.c3{width:112px;height:34px;top:10%;left:-22%;animation-duration:88s;animation-delay:47s;opacity:.5}.c3::before{width:58px;height:58px;left:16px;top:-28px}.c3::after{width:68px;height:68px;right:12px;top:-38px}
@keyframes cloud{to{transform:translateX(140vw)}}
.bird{position:absolute;z-index:11;pointer-events:none;font-size:18px;opacity:.7;animation:bird linear infinite}.b1{top:13%;left:-8%;animation-duration:26s}.b2{top:8%;left:-10%;animation-duration:38s;animation-delay:11s;font-size:14px}.b3{top:19%;left:-6%;animation-duration:32s;animation-delay:21s;font-size:13px}@keyframes bird{to{transform:translate(120vw,-30px)}}
.leaf{position:absolute;top:-24px;z-index:12;pointer-events:none;opacity:.55;animation:leaf linear infinite}.l1{left:7%;animation-duration:15s}.l2{left:15%;animation-duration:19s;animation-delay:6s}.l3{right:8%;animation-duration:17s;animation-delay:12s}@keyframes leaf{to{transform:translate(45px,108vh) rotate(540deg);opacity:0}}

/* animated train: rail exists in scene, train is separate */
.train{position:absolute;z-index:13;right:-360px;top:22%;width:300px;height:28px;border-radius:16px;background:linear-gradient(90deg,#6b2ebc,#9b5be8 34%,#ffffff 35%,#ffffff 40%,#8a48da 41%,#53238e);box-shadow:0 6px 14px rgba(30,20,90,.24);animation:train 46s linear infinite;opacity:.95}.train::before{content:"";position:absolute;left:26px;right:40px;top:6px;height:8px;background:repeating-linear-gradient(90deg,#293552 0 16px,#bfeaff 17px 28px);border-radius:6px}.train::after{content:"";position:absolute;right:10px;top:7px;width:14px;height:14px;border-radius:50%;background:#222a44}
@keyframes train{0%,18%{transform:translateX(0)} 72%,100%{transform:translateX(-150vw)}}
@media(max-width:700px){.train{top:20%;width:230px;height:23px}}

/* boats are separate, not baked into scene */
.boat{position:absolute;z-index:14;bottom:21%;left:-220px;width:190px;height:34px;background:#7b3f1d;border-radius:6px 6px 34px 34px;box-shadow:0 8px 16px rgba(0,55,90,.28);animation:boat 42s linear infinite}.boat::before{content:"";position:absolute;left:36px;right:36px;top:-22px;height:24px;background:#7d3fd0;border-radius:28px 28px 4px 4px}.boat::after{content:"";position:absolute;right:22px;top:-8px;width:54px;height:18px;background:rgba(255,220,150,.55);border-radius:10px}
.boat.small{bottom:16%;animation-duration:58s;animation-delay:18s;transform:scale(.62);opacity:.9}
@keyframes boat{0%{transform:translateX(-220px)}100%{transform:translateX(125vw)}}

/* brand and tiny page icons */
.brand{position:absolute;top:18px;left:18px;z-index:50;display:grid;place-items:center;width:54px;height:54px;border-radius:18px;background:rgba(255,255,255,.62);backdrop-filter:blur(14px);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.68)}
.brand img{width:44px;height:44px;object-fit:contain}.icons{position:absolute;top:18px;right:18px;z-index:50;display:flex;gap:10px}.ico{width:42px;height:42px;border:0;border-radius:50%;background:rgba(255,255,255,.72);backdrop-filter:blur(12px);box-shadow:0 10px 28px rgba(30,20,80,.18);display:grid;place-items:center;color:#35106c;cursor:pointer;transition:transform .18s ease,background .18s}.ico:hover{transform:translateY(-2px) scale(1.04);background:#fff}.ico svg{width:22px;height:22px;display:block}
@media(max-width:620px){.brand{top:12px;left:12px;width:46px;height:46px;border-radius:15px}.brand img{width:38px;height:38px}.icons{top:12px;right:12px;gap:8px}.ico{width:38px;height:38px}}

/* mascot NPC */
.mascot{position:absolute;z-index:45;left:9%;bottom:6%;width:min(150px,18vw);min-width:78px;transform:translateX(-150%) scale(.95);animation:mascot-in 2.5s cubic-bezier(.2,.8,.2,1) 1.4s forwards}.mascot img{width:100%;display:block;filter:drop-shadow(0 14px 22px rgba(30,20,70,.28));animation:bob 2.4s ease-in-out infinite 4s}.mascot::after{content:"";position:absolute;left:18%;right:18%;bottom:2px;height:12px;background:rgba(0,0,0,.18);border-radius:50%;filter:blur(5px);z-index:-1}@keyframes mascot-in{0%{transform:translateX(-150%) scale(.9)}70%{transform:translateX(10%) scale(1.02)}100%{transform:translateX(0) scale(1)}}@keyframes bob{50%{transform:translateY(-7px)}}
.bubble{position:absolute;z-index:46;left:calc(9% + min(150px,18vw));bottom:16%;max-width:230px;padding:10px 14px;border-radius:18px 18px 18px 5px;background:rgba(255,255,255,.92);box-shadow:0 14px 34px rgba(40,20,80,.22);font-weight:800;color:#35106c;font-size:clamp(12px,1.4vw,15px);opacity:0;transform:translateY(10px) scale(.96);animation:bubble 5s ease 3.1s forwards;pointer-events:none}@keyframes bubble{0%{opacity:0;transform:translateY(10px) scale(.96)}10%,72%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-8px) scale(.96)}}
@media(max-width:700px){.mascot{left:6%;bottom:7%;width:86px}.bubble{left:88px;bottom:13%;max-width:180px}}

/* place hotspots: invisible until hover/tap, city remains clean */
.hotspot{position:absolute;z-index:35;border:0;background:transparent;cursor:pointer;border-radius:18px;outline:0}.hotspot::after{content:attr(data-title);position:absolute;left:50%;bottom:100%;transform:translate(-50%,8px) scale(.9);padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.94);box-shadow:0 10px 26px rgba(40,20,80,.22);color:#35106c;font-size:13px;font-weight:900;white-space:nowrap;opacity:0;pointer-events:none;transition:.18s ease}.hotspot:hover::after,.hotspot:focus-visible::after{opacity:1;transform:translate(-50%,-6px) scale(1)}.hotspot:hover,.hotspot:focus-visible{box-shadow:0 0 0 3px rgba(255,190,45,.7),0 0 28px rgba(255,180,0,.42);background:rgba(255,220,80,.08)}
.hs-temple{left:4%;top:31%;width:25%;height:36%}.hs-hall{left:36%;top:34%;width:24%;height:26%}.hs-market{left:60%;top:43%;width:16%;height:22%}.hs-food{left:73%;top:44%;width:12%;height:22%}.hs-craft{left:84%;top:43%;width:12%;height:22%}.hs-river{left:5%;bottom:12%;width:88%;height:29%}

/* small info sheet, only when user asks by clicking */
.sheet{position:absolute;z-index:90;left:50%;bottom:18px;transform:translate(-50%,140%);width:min(560px,calc(100vw - 24px));background:rgba(255,255,255,.93);backdrop-filter:blur(18px);border-radius:22px;padding:16px 18px;box-shadow:0 18px 60px rgba(35,15,75,.26);transition:transform .36s cubic-bezier(.2,.8,.2,1)}.sheet.open{transform:translate(-50%,0)}.sheet h2{margin:0 0 5px;font-size:20px;color:#35106c}.sheet p{margin:0;color:#6a5b80;font-size:13px;line-height:1.45}.sheet button{position:absolute;right:12px;top:10px;border:0;background:#f1eafd;color:#35106c;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:18px}

/* reduce motion */
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}.mascot{transform:translateX(0)!important}.bubble{opacity:1!important;transform:none!important}}
</style>
</head>
<body>
<main class="world" id="world" aria-label="บางรักน้อย Connect — Living Community">
  <div class="scene-wrap"><div class="scene" aria-hidden="true"></div></div>
  <div class="water-shimmer" aria-hidden="true"></div>
  <div class="cloud c1" aria-hidden="true"></div><div class="cloud c2" aria-hidden="true"></div><div class="cloud c3" aria-hidden="true"></div>
  <div class="bird b1" aria-hidden="true">⌁</div><div class="bird b2" aria-hidden="true">⌁</div><div class="bird b3" aria-hidden="true">⌁</div>
  <div class="leaf l1" aria-hidden="true">🍃</div><div class="leaf l2" aria-hidden="true">🍂</div><div class="leaf l3" aria-hidden="true">🍃</div>
  <div class="train" aria-hidden="true"></div>
  <div class="boat" aria-hidden="true"></div><div class="boat small" aria-hidden="true"></div>

  <div class="brand" aria-label="บางรักน้อย Connect">
    <img src="assets/logo.png" alt="BC">
  </div>
  <nav class="icons" aria-label="เมนูหลักขนาดเล็ก">
    <button class="ico" title="หน้าหลัก" aria-label="หน้าหลัก"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9.5 20v-6h5v6"/></svg></button>
    <button class="ico" title="เสียง" aria-label="เสียง"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="M16 8c1.5 2 1.5 6 0 8"/><path d="M19 5c3 4 3 10 0 14"/></svg></button>
    <button class="ico" title="เมนู" aria-label="เมนู"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
  </nav>

  <button class="hotspot hs-temple" data-title="วัดบางรักน้อย" data-zone="temple" aria-label="วัดบางรักน้อย"></button>
  <button class="hotspot hs-hall" data-title="บริการชุมชน" data-zone="service" aria-label="บริการชุมชน"></button>
  <button class="hotspot hs-market" data-title="ตลาด" data-zone="market" aria-label="ตลาด"></button>
  <button class="hotspot hs-food" data-title="ร้านอาหาร" data-zone="food" aria-label="ร้านอาหาร"></button>
  <button class="hotspot hs-craft" data-title="หาช่าง" data-zone="craft" aria-label="หาช่าง"></button>
  <button class="hotspot hs-river" data-title="คลองอ้อมนนท์" data-zone="river" aria-label="คลองอ้อมนนท์"></button>

  <div class="mascot" aria-hidden="true"><img src="assets/mascot.png" alt=""></div>
  <div class="bubble" aria-live="polite">สวัสดีครับ 😊<br>วันนี้จะพาไปไหนดีครับ?</div>

  <section class="sheet" id="sheet" aria-live="polite">
    <button id="closeSheet" aria-label="ปิด">×</button>
    <h2 id="sheetTitle">บางรักน้อย Connect</h2>
    <p id="sheetText">แตะสถานที่ในเมืองเพื่อดูข้อมูล</p>
  </section>
</main>
<script>
const world=document.getElementById('world');
const h=new Date().getHours();
world.classList.add(h>=18||h<5?'night':h<11?'morning':h<16?'noon':'evening');
const info={
 temple:['วัดบางรักน้อย','แลนด์มาร์กของชุมชน พระใหญ่ และพื้นที่เรื่องเล่าทางวัฒนธรรม'],
 service:['บริการชุมชน','ศูนย์รวมบริการ ข่าวสาร และช่องทางช่วยเหลือประชาชน'],
 market:['ตลาด','สินค้าและของดีในบางรักน้อย จากร้านค้าและผู้ประกอบการชุมชน'],
 food:['ร้านอาหาร','รวมร้านอาหาร คาเฟ่ และของอร่อยริมคลอง'],
 craft:['หาช่าง','ค้นหาช่างใกล้บ้าน เช่น ช่างไฟ ช่างประปา ช่างแอร์ และงานซ่อมทั่วไป'],
 river:['คลองอ้อมนนท์','หัวใจของเมือง เส้นทางน้ำ วิถีริมคลอง และกิจกรรมชุมชน']
};
const sheet=document.getElementById('sheet');
document.querySelectorAll('.hotspot').forEach(btn=>btn.addEventListener('click',()=>{
  const d=info[btn.dataset.zone]||['บางรักน้อย Connect','ข้อมูลจะเชื่อมต่อในขั้นถัดไป'];
  document.getElementById('sheetTitle').textContent=d[0];
  document.getElementById('sheetText').textContent=d[1];
  sheet.classList.add('open');
}));
document.getElementById('closeSheet').onclick=()=>sheet.classList.remove('open');
</script>
</body>
</html>
