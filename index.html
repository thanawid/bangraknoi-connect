<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>บางรักน้อย Connect — Living Community</title>
<meta name="description" content="บางรักน้อย Connect — เมืองการ์ตูนที่บังเอิญเป็นเว็บ" />
<style>
:root{--purple:#5b2d91;--gold:#f2a51f;--ink:#2d1b4d;--glass:rgba(255,255,255,.86);--shadow:0 18px 50px rgba(41,23,83,.22)}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,sans-serif;background:#86d9ff;color:var(--ink)}button{font:inherit}
.world{position:relative;width:100vw;height:100dvh;overflow:hidden;background:linear-gradient(#78d9ff,#bff2ff)}.world.night{background:linear-gradient(#08142e,#172a55)}
.scene{position:absolute;inset:0;background:url('assets/playmap-master.png') center/cover no-repeat;transform:scale(1.035);filter:saturate(1.05) contrast(1.02);transition:transform 1.2s ease,filter 1s ease}.night .scene{filter:brightness(.56) saturate(.88) hue-rotate(8deg)}
.veil{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,rgba(255,247,203,.18),rgba(255,255,255,0) 45%,rgba(56,30,100,.06));z-index:3}.night .veil{background:linear-gradient(to bottom,rgba(9,12,45,.4),rgba(20,16,60,.25),rgba(4,8,25,.56))}
.brand{position:absolute;left:18px;top:16px;z-index:30;display:flex;gap:8px;align-items:center;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.45);backdrop-filter:blur(12px);box-shadow:0 8px 25px rgba(40,20,80,.12);opacity:.72}.brand img{width:38px;height:38px;object-fit:contain}.brand b{font-size:13px;color:#fff;text-shadow:0 2px 5px rgba(40,20,90,.55)}
.menu-dot{position:absolute;right:18px;top:18px;z-index:31;width:42px;height:42px;border:0;border-radius:50%;background:rgba(80,43,132,.58);color:#fff;font-size:21px;backdrop-filter:blur(12px);box-shadow:0 8px 25px rgba(40,20,80,.16);cursor:pointer}.menu-dot:hover{transform:translateY(-2px)}
.sun{position:absolute;right:13%;top:10%;z-index:4;width:76px;height:76px;border-radius:50%;background:radial-gradient(circle,#fff7a6,#ffc23c 55%,rgba(255,195,60,.05) 72%);box-shadow:0 0 55px rgba(255,197,68,.8);animation:drift 8s ease-in-out infinite}.night .sun{background:radial-gradient(circle,#fff,#dce7ff 58%,rgba(210,225,255,.08) 75%);box-shadow:0 0 45px rgba(222,234,255,.75)}
.cloud{position:absolute;z-index:9;width:115px;height:40px;border-radius:60px;background:rgba(255,255,255,.72);animation:cloud linear infinite}.cloud:before,.cloud:after{content:"";position:absolute;background:rgba(255,255,255,.76);border-radius:50%}.cloud:before{width:55px;height:55px;left:20px;top:-26px}.cloud:after{width:70px;height:70px;right:12px;top:-40px}.c1{top:17%;left:-12%;animation-duration:62s}.c2{top:25%;left:-25%;transform:scale(.72);animation-duration:80s;animation-delay:12s}.c3{top:12%;left:-20%;transform:scale(.9);animation-duration:70s;animation-delay:31s}@keyframes cloud{to{translate:130vw 0}}@keyframes drift{50%{transform:translateY(10px)}}
.bird{position:absolute;left:-5%;z-index:10;font-size:24px;color:#543d7d;opacity:.75;animation:bird linear infinite}.b1{top:18%;animation-duration:21s}.b2{top:24%;animation-duration:28s;animation-delay:8s}.b3{top:14%;animation-duration:34s;animation-delay:16s}@keyframes bird{to{translate:115vw -24px}}
.water{position:absolute;left:21%;top:28%;width:34%;height:50%;z-index:11;pointer-events:none;border-radius:45%;overflow:hidden;opacity:.38;transform:rotate(7deg)}.water:before{content:"";position:absolute;inset:-30%;background:repeating-linear-gradient(115deg,transparent 0 24px,rgba(255,255,255,.42) 26px,transparent 31px);animation:water 7s linear infinite}@keyframes water{to{transform:translate(90px,50px)}}
.train{position:absolute;right:-26%;top:12%;z-index:8;width:21%;height:20px;border-radius:999px;background:linear-gradient(90deg,#fff,#ddd7ff 62%,#6d35c7);box-shadow:0 7px 15px rgba(48,20,90,.24);opacity:0;animation:train 85s linear infinite}.train:after{content:"";position:absolute;inset:6px 16px;background:repeating-linear-gradient(90deg,#6c49a6 0 16px,transparent 16px 27px)}@keyframes train{0%,28%{opacity:0;transform:translateX(0)}31%{opacity:.88}62%{opacity:.88;transform:translateX(-142vw)}65%,100%{opacity:0;transform:translateX(-142vw)}}
.smoke{position:absolute;right:10%;bottom:28%;z-index:14;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.58);animation:smoke 4.8s ease-in-out infinite}.smoke:before,.smoke:after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.44)}.smoke:before{width:22px;height:22px;left:16px;top:-15px}.smoke:after{width:14px;height:14px;left:-12px;top:-24px}@keyframes smoke{0%{transform:translateY(0) scale(.7);opacity:0}25%{opacity:.7}100%{transform:translateY(-82px) scale(1.75);opacity:0}}
.leaf{position:absolute;top:-30px;z-index:12;font-size:17px;opacity:.75;animation:leaf linear infinite}.l1{left:10%;animation-duration:15s}.l2{left:4%;animation-duration:18s;animation-delay:5s}.l3{right:8%;animation-duration:16s;animation-delay:9s}@keyframes leaf{to{transform:translate(95px,110vh) rotate(420deg)}}
.guide{position:absolute;left:7%;bottom:8%;z-index:40;width:82px;height:128px;animation:walkIn 2.9s cubic-bezier(.2,.75,.25,1) .9s both}.mascot{position:absolute;inset:0;border-radius:48% 48% 40% 40%;background:linear-gradient(#7a39c9,#58228f);box-shadow:0 14px 28px rgba(38,18,78,.24);animation:bob 1.4s ease-in-out infinite}.mascot:before{content:"";position:absolute;left:18px;top:-43px;width:48px;height:54px;border-radius:50%;background:#ffd8b3;box-shadow:inset 0 -5px 0 rgba(0,0,0,.08)}.mascot:after{content:"BC";position:absolute;left:18px;top:45px;width:46px;height:28px;border-radius:12px;background:#fff;color:#6a32b6;display:grid;place-items:center;font-weight:1000;font-size:17px}.wave{position:absolute;right:-26px;top:-1px;font-size:30px;opacity:0;animation:wave 1.5s ease-in-out 4.1s 3}@keyframes walkIn{0%{opacity:0;transform:translateX(-26vw)}15%{opacity:1}100%{opacity:1;transform:translateX(0)}}@keyframes bob{50%{transform:translateY(5px)}}@keyframes wave{0%,100%{opacity:1;transform:rotate(0)}50%{opacity:1;transform:rotate(16deg)}}
.bubble{position:absolute;left:calc(7% + 72px);bottom:calc(8% + 112px);z-index:45;max-width:min(290px,70vw);padding:10px 14px;border-radius:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);box-shadow:var(--shadow);font-weight:900;font-size:16px;opacity:0;transform:translateY(10px) scale(.96);pointer-events:none}.bubble.show{animation:bubbleShow 3.2s ease both}.bubble.ask{animation:bubbleHold .8s ease both}@keyframes bubbleShow{0%{opacity:0;transform:translateY(10px) scale(.96)}15%,82%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-8px) scale(.98)}}@keyframes bubbleHold{to{opacity:1;transform:translateY(0) scale(1)}}
.places{position:absolute;inset:0;z-index:35;pointer-events:none}.place{position:absolute;border:0;background:rgba(255,255,255,.86);color:#42216d;border-radius:999px;padding:10px 14px;font-weight:1000;box-shadow:0 12px 28px rgba(40,20,80,.18);backdrop-filter:blur(12px);cursor:pointer;pointer-events:auto;opacity:0;transform:translateY(20px) scale(.84);transition:.25s}.ready .place{animation:pop .55s cubic-bezier(.2,1.4,.4,1) forwards}.place:hover,.place:focus-visible{transform:translateY(-5px) scale(1.05);background:#fff3d8}.place .mini{font-size:20px;margin-right:4px}.p-food{right:7%;bottom:24%;animation-delay:0s}.p-craft{right:31%;bottom:19%;animation-delay:.08s}.p-market{right:11%;top:34%;animation-delay:.16s}.p-event{left:36%;bottom:16%;animation-delay:.24s}.p-service{left:48%;top:34%;animation-delay:.32s}.p-news{left:22%;bottom:13%;animation-delay:.4s}.p-learn{left:11%;bottom:27%;animation-delay:.48s}.p-talk{left:50%;bottom:8%;animation-delay:.56s}@keyframes pop{to{opacity:1;transform:translateY(0) scale(1)}}
.hot{position:absolute;border:0;background:transparent;cursor:pointer;z-index:34;pointer-events:auto}.hot:hover{box-shadow:0 0 0 4px rgba(255,211,74,.55),0 0 35px rgba(255,212,80,.45);background:rgba(255,223,88,.08)}.h-food{right:4%;bottom:20%;width:22%;height:28%;border-radius:32px}.h-craft{right:28%;bottom:12%;width:18%;height:20%;border-radius:32px}.h-market{right:4%;top:26%;width:21%;height:22%;border-radius:32px}.h-event{left:32%;bottom:8%;width:20%;height:20%;border-radius:32px}.h-service{left:42%;top:28%;width:18%;height:23%;border-radius:32px}.h-news{left:17%;bottom:6%;width:18%;height:16%;border-radius:32px}.h-learn{left:5%;bottom:20%;width:24%;height:28%;border-radius:32px}.h-talk{left:47%;bottom:2%;width:18%;height:16%;border-radius:32px}
.drawer{position:absolute;right:18px;top:76px;z-index:80;width:min(360px,calc(100vw - 32px));border-radius:26px;background:rgba(255,255,255,.9);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:17px;transform:translateX(calc(100% + 40px));transition:.3s ease}.drawer.open{transform:translateX(0)}.drawer h2{margin:0 36px 5px 0;font-size:24px}.drawer p{margin:0 0 12px;color:#6b5e7b}.close{position:absolute;right:12px;top:12px;width:34px;height:34px;border:0;border-radius:50%;background:#efe4ff;color:#512b82;font-size:22px;cursor:pointer}.item{display:flex;align-items:center;gap:10px;margin:8px 0;padding:10px;border-radius:17px;background:#f7f2ff;font-weight:850}.item i{width:34px;height:34px;display:grid;place-items:center;border-radius:12px;background:linear-gradient(135deg,#7138c9,#f2a51f);font-style:normal;color:#fff}.hint{font-size:12px;color:#7a6c89;margin-top:10px}
.menuPanel{position:absolute;right:18px;top:70px;z-index:75;display:none;flex-direction:column;gap:8px;padding:10px;border-radius:22px;background:rgba(255,255,255,.86);backdrop-filter:blur(14px);box-shadow:var(--shadow)}.menuPanel.show{display:flex}.menuPanel button{border:0;border-radius:15px;background:white;padding:10px 14px;font-weight:900;color:#512b82;text-align:left;cursor:pointer}
@media(max-width:800px){.scene{transform:scale(1.26);background-position:center}.brand b{display:none}.brand{padding:6px}.brand img{width:36px;height:36px}.sun{width:58px;height:58px}.guide{left:6%;bottom:10%;transform:scale(.82);transform-origin:left bottom}.bubble{left:22%;bottom:30%;font-size:14px}.place{font-size:13px;padding:8px 10px}.p-food{right:3%;bottom:25%}.p-craft{right:26%;bottom:19%}.p-market{right:3%;top:36%}.p-event{left:36%;bottom:15%}.p-service{left:45%;top:36%}.p-news{left:12%;bottom:12%}.p-learn{left:3%;bottom:28%}.p-talk{left:50%;bottom:7%}.drawer{right:10px;top:70px}}
</style>
</head>
<body>
<main class="world" id="world">
  <div class="scene" id="scene"></div><div class="veil"></div><div class="sun"></div>
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
  <div class="bird b1">⌁</div><div class="bird b2">⌁</div><div class="bird b3">⌁</div>
  <div class="water"></div><div class="train"></div><div class="smoke"></div>
  <div class="leaf l1">🍃</div><div class="leaf l2">🍂</div><div class="leaf l3">🍃</div>
  <div class="brand"><img src="assets/logo-bc.png" alt="BC"><b>บางรักน้อย Connect</b></div>
  <button class="menu-dot" id="menuBtn" aria-label="เมนู">☰</button>
  <div class="menuPanel" id="menuPanel"><button data-zone="food">🍜 ร้านอาหาร</button><button data-zone="craft">🔧 หาช่าง</button><button data-zone="service">❤️ บริการชุมชน</button><button data-zone="event">🎉 กิจกรรม</button><button data-zone="market">🛍️ ตลาด</button><button data-zone="news">📢 ข่าวสาร</button><button data-zone="learn">🎓 ฝึกอาชีพ</button><button data-zone="talk">💬 พูดคุย</button></div>
  <div class="guide"><div class="mascot"></div><div class="wave">👋</div></div>
  <div class="bubble" id="hello">สวัสดีครับ 😊<br>ยินดีต้อนรับสู่บางรักน้อย</div>
  <div class="bubble" id="ask">วันนี้...จะพาไปไหนดีครับ?</div>
  <div class="places" id="places">
    <button class="place p-food" data-zone="food"><span class="mini">🍜</span>ร้านอาหาร</button>
    <button class="place p-craft" data-zone="craft"><span class="mini">🔧</span>หาช่าง</button>
    <button class="place p-service" data-zone="service"><span class="mini">❤️</span>บริการชุมชน</button>
    <button class="place p-event" data-zone="event"><span class="mini">🎉</span>กิจกรรม</button>
    <button class="place p-market" data-zone="market"><span class="mini">🛍️</span>ตลาด</button>
    <button class="place p-news" data-zone="news"><span class="mini">📢</span>ข่าวสาร</button>
    <button class="place p-learn" data-zone="learn"><span class="mini">🎓</span>ฝึกอาชีพ</button>
    <button class="place p-talk" data-zone="talk"><span class="mini">💬</span>พูดคุย</button>
    <button class="hot h-food" data-zone="food" aria-label="ร้านอาหาร"></button>
    <button class="hot h-craft" data-zone="craft" aria-label="หาช่าง"></button>
    <button class="hot h-service" data-zone="service" aria-label="บริการชุมชน"></button>
    <button class="hot h-event" data-zone="event" aria-label="กิจกรรม"></button>
    <button class="hot h-market" data-zone="market" aria-label="ตลาด"></button>
    <button class="hot h-news" data-zone="news" aria-label="ข่าวสาร"></button>
    <button class="hot h-learn" data-zone="learn" aria-label="ฝึกอาชีพ"></button>
    <button class="hot h-talk" data-zone="talk" aria-label="พูดคุย"></button>
  </div>
  <aside class="drawer" id="drawer"><button class="close" id="close">×</button><h2 id="dTitle"></h2><p id="dText"></p><div id="dItems"></div><div class="hint">ข้อมูลตัวอย่าง — รอบถัดไปค่อยต่อข้อมูลจริงเข้าเมือง</div></aside>
</main>
<script>
const world=document.getElementById('world'); if(new Date().getHours()>=18||new Date().getHours()<6) world.classList.add('night');
const hello=document.getElementById('hello'), ask=document.getElementById('ask'), places=document.getElementById('places');
setTimeout(()=>hello.classList.add('show'),3600);setTimeout(()=>ask.classList.add('ask'),6900);setTimeout(()=>places.classList.add('ready'),7800);
const info={food:['ก๋วยเตี๋ยวริมคลอง','ร้านอาหารชุมชน','คาเฟ่/ของหวาน'],craft:['ช่างไฟ','ช่างประปา','ช่างแอร์/ซ่อมบ้าน'],service:['แจ้งปัญหา','บริการประชาชน','ข้อมูลติดต่อสำคัญ'],event:['กิจกรรมชุมชน','งานเทศกาล','กิจกรรมผู้สูงอายุ'],market:['ตลาดชุมชน','สินค้า/บริการท้องถิ่น','ผลไม้ตามฤดูกาล'],news:['ประกาศข่าวสาร','แจ้งเตือน','ประชาสัมพันธ์'],learn:['อบรมอาชีพ','สมัครกิจกรรม','พัฒนาทักษะ'],talk:['ถาม-ตอบ','แลกเปลี่ยนในชุมชน','ข้อเสนอแนะ']};
const title={food:'ร้านอาหาร',craft:'หาช่าง',service:'บริการชุมชน',event:'กิจกรรม',market:'ตลาด / สินค้า',news:'ข่าวสาร',learn:'ฝึกอาชีพ',talk:'พูดคุย'};
const sub={food:'เมืองพาไปโซนร้านอาหาร',craft:'เมืองพาไปโซนบ้านช่าง',service:'บริการที่อยู่ในเมือง ไม่ใช่ Dashboard',event:'ลานกิจกรรมของชุมชน',market:'ตลาดและของดีบางรักน้อย',news:'ข่าวจะโผล่เมื่ออยากรู้',learn:'พื้นที่เรียนรู้และอาชีพ',talk:'ศาลาชุมชนสำหรับแลกเปลี่ยน'};
function openZone(z){document.getElementById('dTitle').textContent=title[z];document.getElementById('dText').textContent=sub[z];document.getElementById('dItems').innerHTML=info[z].map((x,i)=>`<div class="item"><i>${i+1}</i><span>${x}</span></div>`).join('');document.getElementById('drawer').classList.add('open');document.getElementById('menuPanel').classList.remove('show');document.getElementById('scene').style.transform='scale(1.08) translateX('+(z==='food'||z==='market'?-2:z==='learn'||z==='news'?2:0)+'%)'}
document.querySelectorAll('[data-zone]').forEach(b=>b.addEventListener('click',e=>openZone(e.currentTarget.dataset.zone)));document.getElementById('close').onclick=()=>{document.getElementById('drawer').classList.remove('open');document.getElementById('scene').style.transform=''};document.getElementById('menuBtn').onclick=()=>document.getElementById('menuPanel').classList.toggle('show');
</script>
</body>
</html>
