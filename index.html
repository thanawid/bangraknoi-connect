<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>บางรักน้อย Connect — Genesis</title>
  <link rel="icon" href="favicon.png" />
  <style>
    :root{
      --purple:#4a197d;
      --gold:#ffbd2e;
      --glass:rgba(255,255,255,.72);
      --shadow:0 24px 60px rgba(50,28,88,.22);
      --text:#2f1556;
      --vh:100vh;
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0;overflow:hidden;font-family:"Noto Sans Thai",system-ui,-apple-system,Segoe UI,sans-serif;background:#bfefff;color:var(--text)}
    body{min-height:100vh;}
    .world{position:relative;width:100vw;height:var(--vh);overflow:hidden;background:linear-gradient(#8bdcff,#f8f0cf);isolation:isolate;}
    .sky-tint{position:absolute;inset:0;z-index:1;pointer-events:none;transition:background 1.2s ease,opacity 1.2s ease;background:transparent;}
    .scene{position:absolute;inset:0;z-index:0;background-image:url('assets/city-genesis.png');background-size:cover;background-position:center;transform:scale(1.02);transition:filter 1.2s ease, transform 8s ease;}
    body.is-night .scene{filter:brightness(.58) saturate(.82) hue-rotate(12deg)}
    body.is-evening .scene{filter:brightness(.92) saturate(1.1) sepia(.12)}
    body.is-dawn .scene{filter:brightness(1.03) saturate(.96) sepia(.08)}
    body.is-night .sky-tint{background:linear-gradient(180deg,rgba(20,17,73,.56),rgba(60,28,92,.34) 52%,rgba(0,0,0,.18));}
    body.is-evening .sky-tint{background:linear-gradient(180deg,rgba(255,157,77,.2),rgba(123,66,156,.12) 60%,rgba(255,201,102,.12));}
    body.is-dawn .sky-tint{background:linear-gradient(180deg,rgba(255,218,174,.18),rgba(255,255,255,.02));}
    .brand{position:absolute;z-index:8;left:24px;top:22px;display:flex;align-items:center;gap:12px;padding:10px 14px 10px 10px;border-radius:22px;background:rgba(255,255,255,.23);backdrop-filter:blur(14px);box-shadow:0 10px 34px rgba(28,10,60,.12);}
    .brand img{width:48px;height:48px;border-radius:13px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.14)}
    .brand strong{display:block;color:#fff;text-shadow:0 2px 8px rgba(44,19,80,.55);font-size:18px;line-height:1.05}.brand span{display:block;color:#fff;text-shadow:0 2px 8px rgba(44,19,80,.55);font-size:12px;opacity:.92;margin-top:3px}
    .hamburger{position:absolute;right:28px;top:28px;z-index:9;width:58px;height:58px;border:0;border-radius:50%;background:rgba(74,25,125,.72);color:white;font-size:31px;box-shadow:var(--shadow);cursor:pointer;backdrop-filter:blur(14px);transition:.25s}.hamburger:hover{transform:translateY(-2px) scale(1.04);background:rgba(74,25,125,.88)}
    .hint{position:absolute;z-index:7;left:50%;bottom:28px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:999px;background:rgba(255,255,255,.7);backdrop-filter:blur(16px);box-shadow:0 12px 30px rgba(37,14,72,.17);font-weight:800;color:#4a197d;animation:hintIn .9s ease 1.2s both;}
    .hint b{font-size:18px}.hint small{font-size:13px;opacity:.78}.hint.hide{opacity:0;transform:translateX(-50%) translateY(14px);pointer-events:none;transition:.5s}
    @keyframes hintIn{from{opacity:0;transform:translateX(-50%) translateY(18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .hotspot{position:absolute;z-index:5;border:0;background:transparent;cursor:pointer;border-radius:24px}.hotspot::after{content:attr(data-label);position:absolute;left:50%;bottom:100%;transform:translateX(-50%) translateY(8px);white-space:nowrap;padding:9px 14px;border-radius:999px;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);box-shadow:0 10px 24px rgba(42,18,72,.16);color:#4a197d;font-weight:900;font-size:14px;opacity:0;transition:.22s}.hotspot:hover::after{opacity:1;transform:translateX(-50%) translateY(-8px)}.hotspot:hover{outline:3px solid rgba(255,189,46,.45);background:rgba(255,255,255,.08)}
    .hs-food{right:7%;top:42%;width:16%;height:26%}.hs-market{right:13%;top:26%;width:19%;height:17%}.hs-temple{left:18%;top:22%;width:25%;height:23%}.hs-river{left:11%;top:44%;width:45%;height:25%}.hs-community{left:43%;top:30%;width:27%;height:20%}.hs-career{left:50%;top:55%;width:18%;height:18%}
    .mascot{position:absolute;z-index:6;right:18%;bottom:7%;width:min(16vw,190px);min-width:96px;filter:drop-shadow(0 16px 22px rgba(36,15,63,.24));animation:walkIn 1.8s cubic-bezier(.2,.9,.25,1) both, breathe 3.6s ease-in-out 2s infinite;transform-origin:50% 100%;pointer-events:auto;cursor:pointer}.mascot img{display:block;width:100%}@keyframes walkIn{0%{opacity:0;transform:translateX(140px) translateY(20px) scale(.92) rotate(2deg)}70%{opacity:1;transform:translateX(-8px) translateY(0) scale(1.02)}100%{opacity:1;transform:translateX(0) translateY(0) scale(1)}}@keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .bubble{position:absolute;z-index:7;right:31%;bottom:29%;max-width:250px;padding:12px 16px;border-radius:22px 22px 6px 22px;background:rgba(255,255,255,.78);backdrop-filter:blur(12px);box-shadow:0 18px 40px rgba(38,13,70,.18);font-weight:900;color:#4a197d;opacity:0;transform:translateY(10px);transition:.35s}.bubble.show{opacity:1;transform:translateY(0)}
    .drawer{position:absolute;right:22px;top:95px;z-index:20;width:min(360px,calc(100vw - 44px));border-radius:28px;background:rgba(255,255,255,.82);backdrop-filter:blur(20px);box-shadow:var(--shadow);padding:18px;transform:translateX(115%);opacity:0;transition:.35s}.drawer.open{transform:translateX(0);opacity:1}.drawer h3{margin:0 0 12px;font-size:21px}.drawer button,.drawer a{width:100%;display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:#37105f;font-weight:900;margin:8px 0;padding:14px 16px;border-radius:18px;border:0;background:rgba(74,25,125,.08);cursor:pointer}.drawer a:hover,.drawer button:hover{background:rgba(255,189,46,.28)}
    .panel{position:absolute;left:50%;bottom:26px;z-index:30;width:min(760px,calc(100vw - 30px));transform:translate(-50%,130%);opacity:0;transition:.38s;background:rgba(255,255,255,.86);backdrop-filter:blur(22px);box-shadow:var(--shadow);border-radius:28px;padding:16px}.panel.open{transform:translate(-50%,0);opacity:1}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.panel h2{margin:0;font-size:22px}.close{width:42px;height:42px;border:0;border-radius:50%;font-size:22px;background:#4a197d;color:#fff;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.item{padding:14px;border-radius:18px;background:#f7f0ff}.item strong{display:block}.item small{opacity:.72}.search{margin-top:12px;display:flex;gap:8px}.search input{flex:1;border:0;border-radius:18px;background:#f1e9ff;padding:14px 16px;font-weight:800}.search button{border:0;border-radius:18px;background:var(--gold);color:#3b185a;font-weight:900;padding:0 18px;cursor:pointer}
    .cloud{position:absolute;z-index:3;width:160px;height:58px;background:rgba(255,255,255,.86);border-radius:60px;filter:blur(.2px);animation:cloud 34s linear infinite}.cloud::before,.cloud::after{content:"";position:absolute;background:inherit;border-radius:50%}.cloud::before{width:70px;height:70px;left:26px;top:-34px}.cloud::after{width:92px;height:92px;right:20px;top:-48px}.c1{left:-180px;top:12%;animation-duration:42s}.c2{left:-260px;top:24%;transform:scale(.65);animation-duration:58s;animation-delay:-14s}.c3{left:-220px;top:7%;transform:scale(.45);animation-duration:46s;animation-delay:-27s}@keyframes cloud{to{translate:calc(100vw + 320px) 0}}
    .bird{position:absolute;z-index:4;font-size:28px;animation:bird 19s linear infinite}.b1{top:14%;left:-40px}.b2{top:19%;left:-80px;animation-delay:-7s;transform:scale(.8)}@keyframes bird{0%{translate:-10vw 0}50%{translate:55vw -30px}100%{translate:112vw 0}}
    .leaf{position:absolute;z-index:4;font-size:22px;animation:leaf 9s ease-in-out infinite;opacity:.85}.l1{left:6%;top:12%;animation-delay:-2s}.l2{right:7%;top:16%;animation-delay:-5s}.l3{left:84%;top:31%;animation-delay:-1s}@keyframes leaf{0%,100%{rotate:-8deg;translate:0 0}50%{rotate:12deg;translate:6px 8px}}
    .spark{position:absolute;z-index:4;border-radius:50%;background:rgba(255,246,174,.95);box-shadow:0 0 18px rgba(255,246,174,.75);width:6px;height:6px;animation:spark 4.5s ease-in-out infinite;opacity:0}.s1{left:16%;top:66%;animation-delay:.2s}.s2{right:23%;top:57%;animation-delay:1.7s}.s3{right:13%;top:68%;animation-delay:2.6s}@keyframes spark{0%,100%{opacity:0;transform:translateY(12px) scale(.5)}50%{opacity:1;transform:translateY(-8px) scale(1)}}
    .night-only{display:none}body.is-night .night-only{display:block}.sunmoon{position:absolute;z-index:3;right:14%;top:13%;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,#fff8bd,#ffbf2d 65%,rgba(255,191,45,0));box-shadow:0 0 50px rgba(255,191,45,.7);transition:all 1.2s}body.is-night .sunmoon{background:radial-gradient(circle,#fff,#dfe7ff 65%,rgba(255,255,255,0));box-shadow:0 0 36px rgba(220,230,255,.65);right:18%;top:10%}
    .stars{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0;transition:.8s;background-image:radial-gradient(#fff 1px,transparent 1px),radial-gradient(#fff 1px,transparent 1px);background-size:110px 110px,170px 170px;background-position:20px 30px,80px 60px}body.is-night .stars{opacity:.62}
    @media(max-width:900px){.brand{left:14px;top:14px;padding:8px 10px}.brand img{width:40px;height:40px}.brand strong{font-size:15px}.brand span{display:none}.hamburger{right:14px;top:14px;width:48px;height:48px;font-size:26px}.scene{background-position:center}.hint{bottom:14px;max-width:88vw}.mascot{right:6%;bottom:12%;width:24vw}.bubble{right:24%;bottom:31%;font-size:13px}.grid{grid-template-columns:repeat(2,1fr)}.panel{bottom:12px}.hotspot::after{display:none}}
    @media(max-width:560px){.scene{background-size:cover;background-position:center}.brand strong{font-size:13px}.brand img{width:36px;height:36px}.hint small{display:none}.mascot{width:30vw;right:4%;bottom:15%}.cloud{opacity:.7}.panel h2{font-size:18px}.item{padding:11px}.hs-food,.hs-market,.hs-temple,.hs-river,.hs-community,.hs-career{width:26%;height:20%}}
  </style>
</head>
<body>
  <main class="world" aria-label="บางรักน้อย Connect Living City">
    <div class="scene" aria-hidden="true"></div><div class="sky-tint"></div><div class="stars"></div><div class="sunmoon"></div>
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="bird b1">🕊️</div><div class="bird b2">🕊️</div>
    <div class="leaf l1">🍃</div><div class="leaf l2">🍃</div><div class="leaf l3">🍃</div>
    <div class="spark night-only s1"></div><div class="spark night-only s2"></div><div class="spark night-only s3"></div>
    <div class="brand"><img src="assets/logo_BC.png" alt="BC"><div><strong>บางรักน้อย Connect</strong><span>ชุมชนใกล้ตัว เชื่อมถึงกัน</span></div></div>
    <button class="hamburger" id="menuBtn" aria-label="เปิดเมนู">≡</button>
    <button class="hotspot hs-food" data-kind="ร้านอาหาร" data-label="ร้านอาหาร"></button>
    <button class="hotspot hs-market" data-kind="ตลาด / ของดี" data-label="ตลาด / ของดี"></button>
    <button class="hotspot hs-temple" data-kind="เที่ยวบางรักน้อย" data-label="เที่ยวบางรักน้อย"></button>
    <button class="hotspot hs-river" data-kind="ริมน้ำ" data-label="ริมน้ำ"></button>
    <button class="hotspot hs-community" data-kind="บริการชุมชน" data-label="บริการชุมชน"></button>
    <button class="hotspot hs-career" data-kind="ฝึกอาชีพ" data-label="ฝึกอาชีพ"></button>
    <div class="mascot" id="mascot"><img src="assets/mascot_hero.png" alt="มาสคอตบางรักน้อย Connect"></div>
    <div class="bubble" id="bubble">ไปไหนดีครับ?</div>
    <div class="hint" id="hint"><b>แตะเมืองเพื่อเดินเล่น</b><small>ข้อมูลจริงค่อยปลูกต่อ ทีละบ้าน</small></div>
    <aside class="drawer" id="drawer">
      <h3>เดินไปไหนดี?</h3>
      <button data-kind="ร้านอาหาร">ร้านอาหาร <span>🍜</span></button>
      <button data-kind="หาช่าง">หาช่าง <span>🔧</span></button>
      <button data-kind="ฝึกอาชีพ">ฝึกอาชีพ <span>🎓</span></button>
      <button data-kind="บริการชุมชน">บริการชุมชน <span>💜</span></button>
      <button data-kind="ข่าวสาร">ข่าวสาร <span>📣</span></button>
    </aside>
    <section class="panel" id="panel" aria-live="polite">
      <div class="panel-head"><h2 id="panelTitle">ร้านอาหาร</h2><button class="close" id="closePanel">×</button></div>
      <div class="search"><input id="searchInput" placeholder="ลองค้นหา: ก๋วยเตี๋ยว ช่างไฟ อบรมอาชีพ"><button id="searchBtn">ค้นหา</button></div>
      <div class="grid" id="grid"></div>
    </section>
  </main>
  <script>
    const body=document.body;
    function setTimeTheme(){const h=new Date().getHours();body.classList.remove('is-dawn','is-evening','is-night');if(h>=5&&h<9)body.classList.add('is-dawn');else if(h>=17&&h<19)body.classList.add('is-evening');else if(h>=19||h<5)body.classList.add('is-night');}
    setTimeTheme();setInterval(setTimeTheme,60000);
    const hint=document.getElementById('hint'),drawer=document.getElementById('drawer'),menuBtn=document.getElementById('menuBtn'),panel=document.getElementById('panel'),panelTitle=document.getElementById('panelTitle'),grid=document.getElementById('grid'),bubble=document.getElementById('bubble'),mascot=document.getElementById('mascot');
    const data={
      'ร้านอาหาร':['ก๋วยเตี๋ยวเรือริมคลอง','ร้านข้าวแกงหน้าตลาด','คาเฟ่เล็กหลังวัด','ขนมไทยบ้านยาย'],
      'ตลาด / ของดี':['ผักสดชุมชน','ขนมของฝาก','ดอกไม้ซอยช้าง','สินค้าทำมือ'],
      'เที่ยวบางรักน้อย':['สะพานริมคลอง','วัดบางรักน้อย','ทางเดินริมน้ำ','มุมถ่ายรูปชุมชน'],
      'ริมน้ำ':['เรือชมคลอง','ให้อาหารปลา','ทางเดินริมน้ำ','จุดพักใต้ต้นไม้'],
      'บริการชุมชน':['ศูนย์สุขภาพ','รถรับส่งชุมชน','แจ้งข้อมูลผิด','ช่วยเหลือใกล้บ้าน'],
      'ฝึกอาชีพ':['อบรมทำอาหาร','งานช่างพื้นฐาน','การตลาดออนไลน์','สินค้าชุมชน'],
      'หาช่าง':['ช่างไฟ','ช่างประปา','ช่างแอร์','ซ่อมบ้าน'],
      'ข่าวสาร':['ประกาศชุมชน','กิจกรรมวันนี้','แจ้งเตือน','ข่าวบริการ']
    };
    function openPanel(kind){hint.classList.add('hide');drawer.classList.remove('open');panelTitle.textContent=kind;grid.innerHTML=(data[kind]||data['ร้านอาหาร']).map(x=>`<div class="item"><strong>${x}</strong><small>ตัวอย่างข้อมูล Genesis</small></div>`).join('');panel.classList.add('open');bubble.textContent=kind+' อยู่ทางนี้ครับ';bubble.classList.add('show');setTimeout(()=>bubble.classList.remove('show'),2200);}
    document.querySelectorAll('[data-kind]').forEach(el=>el.addEventListener('click',()=>openPanel(el.dataset.kind)));
    menuBtn.addEventListener('click',()=>drawer.classList.toggle('open'));
    document.getElementById('closePanel').addEventListener('click',()=>panel.classList.remove('open'));
    mascot.addEventListener('click',()=>{bubble.textContent='ไปไหนดีครับ?';bubble.classList.add('show');setTimeout(()=>bubble.classList.remove('show'),2200)});
    document.getElementById('searchBtn').addEventListener('click',()=>{const q=document.getElementById('searchInput').value.trim()||'ชุมชน';panelTitle.textContent='ค้นหา: '+q;grid.innerHTML=['ผลลัพธ์ใกล้ตัว','รายการแนะนำ','จุดน่าสนใจ','ข้อมูลชุมชน'].map(x=>`<div class="item"><strong>${x}</strong><small>${q}</small></div>`).join('')});
    setTimeout(()=>{bubble.classList.add('show');setTimeout(()=>bubble.classList.remove('show'),2500)},1300);
  </script>
</body>
</html>
